t-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"iPhone 14 Pro Max\",\n                \"price\": 980000,\n                \"comparePrice\": 1100000,\n                \"stock\": 8,\n                \"isFeatured\": true,\n                \"isActive\": true\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Product\n\n          ## Endpoint\n          `PUT /api/products/:id`\n\n          ## Description\n\n          Updates a product from the admin dashboard. The backend applies the request body to the product and saves it.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Headers:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes.\n          - Product `_id`.\n          - This endpoint does not use the product slug.\n\n          ## Request body\n\n          Send only the fields you want to change.\n\n          ```json\n          {\n            \"name\": \"iPhone 14 Pro Max\",\n            \"price\": 980000,\n            \"comparePrice\": 1100000,\n            \"stock\": 8,\n            \"isFeatured\": true,\n            \"isActive\": true\n          }\n          ```\n\n          ## Fields you can update\n\n          `name`\n          - Type: string\n          - Regenerates the slug when changed.\n\n          `description`\n          - Type: string.\n\n          `category`\n          - Type: string.\n          - Category `_id`.\n          - Current update implementation does not re-check that the category exists, so the admin frontend should only send valid category IDs from `GET /api/categories`.\n\n          `brand`\n          - Type: string.\n\n          `price`\n          - Type: number.\n\n          `comparePrice`\n          - Type: number.\n          - If greater than `price`, the backend recalculates `discountPercentage`.\n\n          `weight`\n          - Type: number.\n\n          `stock`\n          - Type: number.\n\n          `images`\n          - Type: array of image objects.\n\n          `sold`\n          - Type: number.\n          - Affects `sort=best_selling`.\n\n          `averageRating`\n          - Type: number.\n\n          `totalReviews`\n          - Type: number.\n\n          `isActive`\n          - Type: boolean.\n          - Public list/detail endpoints only return active products.\n\n          `isFeatured`\n          - Type: boolean.\n          - Affects default sorting and `featured=true` filter.\n\n          ## Slug behavior\n\n          If `name` changes, the backend regenerates the product slug. If another product already has the same slug, the backend adds a number.\n\n          Example:\n\n          ```txt\n          iphone-14-pro\n          iphone-14-pro-1\n          ```\n\n          ## Discount behavior\n\n          If `comparePrice` is greater than `price`, the backend calculates:\n\n          ```txt\n          discountPercentage = round(((comparePrice - price) / comparePrice) * 100)\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Product updated successfully\",\n            \"product\": {\n              \"_id\": \"662b80d44f9c2e2d7c333333\",\n              \"name\": \"iPhone 14 Pro Max\",\n              \"slug\": \"iphone-14-pro-max\",\n              \"description\": \"Apple smartphone with premium camera features.\",\n              \"category\": \"662b7f8f4f9c2e2d7c111111\",\n              \"brand\": \"Apple\",\n              \"price\": 980000,\n              \"comparePrice\": 1100000,\n              \"discountPercentage\": 11,\n              \"weight\": 1,\n              \"stock\": 8,\n              \"sold\": 25,\n              \"images\": [\n                {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                  \"public_id\": \"cheepcart/products/iphone\"\n                }\n              ],\n              \"averageRating\": 4.8,\n              \"totalReviews\": 12,\n              \"isActive\": true,\n              \"isFeatured\": true,\n              \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n              \"updatedAt\": \"2026-04-21T08:30:00.000Z\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Product not found\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n\n          ## Admin notes\n\n          - To hide a product without deleting it, update `isActive` to `false`.\n          - To feature a product, update `isFeatured` to `true`.\n          - To replace product images, send the complete new `images` array.\n          - Use `DELETE /api/products/:id` only when the product should be permanently removed.\n      - info:\n          name: 05 Delete Product Admin\n          type: http\n          seq: 5\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/products/662b80d44f9c2e2d7c333333'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Delete Product\n\n          ## Endpoint\n          `DELETE /api/products/:id`\n\n          ## Description\n\n          Permanently deletes a product from the database. Use carefully from the admin dashboard.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Header:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\"\n          }\n          ```\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes.\n          - Product `_id`.\n          - This endpoint does not use the product slug.\n\n          ## Important behavior\n\n          The current backend uses:\n\n          ```js\n          Product.findByIdAndDelete(req.params.id)\n          ```\n\n          That means this is a permanent delete, not a soft delete.\n\n          ## Safer alternative\n\n          If the admin only wants to hide a product from the frontend, use:\n\n          ```txt\n          PUT /api/products/:id\n          ```\n\n          Body:\n\n          ```json\n          {\n            \"isActive\": false\n          }\n          ```\n\n          Public endpoints only return active products, so this hides the product without deleting its database record.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Product permanently deleted\"\n          }\n          ```\n\n          ## Common errors\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Product not found\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n      - info:\n          name: 06 Sort Products Cheapest First\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?sort=price_asc&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Sort Products Cheapest First\n\n          ## Endpoint\n          `GET /api/products?sort=price_asc`\n\n          ## Description\n\n          Returns active products sorted from the lowest price to the highest price. Use this when the frontend user selects a sorting option like `Price: Low to High`.\n\n          ## Authentication\n\n          Not required.\n\n          ## Query parameters\n\n          `sort`\n          - Type: string\n          - Required: yes for this sorting mode.\n          - Value: `price_asc`.\n\n          `page`\n          - Type: number\n          - Required: no.\n          - Default: `1`.\n          - The backend returns `10` products per page.\n\n          ## Backend sort behavior\n\n          ```js\n          { price: 1 }\n          ```\n\n          `1` means ascending order, so lower prices come first.\n\n          ## Example requests\n\n          All products, cheapest first:\n\n          ```txt\n          GET /api/products?sort=price_asc\n          ```\n\n          Category products, cheapest first:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_asc\n          ```\n\n          Search results, cheapest first:\n\n          ```txt\n          GET /api/products?keyword=iphone&sort=price_asc\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"Budget Android Phone\",\n                \"slug\": \"budget-android-phone\",\n                \"price\": 120000,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              },\n              {\n                \"_id\": \"662b80d44f9c2e2d7c444444\",\n                \"name\": \"iPhone 14 Pro\",\n                \"slug\": \"iphone-14-pro\",\n                \"price\": 950000,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              }\n            ]\n          }\n          ```\n\n          ## Frontend notes\n\n          - Label this as `Price: Low to High`.\n          - Keep the existing category, search, price range, and page query values when the user changes sort.\n          - Public product listing only returns products where `isActive` is `true`.\n      - info:\n          name: 07 Sort Products Most Expensive First\n          type: http\n          seq: 7\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?sort=price_desc&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Sort Products Most Expensive First\n\n          ## Endpoint\n          `GET /api/products?sort=price_desc`\n\n          ## Description\n\n          Returns active products sorted from the highest price to the lowest price. Use this when the frontend user selects a sorting option like `Price: High to Low`.\n\n          ## Authentication\n\n          Not required.\n\n          ## Query parameters\n\n          `sort`\n          - Type: string\n          - Required: yes for this sorting mode.\n          - Value: `price_desc`.\n\n          `page`\n          - Type: number\n          - Required: no.\n          - Default: `1`.\n          - The backend returns `10` products per page.\n\n          ## Backend sort behavior\n\n          ```js\n          { price: -1 }\n          ```\n\n          `-1` means descending order, so higher prices come first.\n\n          ## Example requests\n\n          All products, most expensive first:\n\n          ```txt\n          GET /api/products?sort=price_desc\n          ```\n\n          Category products, most expensive first:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_desc\n          ```\n\n          Search results, most expensive first:\n\n          ```txt\n          GET /api/products?keyword=laptop&sort=price_desc\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c444444\",\n                \"name\": \"iPhone 14 Pro\",\n                \"slug\": \"iphone-14-pro\",\n                \"price\": 950000,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              },\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"Budget Android Phone\",\n                \"slug\": \"budget-android-phone\",\n                \"price\": 120000,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              }\n            ]\n          }\n          ```\n\n          ## Frontend notes\n\n          - Label this as `Price: High to Low`.\n          - Keep the user's current filters when changing sort.\n          - Public product listing only returns active products.\n      - info:\n          name: 08 Sort Products Best Selling\n          type: http\n          seq: 8\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?sort=best_selling&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Sort Products Best Selling\n\n          ## Endpoint\n          `GET /api/products?sort=best_selling`\n\n          ## Description\n\n          Returns active products sorted by highest sold count first. Use this for a `Best Selling` or `Popular` sort option.\n\n          ## Authentication\n\n          Not required.\n\n          ## Query parameters\n\n          `sort`\n          - Type: string\n          - Required: yes for this sorting mode.\n          - Value: `best_selling`.\n\n          `page`\n          - Type: number\n          - Required: no.\n          - Default: `1`.\n          - The backend returns `10` products per page.\n\n          ## Backend sort behavior\n\n          ```js\n          { sold: -1 }\n          ```\n\n          Products with higher `sold` values come first.\n\n          ## Example requests\n\n          All products, best selling first:\n\n          ```txt\n          GET /api/products?sort=best_selling\n          ```\n\n          Best sellers in one category:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=best_selling\n          ```\n\n          Best sellers within a price range:\n\n          ```txt\n          GET /api/products?min=50000&max=500000&sort=best_selling\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c444444\",\n                \"name\": \"iPhone 14 Pro\",\n                \"slug\": \"iphone-14-pro\",\n                \"price\": 950000,\n                \"sold\": 25,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              },\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"Budget Android Phone\",\n                \"slug\": \"budget-android-phone\",\n                \"price\": 120000,\n                \"sold\": 8,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                }\n              }\n            ]\n          }\n          ```\n\n          ## Frontend notes\n\n          - Label this as `Best Selling`.\n          - This depends on the product `sold` field.\n          - If products have the same `sold` value, the current backend does not add a secondary sort.\n      - info:\n          name: 09 Filter Products By Price Range\n          type: http\n          seq: 9\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?min=50000&max=250000&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Filter Products By Price Range\n\n          ## Endpoint\n          `GET /api/products?min=<minimumPrice>&max=<maximumPrice>`\n\n          ## Description\n\n          Returns active products within a selected price range. Use this for price sliders, minimum and maximum price inputs, or quick filters like `Under 250,000`.\n\n          ## Authentication\n\n          Not required.\n\n          ## Query parameters\n\n          `min`\n          - Type: number\n          - Required: no.\n          - Filters products with `price` greater than or equal to this value.\n\n          `max`\n          - Type: number\n          - Required: no.\n          - Filters products with `price` less than or equal to this value.\n\n          `page`\n          - Type: number\n          - Required: no.\n          - Default: `1`.\n          - The backend returns `10` products per page.\n\n          ## Backend filter behavior\n\n          When both `min` and `max` are sent:\n\n          ```js\n          {\n            price: {\n              $gte: Number(req.query.min),\n              $lte: Number(req.query.max)\n            }\n          }\n          ```\n\n          When only `min` is sent:\n\n          ```js\n          {\n            price: {\n              $gte: Number(req.query.min)\n            }\n          }\n          ```\n\n          When only `max` is sent:\n\n          ```js\n          {\n            price: {\n              $lte: Number(req.query.max)\n            }\n          }\n          ```\n\n          ## Example requests\n\n          Products from 50,000 to 250,000:\n\n          ```txt\n          GET /api/products?min=50000&max=250000\n          ```\n\n          Products from 100,000 upward:\n\n          ```txt\n          GET /api/products?min=100000\n          ```\n\n          Products up to 250,000:\n\n          ```txt\n          GET /api/products?max=250000\n          ```\n\n          Category products in a price range:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&min=50000&max=250000\n          ```\n\n          Price range sorted cheapest first:\n\n          ```txt\n          GET /api/products?min=50000&max=250000&sort=price_asc\n          ```\n\n          ## Default sorting with price range\n\n          If no `sort` query is sent, the backend still uses default sorting:\n\n          ```js\n          { isFeatured: -1, createdAt: -1 }\n          ```\n\n          That means featured products appear first inside the selected price range.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"Budget Android Phone\",\n                \"slug\": \"budget-android-phone\",\n                \"price\": 120000,\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                },\n                \"isActive\": true\n              }\n            ]\n          }\n          ```\n\n          ## Frontend notes\n\n          - Send numbers only, without currency symbols or commas.\n          - Use `50000`, not `₦50,000`.\n          - Reset `page` to `1` when the user changes price filters.\n          - Price range can be combined with category, keyword, featured, and sort.\n      - info:\n          name: 10 Combined Product Sorting And Filters\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone&featured=true&min=50000&max=900000&sort=price_asc&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Combined Product Sorting And Filters\n\n          ## Endpoint\n          `GET /api/products`\n\n          ## Description\n\n          Shows how to combine every product filter and sorting option currently implemented in the backend.\n\n          ## Authentication\n\n          Not required.\n\n          ## All supported query parameters\n\n          `category`\n          - Type: string\n          - Category `_id`.\n          - Filters products by category.\n\n          `keyword`\n          - Type: string\n          - Searches product `name` and `description`.\n          - Case-insensitive.\n\n          `featured`\n          - Type: string\n          - Use only `featured=true`.\n          - Returns products where `isFeatured` is `true`.\n\n          `min`\n          - Type: number\n          - Minimum price.\n\n          `max`\n          - Type: number\n          - Maximum price.\n\n          `sort`\n          - Type: string\n          - Options: `price_asc`, `price_desc`, `best_selling`.\n\n          `page`\n          - Type: number\n          - Page number.\n          - Default: `1`.\n          - Fixed limit: `10` products per page.\n\n          ## All sorting values\n\n          Default sort when `sort` is not sent:\n\n          ```txt\n          Featured first, newest second\n          ```\n\n          Backend:\n\n          ```js\n          { isFeatured: -1, createdAt: -1 }\n          ```\n\n          Price low to high:\n\n          ```txt\n          sort=price_asc\n          ```\n\n          Backend:\n\n          ```js\n          { price: 1 }\n          ```\n\n          Price high to low:\n\n          ```txt\n          sort=price_desc\n          ```\n\n          Backend:\n\n          ```js\n          { price: -1 }\n          ```\n\n          Best selling:\n\n          ```txt\n          sort=best_selling\n          ```\n\n          Backend:\n\n          ```js\n          { sold: -1 }\n          ```\n\n          ## Combined examples\n\n          Category + price range:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&min=50000&max=250000\n          ```\n\n          Category + price range + cheapest first:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&min=50000&max=250000&sort=price_asc\n          ```\n\n          Search + price high to low:\n\n          ```txt\n          GET /api/products?keyword=iphone&sort=price_desc\n          ```\n\n          Featured + best selling:\n\n          ```txt\n          GET /api/products?featured=true&sort=best_selling\n          ```\n\n          Category + search + price range + sort + page:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone&min=50000&max=900000&sort=price_asc&page=2\n          ```\n\n          Full supported combination:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone&featured=true&min=50000&max=900000&sort=price_asc&page=1\n          ```\n\n          ## Filter order inside backend\n\n          The backend builds one MongoDB filter from all supplied query parameters:\n\n          ```js\n          {\n            isActive: true,\n            category,\n            isFeatured: true,\n            $or: [\n              { name: /keyword/i },\n              { description: /keyword/i }\n            ],\n            price: {\n              $gte: min,\n              $lte: max\n            }\n          }\n          ```\n\n          Then it applies:\n\n          ```txt\n          skip -> limit -> sort\n          ```\n\n          The response includes:\n\n          - `total` - total matching products.\n          - `page` - current page.\n          - `pages` - total pages using fixed limit `10`.\n          - `products` - current page products.\n\n          ## Frontend implementation notes\n\n          - Always keep selected filters in the URL query string.\n          - Reset `page` to `1` when category, keyword, featured, min, max, or sort changes.\n          - Send category `_id`, not category slug.\n          - Send price values as plain numbers.\n          - Only send `featured=true` when the user wants featured products only.\n          - If no sort is selected, do not send `sort`; let backend use featured/newest sorting.\n  - info:\n      name: Order Creation\n      type: folder\n      seq: 4\n    request:\n      auth: inherit\n    items:\n      - info:\n          name: pending orders check\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/pending'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Get Pending Order\n\n          #### Endpoint: `GET /api/orders/pending`\n\n          ## Description:\n          Fetches the latest unpaid, pending order of the authenticated user. Useful to prevent creating duplicate orders if the user already has an active pending order.\n\n          ## Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ## Request Description:\n          No request body required. The endpoint automatically fetches the latest pending order for the logged-in user.\n\n          ## Sample Success Response (Pending Order Exists):\n          ```json\n          {\n            \"success\": true,\n            \"order\": { \"_id\": \"69ca82d41d13ed0cbf279f25\", \"orderNumber\": \"CHP-20260330-0001\", ... }\n          }\n          ```\n\n          ### Sample Response (No Pending Order):\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"No pending unpaid order found\"\n          }\n          ```\n          ### Errors:\n          ```json\n          404 → No pending order exists.\n      - info:\n          name: Create Order\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/orders/create'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"shipToDifferentAddress\": false,\n                \"billingAddress\": {\n                  \"fullName\": \"Test User\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 12 Okpanam Road, Near Asaba Mall\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"DELTA\",\n                  \"city\": \"ASABA\",\n                  \"town\": \"OKPANAM\",\n                  \"postalCode\": \"320001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ASB\",\n                  \"redstarTownId\": 4000\n                },\n                \"recipientCity\": \"ASABA\",\n                \"recipientTownID\": 4000\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 1️⃣ Create Order\n\n          ## Description:\n          ### Creates a new order for the authenticated user.\n\n          - Calculates shipping fees automatically using Redstar API.\n          - Validates the cart items (checks stock and availability).\n          - Saves billing and shipping addresses.\n          - Returns payment information so frontend can proceed to Paystack\n\n          ## Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ### Request Body:\n          ```json\n          {\n            \"shipToDifferentAddress\": false,\n            \"billingAddress\": {\n              \"fullName\": \"User Full Name\",\n              \"phone\": \"08012345678\",\n              \"email\": \"user@example.com\",\n              \"addressLine1\": \"Street address\",\n              \"addressLine2\": \"Apartment, suite, etc.\",\n              \"state\": \"State/Region\",\n              \"city\": \"City\",\n              \"town\": \"Town\",\n              \"postalCode\": \"Postal Code\",\n              \"country\": \"Country\",\n              \"redstarCityAbbr\": \"City abbreviation for Redstar\",\n              \"redstarTownId\": 3868\n            },\n            \"shippingAddress\": {\n              \"fullName\": \"User Full Name (if different from billing)\",\n              \"phone\": \"08012345678\",\n              \"email\": \"user@example.com\",\n              \"addressLine1\": \"Street address\",\n              \"addressLine2\": \"\",\n              \"state\": \"State/Region\",\n              \"city\": \"City\",\n              \"town\": \"Town\",\n              \"postalCode\": \"Postal Code\",\n              \"country\": \"Country\",\n              \"redstarCityAbbr\": \"City abbreviation for Redstar\",\n              \"redstarTownId\": 3868\n            },\n            \"recipientCity\": \"Recipient City for shipping\",\n            \"recipientTownID\": 3868\n          }\n\n          ```\n          ## Field Descriptions:\n\n          - `shipToDifferentAddress` → true if shipping to a different address than billing.\n          - `billingAddress` → snapshot of the user’s billing address.\n          - `shippingAddress` → optional if shipToDifferentAddress is true.\n          - `recipientCity` → city code for Redstar delivery calculation.\n          - `recipientTownID` → town ID for Redstar delivery calculation.\n\n          ## Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Order created successfully\",\n            \"order\": { \"_id\": \"...\", \"orderNumber\": \"CHP-20260330-0001\", ... },\n            \"paymentReady\": true,\n            \"hasPendingOrder\": false\n          }\n          ```\n          ## Errors:\n          `400` → Billing or shipping address missing.\n          `400` → recipientCity or recipientTownID missing.\n          `400` → Cart is empty or items unavailable.\n          `500` → Internal server error.\n      - info:\n          name: Get all orders for the user\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/my-orders'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 3️⃣ Get All Orders\n\n          #### Endpoint: `GET /api/orders/my-orders`\n\n          ## Description:\n          Returns all orders placed by the authenticated user, sorted by creation date (most recent first).\n\n          ### Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n            ```\n            \n          ### Request Description:\n          No request body required.\n\n          ### Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"total\": 1,\n            \"orders\": [\n              {\n                \"pricing\": {\n                  \"subtotal\": 40000,\n                  \"deliveryFee\": 9816,\n                  \"vatAmount\": 736,\n                  \"shippingTotal\": 10552,\n                  \"totalAmount\": 50552\n                },\n                \"meta\": {\n                  \"totalItems\": 2,\n                  \"totalWeight\": 4,\n                  \"pickupType\": 1,\n                  \"senderCity\": \"ASABA\",\n                  \"senderTownID\": 480,\n                  \"recipientCity\": \"ABUJA\",\n                  \"recipientTownID\": 3868,\n                  \"shipToDifferentAddress\": false\n                },\n                \"_id\": \"69ca82d41d13ed0cbf279f25\",\n                \"user\": \"698c87428cdf77f408badbb3\",\n                \"customerEmail\": \"imobonifaceben@gmail.com\",\n                \"items\": [\n                  {\n                    \"productId\": \"69c94d49523d120bc2f3067a\",\n                    \"name\": \"itel A100C 6.6\\\" 2GB RAM/64GB ROM 5000mAh - Titanium Gold\",\n                    \"slug\": \"itel-a100c-66-2gb-ram64gb-rom-5000mah-titanium-gold\",\n                    \"image\": \"https://res.cloudinary.com/dpqb1hpmc/image/upload/v1774800172/cheepcart/products/koqu6i8eiskv2kklq2na.jpg\",\n                    \"price\": 20000,\n                    \"quantity\": 2,\n                    \"subtotal\": 40000,\n                    \"weight\": 4\n                  }\n                ],\n                \"billingAddress\": {\n                  \"fullName\": \"Test User\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 1 Abuja Street\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"town\": \"Wuse\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABV\",\n                  \"redstarTownId\": 3868\n                },\n                \"shippingAddress\": {\n                  \"fullName\": \"Test User\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 1 Abuja Street\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"town\": \"Wuse\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABV\",\n                  \"redstarTownId\": 3868\n                },\n                \"paymentStatus\": \"unpaid\",\n                \"paymentMethod\": \"paystack\",\n                \"paymentReference\": null,\n                \"paidAt\": null,\n                \"orderStatus\": \"pending\",\n                \"shipmentStatus\": \"not_created\",\n                \"shipmentReference\": null,\n                \"trackingNumber\": null,\n                \"shipmentCreatedAt\": null,\n                \"abandonedEmailSent\": false,\n                \"abandonedEmailSentAt\": null,\n                \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n                \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n                \"orderNumber\": \"CHP-20260330-0001\",\n                \"__v\": 0\n              }\n            ]\n          }\n          ```\n          ### Errors:\n\n          `500` → Internal server error.\n      - info:\n          name: Get a single order by its _id\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/69ca82d41d13ed0cbf279f25'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 4️⃣ Get Single Order\n\n          ### Endpoint: `GET /api/orders/:id`\n\n          ### Description:\n          Fetches a single order by its _id. Only the owner of the order can access it.\n\n          ### Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ``` \n          ### URL Parameter:\n          ```json\n          :id → The MongoDB _id of the order to fetch. Example: \"69ca82d41d13ed0cbf279f25\"\n          ```\n          ### Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"order\": {\n              \"pricing\": {\n                \"subtotal\": 40000,\n                \"deliveryFee\": 9816,\n                \"vatAmount\": 736,\n                \"shippingTotal\": 10552,\n                \"totalAmount\": 50552\n              },\n              \"meta\": {\n                \"totalItems\": 2,\n                \"totalWeight\": 4,\n                \"pickupType\": 1,\n                \"senderCity\": \"ASABA\",\n                \"senderTownID\": 480,\n                \"recipientCity\": \"ABUJA\",\n                \"recipientTownID\": 3868,\n                \"shipToDifferentAddress\": false\n              },\n              \"_id\": \"69ca82d41d13ed0cbf279f25\",\n              \"user\": \"698c87428cdf77f408badbb3\",\n              \"customerEmail\": \"imobonifaceben@gmail.com\",\n              \"items\": [\n                {\n                  \"productId\": \"69c94d49523d120bc2f3067a\",\n                  \"name\": \"itel A100C 6.6\\\" 2GB RAM/64GB ROM 5000mAh - Titanium Gold\",\n                  \"slug\": \"itel-a100c-66-2gb-ram64gb-rom-5000mah-titanium-gold\",\n                  \"image\": \"https://res.cloudinary.com/dpqb1hpmc/image/upload/v1774800172/cheepcart/products/koqu6i8eiskv2kklq2na.jpg\",\n                  \"price\": 20000,\n                  \"quantity\": 2,\n                  \"subtotal\": 40000,\n                  \"weight\": 4\n                }\n              ],\n              \"billingAddress\": {\n                \"fullName\": \"Test User\",\n                \"phone\": \"08012345678\",\n                \"email\": \"test@gmail.com\",\n                \"addressLine1\": \"No 1 Abuja Street\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"town\": \"Wuse\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\",\n                \"redstarCityAbbr\": \"ABV\",\n                \"redstarTownId\": 3868\n              },\n              \"shippingAddress\": {\n                \"fullName\": \"Test User\",\n                \"phone\": \"08012345678\",\n                \"email\": \"test@gmail.com\",\n                \"addressLine1\": \"No 1 Abuja Street\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"town\": \"Wuse\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\",\n                \"redstarCityAbbr\": \"ABV\",\n                \"redstarTownId\": 3868\n              },\n              \"paymentStatus\": \"unpaid\",\n              \"paymentMethod\": \"paystack\",\n              \"paymentReference\": null,\n              \"paidAt\": null,\n              \"orderStatus\": \"pending\",\n              \"shipmentStatus\": \"not_created\",\n              \"shipmentReference\": null,\n              \"trackingNumber\": null,\n              \"shipmentCreatedAt\": null,\n              \"abandonedEmailSent\": false,\n              \"abandonedEmailSentAt\": null,\n              \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n              \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"__v\": 0\n            }\n          }\n          ```\n          ### Error Responses:\n\n          `404` → Order not found.\n          `400` → Invalid ID format.\n      - info:\n          name: Cancel Order\n          type: http\n          seq: 5\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/orders/:orderId/cancel'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          params:\n            - name: orderId\n              value: ''\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Delete Order\n          type: http\n          seq: 6\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/orders/:orderId'\n          params:\n            - name: orderId\n              value: ''\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## eletes an order ONLY if:\n\n          orderStatus = cancelled\n      - info:\n          name: 'GET ALL ORDERS BY ADMIN '\n          type: http\n          seq: 7\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/admin/all'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: ''\n              value: ''\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n  - info:\n      name: Payments\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Payments APIs\n\n        This folder contains order payment endpoints and the admin Paystack dashboard endpoint.\n\n        ## Frontend Notes\n\n        - Customers use initialize and verify endpoints during checkout.\n        - Admin dashboard uses `GET /api/payments/admin/paystack-wallet`.\n        - The frontend must not call Paystack directly because Paystack requires the secret key.\n      type: text/markdown\n    items:\n      - info:\n          name: Initialize Payment\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/payments/initialize/69ca82d41d13ed0cbf279f25'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 1️⃣ Initialize Order Payment\n\n          ### 🔹 Endpoint\n          `POST /api/payments/initialize/:orderId`\n\n          ## 🔹 Description\n\n          Initializes payment for an order using Paystack.\n\n          ## This endpoint:\n          - Confirms the order exists\n          - Ensures the order is not already paid or cancelled\n          - Sends a request to Paystack\n          - Returns a payment link (authorization URL)\n\n          #### 👉 The frontend should redirect the user to this URL to complete payment.\n\n          ## 🔹 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n          ### 🔹 URL Params\n          `orderId` → The ID of the order you want to pay for\n          Example: 69ca82d41d13ed0cbf279f25\n\n          ### 🔹 Request Description\n          - No request body is required.\n          - The orderId in the URL is used to fetch the order.\n\n          # 🔹 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment initialized successfully\",\n            \"payment\": {\n              \"orderId\": \"69ca82d41d13ed0cbf279f25\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"paymentStatus\": \"pending\",\n              \"reference\": \"PAY-CHP-20260330-0001-1711800000000\",\n              \"amount\": 50552,\n              \"authorizationUrl\": \"https://checkout.paystack.com/xxxxx\",\n              \"accessCode\": \"xxxxxx\"\n            }\n          }\n          ```\n          # 🔹 What Frontend Should Do\n          1. Call this endpoint\n          2. Get authorizationUrl\n          3. Redirect user to that URL\n          4. User completes payment on Paystack\n          🔹 Error Responses\n\n          ### ❌ Order Not Found\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ### ❌ Already Paid\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"This order has already been paid for\"\n          }\n          ```\n          ### ❌ Cancelled Order\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Cancelled orders cannot be paid for\"\n          }\n      - info:\n          name: Verify Payment\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/payments/verify/PAY-CHP-20260330-0001-1774884757746'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 2️⃣ Verify Order Payment\n\n          ### 🔹 Endpoint\n          `GET /api/payment/verify/:reference`\n\n          # 🔹 Description\n          Verifies a payment after the user completes it on Paystack.\n\n          ### This endpoint:\n          - Confirms payment with Paystack\n          - Validates payment amount\n          - Updates order status to paid\n          - Deducts product stock\n          - Clears the user cart\n\n          ### 🔹 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ### 🔹 URL Params\n          `reference` → Payment reference returned from initialize endpoint\n          Example: PAY-CHP-20260330-0001-1711800000000\n\n          ### 🔹 Request Description\n\n          No request body required.\n          The reference is used to verify payment with Paystack.\n\n          ### 🔹 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment verified successfully\",\n            \"order\": {\n              \"_id\": \"69ca82d41d13ed0cbf279f25\",\n              \"paymentStatus\": \"paid\",\n              \"orderStatus\": \"confirmed\"\n            },\n            \"nextStep\": \"Create shipment with RedStar\"\n          }\n          ```\n\n          ### 🔹 What Happens Internally\n          ✔ Payment verified with Paystack\n          ✔ Order marked as PAID\n          ✔ Order status → CONFIRMED\n          ✔ Product stock reduced\n          ✔ User cart cleared\n\n          ### 🔹 Error Responses\n\n          ####❌ Missing Reference\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Payment reference is required\"\n          }\n          ❌ Payment Failed\n          {\n            \"success\": false,\n            \"message\": \"Payment was not successful\"\n          }\n          ❌ Amount Mismatch\n          {\n            \"success\": false,\n            \"message\": \"Paid amount does not match order total\"\n          }\n          ❌ Order Not Found\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ## 🔥 FULL PAYMENT FLOW (Frontend Guide)\n          1. User creates order\n          2. Call POST /payment/initialize/:orderId\n          3. Redirect user to Paystack (authorizationUrl)\n          4. User completes payment\n          5. Call GET /payment/verify/:reference\n          6. Show success page\n\n          ### ⚠️ IMPORTANT NOTES (Frontend + Backend)\n          🔐 Authentication\n          All endpoints require Bearer Token\n          💳 Amount Format\n          Paystack uses kobo\n          Backend converts automatically\n\n          ###\n          🔁 Verification Method\n          Current: Manual (/verify)\n          Production: Use Paystack Webhook (recommended)\n      - info:\n          name: Admin Paystack Wallet\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/payments/admin/paystack-wallet?perPage=20&page=1&status=success'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          params:\n            - name: perPage\n              value: '20'\n              type: query\n            - name: page\n              value: '1'\n              type: query\n            - name: status\n              value: success\n              type: query\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Admin Paystack Wallet\n\n          `GET /api/payments/admin/paystack-wallet`\n\n          ## Description\n\n          Returns Paystack wallet balances, recent Paystack transactions, and transaction totals for the admin dashboard.\n\n          The frontend should call this backend endpoint. Do not call Paystack directly from frontend because Paystack requires the secret key.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          ```http\n          Authorization: Bearer <admin-token>\n          ```\n\n          ## Query Parameters\n\n          | Name | Type | Required | Description |\n          |------|------|----------|-------------|\n          | `page` | number | No | Transaction page. Default: `1`. |\n          | `perPage` | number | No | Transactions per page. Default: `20`, max: `100`. |\n          | `status` | string | No | Paystack transaction status. Common values: `success`, `failed`, `abandoned`. |\n          | `from` | string | No | Start date, for example `2026-05-01` or ISO datetime. |\n          | `to` | string | No | End date, for example `2026-05-05` or ISO datetime. |\n          | `currency` | string | No | Currency code, for example `NGN`. |\n          | `customer` | number | No | Paystack customer ID filter. |\n\n          ## Example Request\n\n          ```http\n          GET /api/payments/admin/paystack-wallet?perPage=20&page=1&status=success\n          Authorization: Bearer <admin-token>\n          ```\n\n          ## Success Response\n\n          ```json\n          {\n            \"success\": true,\n            \"wallet\": {\n              \"balances\": [\n                {\n                  \"currency\": \"NGN\",\n                  \"balanceMinor\": 1700000,\n                  \"balance\": 17000,\n                  \"formattedBalance\": \"NGN 17,000.00\"\n                }\n              ],\n              \"primaryBalance\": {\n                \"currency\": \"NGN\",\n                \"balanceMinor\": 1700000,\n                \"balance\": 17000,\n                \"formattedBalance\": \"NGN 17,000.00\"\n              }\n            },\n            \"transactions\": {\n              \"page\": 1,\n              \"perPage\": 20,\n              \"meta\": {\n                \"next\": null,\n                \"previous\": null,\n                \"perPage\": 20\n              },\n              \"data\": [\n                {\n                  \"id\": \"4099260516\",\n                  \"reference\": \"PAY-CHP-20260330-0001-1711800000000\",\n                  \"status\": \"success\",\n                  \"gatewayResponse\": \"Successful\",\n                  \"amountMinor\": 5055200,\n                  \"amount\": 50552,\n                  \"formattedAmount\": \"NGN 50,552.00\",\n                  \"feesMinor\": 75000,\n                  \"fees\": 750,\n                  \"formattedFees\": \"NGN 750.00\",\n                  \"currency\": \"NGN\",\n                  \"channel\": \"card\",\n                  \"paidAt\": \"2026-05-05T10:30:00.000Z\",\n                  \"createdAt\": \"2026-05-05T10:28:00.000Z\",\n                  \"customer\": {\n                    \"email\": \"customer@example.com\",\n                    \"firstName\": \"Jane\",\n                    \"lastName\": \"Doe\",\n                    \"customerCode\": \"CUS_123\"\n                  },\n                  \"order\": {\n                    \"orderId\": \"69ca82d41d13ed0cbf279f25\",\n                    \"orderNumber\": \"CHP-20260330-0001\"\n                  }\n                }\n              ]\n            },\n            \"totals\": {\n              \"totalTransactions\": 24,\n              \"totalVolumeMinor\": 120000000,\n              \"totalVolume\": 1200000,\n              \"formattedTotalVolume\": \"NGN 1,200,000.00\",\n              \"totalVolumeByCurrency\": [\n                {\n                  \"currency\": \"NGN\",\n                  \"amountMinor\": 120000000,\n                  \"amount\": 1200000,\n                  \"formattedAmount\": \"NGN 1,200,000.00\"\n                }\n              ],\n              \"pendingTransfersMinor\": 0,\n              \"pendingTransfers\": 0,\n              \"formattedPendingTransfers\": \"NGN 0.00\",\n              \"pendingTransfersByCurrency\": []\n            }\n          }\n          ```\n\n          ## Frontend Mapping\n\n          - Wallet card: use `wallet.primaryBalance.formattedBalance`.\n          - Balance by currency: map `wallet.balances`.\n          - Recent payments table: map `transactions.data`.\n          - Transaction amount: display `formattedAmount`.\n          - Paystack fee: display `formattedFees`.\n          - Customer email: use `customer.email`.\n          - Order reference: use `order.orderNumber` when available.\n          - Summary card: use `totals.formattedTotalVolume` and `totals.totalTransactions`.\n\n          ## Error Response\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Paystack error message\"\n          }\n          ```\n  - info:\n      name: Shipment\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Shipment APIs\n\n        Base URL:\n\n        ```txt\n        /api/shipments\n        ```\n\n        This folder contains shipment creation, tracking, admin monitoring, and retry endpoints.\n\n        ## Endpoints\n\n        | Method | Endpoint | Access | Frontend use |\n        |--------|----------|--------|--------------|\n        | POST | `/api/shipments/create/:orderId` | Admin | Manually create a Redstar shipment for a paid and confirmed order. |\n        | GET | `/api/shipments/track/:trackingNumber` | Authenticated user | Track one shipment with its Redstar waybill/tracking number. |\n        | GET | `/api/shipments/get-all-shipments` | Admin | Load the admin shipment monitor table. |\n        | POST | `/api/shipments/retry/:orderId` | Admin | Retry tracking refresh for one order. |\n\n        ## Important Frontend Rule\n\n        Track and retry use different URL parameters:\n\n        | Action | Use this field | Example |\n        |--------|----------------|---------|\n        | Track shipment | `trackingNumber` | `GET /api/shipments/track/RSASB1186443` |\n        | Retry shipment | order `_id` | `POST /api/shipments/retry/69e355eb827eaadacc96e7ca` |\n\n        When using `GET /api/shipments/get-all-shipments`, each row contains both fields:\n\n        - `_id` is the `orderId` for retry.\n        - `trackingNumber` is the waybill for tracking.\n\n        ## Shipment Lifecycle\n\n        - Order starts with `shipmentStatus: \"not_created\"`.\n        - After payment succeeds, backend attempts to create a Redstar shipment automatically.\n        - If shipment creation succeeds, the order receives a `trackingNumber`.\n        - Tracking can be refreshed manually with the track endpoint or automatically by the shipment sync job.\n        - When Redstar reports delivery, the order becomes `delivered`.\n\n        ## Important Fields\n\n        | Field | Description |\n        |-------|-------------|\n        | `shipmentStatus` | Backend shipment lifecycle such as `not_created`, `created`, `delivered`, or `failed`. |\n        | `deliveryStatus` | Customer-facing delivery progress mapped from Redstar status. |\n        | `trackingNumber` | Redstar waybill number used for tracking. |\n        | `shipmentReference` | Provider/order reference returned by Redstar. |\n        | `shipmentRetryCount` | Number of failed automatic tracking attempts. |\n        | `shipmentError` | Last tracking or shipment error message, if any. |\n        | `lastTrackedAt` | Last time tracking was refreshed. |\n\n        ## Delivery Status Values\n\n        Current mapped values are:\n\n        - `pending`\n        - `picked`\n        - `in_transit`\n        - `delivered`\n        - `issue`\n        - `delayed`\n        - `unknown`\n\n        ## Frontend Flow\n\n        1. Admin shipment table: call `GET /api/shipments/get-all-shipments`.\n        2. Track button/details: call `GET /api/shipments/track/:trackingNumber`.\n        3. Retry button: call `POST /api/shipments/retry/:orderId` using the row `_id`.\n        4. Manual create button: call `POST /api/shipments/create/:orderId`.\n      type: text/markdown\n    items:\n      - info:\n          name: Create shipment admin\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipments/create/:orderId'\n          params:\n            - name: orderId\n              value: 69e355eb827eaadacc96e7ca\n              type: path\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Shipment Admin\n\n          `POST /api/shipments/create/:orderId`\n\n          ## Description\n\n          Creates a Redstar shipment for a paid and confirmed order.\n\n          Shipment creation is also handled automatically after successful payment, but this endpoint is useful for admin manual creation or retrying shipment creation when the automatic flow failed.\n\n          ## Authentication\n\n          Bearer token required.\n\n          Admin only.\n\n          ## Path Parameters\n\n          | Name | Type | Required | Description |\n          |------|------|----------|-------------|\n          | `orderId` | string | Yes | MongoDB `_id` of the order to create shipment for. |\n\n          ## Preconditions\n\n          The order must exist and must satisfy:\n\n          - `paymentStatus` is `paid`\n          - `orderStatus` is `confirmed`\n\n          ## What It Does Internally\n\n          - Loads the order.\n          - Builds a Redstar shipment payload from the order shipping address and order totals.\n          - Calls Redstar shipment creation API.\n          - Saves `shipmentStatus`, `deliveryStatus`, `shipmentReference`, `trackingNumber`, and `shipmentCreatedAt`.\n          - Moves the order to `processing` after successful shipment creation.\n\n          ## Duplicate Protection\n\n          If the order already has `shipmentStatus` set to `created`, the endpoint returns the existing shipment details instead of creating a duplicate shipment.\n\n          ## Example Request\n\n          ```http\n          POST /api/shipments/create/69e355eb827eaadacc96e7ca\n          Authorization: Bearer <admin-token>\n          ```\n\n          ## Successful Creation Response\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Shipment created successfully\",\n            \"shipment\": {\n              \"orderId\": \"69e355eb827eaadacc96e7ca\",\n              \"orderNumber\": \"CHP-20260418-0001\",\n              \"shipmentStatus\": \"created\",\n              \"trackingNumber\": \"RSASB1186443\",\n              \"shipmentReference\": \"CHP-20260418-0001\",\n              \"createdAt\": \"2026-04-18T10:00:33.756Z\"\n            }\n          }\n          ```\n\n          ## Already Exists Response\n\n          ```json\n          {\n            \"success\": true,\n            \"alreadyExists\": true,\n            \"message\": \"Shipment already created\",\n            \"shipment\": {\n              \"orderId\": \"69e355eb827eaadacc96e7ca\",\n              \"orderNumber\": \"CHP-20260418-0001\",\n              \"shipmentStatus\": \"created\",\n              \"trackingNumber\": \"RSASB1186443\",\n              \"shipmentReference\": \"CHP-20260418-0001\",\n              \"createdAt\": \"2026-04-18T10:00:33.756Z\"\n            }\n          }\n          ```\n\n          ## Common Error Responses\n\n          Order not found:\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n\n          Order not paid:\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not paid\"\n          }\n          ```\n\n          Order not confirmed:\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not confirmed\"\n          }\n          ```\n\n          Provider failure:\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Shipment failed at provider\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          - Use this endpoint from the admin order detail page.\n          - Do not show it to normal users.\n          - After success, display `trackingNumber` and allow admin/customer to track shipment.\n          - If `alreadyExists` is true, treat it as success and show the returned shipment details.\n      - info:\n          name: Track shipment by tracking number\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipments/track/:trackingNumber'\n          params:\n            - name: trackingNumber\n              value: RSASB1186443\n              type: path\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Track Shipment By Tracking Number\n\n          `GET /api/shipments/track/:trackingNumber`\n\n          ## Description\n\n          Fetches live Redstar tracking information with the shipment tracking number/waybill number.\n\n          Use this endpoint on the customer order details page after the order already has a `trackingNumber`.\n\n          Do not call this endpoint with the order `_id`. It only accepts the Redstar waybill/tracking number.\n\n          ## Authentication\n\n          Required.\n\n          ```http\n          Authorization: Bearer <user-or-admin-token>\n          ```\n\n          Any authenticated user can call this endpoint. It is not admin-only, but the user must be logged in because the backend route uses `protect`.\n\n          ## Path Parameters\n\n          | Name | Type | Required | Description |\n          |------|------|----------|-------------|\n          | `trackingNumber` | string | Yes | Redstar waybill/tracking number saved on the order. Example: `RSASB1186443`. |\n\n          Frontend should use:\n\n          ```js\n          GET /api/shipments/track/${encodeURIComponent(order.trackingNumber)}\n          ```\n\n          ## What It Does Internally\n\n          - Calls Redstar tracking API through `trackRedstarShipment`.\n          - Converts Redstar status code into app status with `mapToAppStatus`.\n          - Looks for an order with the same `trackingNumber`.\n          - If an order is found, updates `deliveryStatus`, `orderStatus`, and `lastTrackedAt`.\n          - If Redstar reports delivery, sets `orderStatus` and `shipmentStatus` to `delivered`.\n          - If no matching order is found, it can still return provider tracking data, but no order is updated.\n\n          ## Mapped Status Values\n\n          Frontend should display the `shipment.status` field, not the raw `statusCode`.\n\n          Current backend mapped values are:\n\n          - `pending`\n          - `picked`\n          - `in_transit`\n          - `delivered`\n          - `issue`\n          - `delayed`\n          - `unknown`\n\n          `shipment.orderStatus` is the order status derived from the delivery status. Common values are `processing`, `shipped`, and `delivered`.\n\n          ## Example Request\n\n          ```http\n          GET /api/shipments/track/RSASB1186443\n          Authorization: Bearer <token>\n          ```\n\n          ## Success Response\n\n          HTTP `200`\n\n          ```json\n          {\n            \"success\": true,\n            \"shipment\": {\n              \"trackingNumber\": \"RSASB1186443\",\n              \"statusCode\": 4,\n              \"status\": \"in_transit\",\n              \"orderStatus\": \"shipped\",\n              \"sender\": \"CheepCart\",\n              \"recipient\": \"Test User\",\n              \"deliveryType\": \"Express Delivery\",\n              \"weight\": 2,\n              \"pricing\": {\n                \"deliveryFee\": 8500,\n                \"vat\": 637.5,\n                \"total\": 9137.5\n              },\n              \"timeline\": [\n                {\n                  \"name\": \"Shipment Created\",\n                  \"completed\": true,\n                  \"date\": \"2026-04-18T10:00:33.756Z\",\n                  \"location\": \"Asaba\"\n                },\n                {\n                  \"name\": \"In Transit\",\n                  \"completed\": true,\n                  \"date\": \"2026-04-19T09:15:00.000Z\",\n                  \"location\": \"Lagos\"\n                }\n              ]\n            }\n          }\n          ```\n\n          ## Tracking Not Available Yet\n\n          Redstar may return a provider error when a newly created waybill is not ready for tracking. In that case the API still returns HTTP `200` with a safe pending response:\n\n          ```json\n          {\n            \"success\": true,\n            \"shipment\": {\n              \"trackingNumber\": \"RSASB1186443\",\n              \"status\": \"pending\",\n              \"message\": \"Tracking not available yet. Please try again later.\"\n            }\n          }\n          ```\n\n          ## Validation Error\n\n          HTTP `400`\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Tracking number is required\"\n          }\n          ```\n\n          ## Other Error Response\n\n          HTTP `500`\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Provider error message\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          - Get the `trackingNumber` from the order object or from `GET /api/shipments/get-all-shipments`.\n          - Do not use the order `_id` for this endpoint.\n          - Use `shipment.status` for badges and progress state.\n          - Use `shipment.timeline` to render the tracking steps.\n          - If response is pending with a message, show a soft message and let the user retry later.\n          - Do not depend on `statusCode`; it is provider-specific.\n      - info:\n          name: Get all shipments admin\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipments/get-all-shipments'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get All Shipments Admin\n\n          `GET /api/shipments/get-all-shipments`\n\n          ## Description\n\n          Returns all orders that already have a shipment tracking number.\n\n          Use this endpoint for the admin shipment monitor, shipment table, or dashboard widgets.\n\n          ## Authentication\n\n          Bearer token required.\n\n          Admin only.\n\n          ## Query Parameters\n\n          No query parameters are currently supported.\n\n          ## What The API Returns\n\n          Each shipment item is an order summary with:\n\n          - `_id`\n          - `orderNumber`\n          - `trackingNumber`\n          - `shipmentStatus`\n          - `deliveryStatus`\n          - `shipmentRetryCount`\n          - `shipmentError`\n          - `createdAt`\n\n          Results are sorted newest first.\n\n          Important frontend mapping:\n\n          - Use `_id` as `orderId` for `POST /api/shipments/retry/:orderId`.\n          - Use `trackingNumber` for `GET /api/shipments/track/:trackingNumber`.\n\n          ## Example Request\n\n          ```http\n          GET /api/shipments/get-all-shipments\n          Authorization: Bearer <admin-token>\n          ```\n\n          ## Success Response\n\n          ```json\n          {\n            \"success\": true,\n            \"total\": 2,\n            \"shipments\": [\n              {\n                \"_id\": \"69e355eb827eaadacc96e7ca\",\n                \"orderNumber\": \"CHP-20260418-0001\",\n                \"trackingNumber\": \"RSASB1186443\",\n                \"shipmentStatus\": \"created\",\n                \"deliveryStatus\": \"in_transit\",\n                \"shipmentRetryCount\": 0,\n                \"shipmentError\": null,\n                \"createdAt\": \"2026-04-18T10:00:33.756Z\"\n              },\n              {\n                \"_id\": \"69e355eb827eaadacc96e7cb\",\n                \"orderNumber\": \"CHP-20260416-0001\",\n                \"trackingNumber\": \"RSASB1148381\",\n                \"shipmentStatus\": \"created\",\n                \"deliveryStatus\": \"pending\",\n                \"shipmentRetryCount\": 1,\n                \"shipmentError\": \"Tracking not available yet\",\n                \"createdAt\": \"2026-04-16T09:30:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Error Response\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Failed to fetch shipments\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          - Render this as an admin table.\n          - Use `_id` when retrying shipment tracking.\n          - Use `trackingNumber` when opening the track shipment endpoint.\n          - Use `shipmentStatus` for provider/shipment lifecycle.\n          - Use `deliveryStatus` for customer-facing delivery progress.\n          - Show a retry action when `shipmentRetryCount > 0` or `shipmentError` is not empty.\n          - Suggested badge colors: pending yellow, picked teal, in_transit blue, delivered green, issue red, delayed orange, unknown gray.\n      - info:\n          name: Retry shipment tracking admin\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipments/retry/:orderId'\n          params:\n            - name: orderId\n              value: 69e355eb827eaadacc96e7ca\n              type: path\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Retry Shipment Tracking Admin\n\n          `POST /api/shipments/retry/:orderId`\n\n          ## Description\n\n          Forces an immediate Redstar tracking refresh for one order.\n\n          Use this from the admin shipment monitor when a shipment already has a `trackingNumber` but automatic tracking failed, `shipmentRetryCount` increased, or `shipmentError` is present.\n\n          This endpoint uses the order `_id`, not the tracking number.\n\n          ## Authentication\n\n          Required.\n\n          ```http\n          Authorization: Bearer <admin-token>\n          ```\n\n          Admin only. The backend route uses both `protect` and `adminOnly`.\n\n          ## Path Parameters\n\n          | Name | Type | Required | Description |\n          |------|------|----------|-------------|\n          | `orderId` | string | Yes | MongoDB `_id` of the order whose shipment tracking should be retried. |\n\n          Frontend should use the `_id` from each row returned by `GET /api/shipments/get-all-shipments`:\n\n          ```js\n          POST /api/shipments/retry/${shipment._id}\n          ```\n\n          ## What It Does Internally\n\n          - Finds the order by `orderId`.\n          - Requires the order to already have a `trackingNumber`.\n          - Calls Redstar tracking API.\n          - Updates `deliveryStatus`, `orderStatus`, and `lastTrackedAt`.\n          - Resets `shipmentRetryCount` to `0`.\n          - Clears `shipmentError`.\n          - If delivered, sets `orderStatus` and `shipmentStatus` to `delivered`.\n\n          ## Example Request\n\n          ```http\n          POST /api/shipments/retry/69e355eb827eaadacc96e7ca\n          Authorization: Bearer <admin-token>\n          ```\n\n          ## Success Response\n\n          HTTP `200`\n\n          The backend returns the full updated order document in `order`. Frontend can use these fields to refresh the shipment table row:\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Shipment retried successfully\",\n            \"order\": {\n              \"_id\": \"69e355eb827eaadacc96e7ca\",\n              \"orderNumber\": \"CHP-20260418-0001\",\n              \"shipmentStatus\": \"created\",\n              \"deliveryStatus\": \"in_transit\",\n              \"orderStatus\": \"shipped\",\n              \"trackingNumber\": \"RSASB1186443\",\n              \"shipmentRetryCount\": 0,\n              \"shipmentError\": null,\n              \"lastTrackedAt\": \"2026-05-05T12:00:00.000Z\"\n            }\n          }\n          ```\n\n          ## Tracking Not Available Yet\n\n          If Redstar says the tracking number is not ready yet, the backend returns HTTP `200` so the admin UI can show a soft message instead of treating it as a hard failure.\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Tracking not available yet. Try again later.\",\n            \"shipment\": {\n              \"status\": \"pending\"\n            }\n          }\n          ```\n\n          In this response, no updated `order` is returned. Keep the existing table row and show the message.\n\n          ## Shipment Not Found\n\n          HTTP `404`\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Shipment not found\"\n          }\n          ```\n\n          This means either the order does not exist or the order does not have a `trackingNumber` yet.\n\n          ## Other Error Response\n\n          HTTP `500`\n\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Provider or server error message\"\n          }\n          ```\n\n          ## Frontend Notes\n\n          - Show this action only to admins.\n          - Use the shipment row `_id` as `orderId`.\n          - Do not send the `trackingNumber` in the URL for retry.\n          - Useful button label: `Retry tracking`.\n          - Disable while request is running to avoid duplicate clicks.\n          - After success, refresh the shipment table row with the returned `order`.\n          - If the response has `shipment.status: \"pending\"` and no `order`, keep the row unchanged and show the returned message.\n  - info:\n      name: Pre-Order\n      type: folder\n      seq: 8\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # CheepCart Pre-Order API\n\n        ## What this feature is for\n\n        The pre-order feature is for products the admin wants to show on the website before normal checkout is available.\n\n        Example use case:\n        - Admin lists products available for China pre-order.\n        - Frontend displays those products on one pre-order page.\n        - Customer clicks a product.\n        - Customer fills an enquiry form.\n        - No payment is collected immediately.\n        - Admin sees the enquiry in the dashboard and follows up with the customer.\n\n        ## Important frontend note\n\n        Pre-order products are not the same as normal products.\n\n        Do not add them to cart.\n        Do not send them to checkout.\n        Do not initialize Paystack payment for them.\n\n        The customer should only submit an enquiry form.\n\n        ## Frontend page flow\n\n        1. Call `GET /api/pre-order-products`.\n        2. Display the returned `products` array.\n        3. When a user clicks a product, open a detail page or modal.\n        4. Use the product `_id` as `productId` when submitting the enquiry.\n        5. Call `POST /api/pre-order-enquiries`.\n        6. Show a success message after submission.\n\n        ## Admin dashboard flow\n\n        1. Admin creates pre-order products from the dashboard.\n        2. Frontend users submit enquiries for those products.\n        3. Admin views enquiries under the pre-order section.\n        4. Admin updates enquiry status as they contact the customer.\n\n        ## Product status values\n\n        A pre-order product can have one of these statuses:\n\n        - `available` - product can receive enquiries.\n        - `coming_soon` - product is visible and can still receive enquiries.\n        - `closed` - product is visible but enquiry submission is blocked.\n\n        ## Enquiry status values\n\n        An enquiry can have one of these statuses:\n\n        - `pending`\n        - `contacted`\n        - `confirmed`\n        - `cancelled`\n        - `completed`\n\n        ## Admin image upload\n\n        For creating or updating a pre-order product from the admin dashboard, send the image file directly with `multipart/form-data`.\n\n        Use this exact file field name:\n\n        ```txt\n        image: [file]\n        ```\n\n        The backend uploads the image to Cloudinary and saves it on the product as:\n\n        ```json\n        {\n          \"secure_url\": \"https://res.cloudinary.com/your-cloud/image/upload/sample.jpg\",\n          \"public_id\": \"cheepcart/pre-order-products/sample\"\n        }\n        ```\n\n        Frontend should not send only an image URL string for create/update. The normal admin flow is:\n\n        1. Build a `FormData` object.\n        2. Append text fields like `name`, `description`, `price`, `status`, and `displayOrder`.\n        3. Append the selected image file with key `image`.\n        4. Send the request without manually setting `Content-Type`.\n      type: text/markdown\n    items:\n      - info:\n          name: 01 Get Pre-Order Products\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products'\n          auth: inherit\n        settings:\n          encodeUrl
