ple.com\",\n              \"addressLine1\": \"Street address\",\n              \"addressLine2\": \"\",\n              \"state\": \"State/Region\",\n              \"city\": \"City\",\n              \"town\": \"Town\",\n              \"postalCode\": \"Postal Code\",\n              \"country\": \"Country\",\n              \"redstarCityAbbr\": \"City abbreviation for Redstar\",\n              \"redstarTownId\": 3868\n            },\n            \"recipientCity\": \"Recipient City for shipping\",\n            \"recipientTownID\": 3868\n          }\n\n          ```\n          ## Field Descriptions:\n\n          - `shipToDifferentAddress` \u2192 true if shipping to a different address than billing.\n          - `billingAddress` \u2192 snapshot of the user\u2019s billing address.\n          - `shippingAddress` \u2192 optional if shipToDifferentAddress is true.\n          - `recipientCity` \u2192 city code for Redstar delivery calculation.\n          - `recipientTownID` \u2192 town ID for Redstar delivery calculation.\n\n          ## Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Order created successfully\",\n            \"order\": { \"_id\": \"...\", \"orderNumber\": \"CHP-20260330-0001\", ... },\n            \"paymentReady\": true,\n            \"hasPendingOrder\": false\n          }\n          ```\n          ## Errors:\n          `400` \u2192 Billing or shipping address missing.\n          `400` \u2192 recipientCity or recipientTownID missing.\n          `400` \u2192 Cart is empty or items unavailable.\n          `500` \u2192 Internal server error.\n      - info:\n          name: Delete Order\n          type: http\n          seq: 6\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/orders/:orderId'\n          params:\n            - name: orderId\n              value: ''\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## eletes an order ONLY if:\n\n          orderStatus = cancelled\n      - info:\n          name: Get a single order by its _id\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/69ca82d41d13ed0cbf279f25'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 4\uFE0F\u20E3 Get Single Order\n\n          ### Endpoint: `GET /api/orders/:id`\n\n          ### Description:\n          Fetches a single order by its _id. Only the owner of the order can access it.\n\n          ### Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ``` \n          ### URL Parameter:\n          ```json\n          :id \u2192 The MongoDB _id of the order to fetch. Example: \"69ca82d41d13ed0cbf279f25\"\n          ```\n          ### Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"order\": {\n              \"pricing\": {\n                \"subtotal\": 40000,\n                \"deliveryFee\": 9816,\n                \"vatAmount\": 736,\n                \"shippingTotal\": 10552,\n                \"totalAmount\": 50552\n              },\n              \"meta\": {\n                \"totalItems\": 2,\n                \"totalWeight\": 4,\n                \"pickupType\": 1,\n                \"senderCity\": \"ASABA\",\n                \"senderTownID\": 480,\n                \"recipientCity\": \"ABUJA\",\n                \"recipientTownID\": 3868,\n                \"shipToDifferentAddress\": false\n              },\n              \"_id\": \"69ca82d41d13ed0cbf279f25\",\n              \"user\": \"698c87428cdf           \"paidAt\": null,\n              \"orderStatus\": \"pending\",\n              \"shipmentStatus\": \"not_created\",\n              \"shipmentReference\": null,\n              \"trackingNumber\": null,\n              \"shipmentCreatedAt\": null,\n              \"abandonedEmailSent\": false,\n              \"abandonedEmailSentAt\": null,\n              \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n              \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"__v\": 0\n            }\n          }\n          ```\n          ### Error Responses:\n\n          `404` \u2192 Order not found.\n          `400` \u2192 Invalid ID format.\n      - info:\n          name: 'GET ALL ORDERS BY ADMIN '\n          type: http\n          seq: 7\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/admin/all?orderStatus=delivered'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: ''\n              value: ''\n          params:\n            - name: orderStatus\n              value: delivered\n              type: query\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Get all orders for the user\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/my-orders'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 3\uFE0F\u20E3 Get All Orders\n\n          #### Endpoint: `GET /api/orders/my-orders`\n\n          ## Description:\n          Returns all orders placed by the authenticated user, sorted by creation date (most recent first).\n\n          ### Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n            ```\n            \n          ### Request Description:\n          No request body required.\n\n          ### Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"total\": 1,\n            \"orders\": [\n              {\n                \"pricing\": {\n                  \"subtotal\": 40000,\n                  \"deliveryFee\": 9816,\n                  \"vatAmount\": 736,\n                  \"shippingTotal\": 10552,\n                  \"totalAmount\": 50552\n                },\n                \"meta\": {\n                  \"totalItems\": 2,\n                  \"totalWeight\": 4,\n                  \"pickupType\": 1,\n                  \"senderCity\": \"ASABA\",\n                  \"senderTownID\": 480,\n                  \"recipientCity\": \"ABUJA\",\n                  \"recipientTownID\": 3868,\n                  \"shipToDifferentAddress\": false\n                },\n                \"_id\": \"69ca82d41d13ed0cbf279f25\",\n                \"user\": \"698c87428cdf77f408badbb3\",\n                \"customerEmail\": \"imobonifaceben@gmail.com\",\n                \"items\": [\n                  {\n                    \"productId\": \"69c94d49523d120bc2f3067a\",\n                    \"name\": \"itel A100C 6.6\\\" 2GB RAM/64GB ROM 5000mAh - Titanium Gold\",\n                    \"slug\": \"itel-a100c-66-2gb-ram64gb-rom-5000mah-titanium-gold\",\n                    \"image\": \"https://res.cloudinary.com/dpqb1hpmc/image/upload/v1774800172/cheepcart/products/koqu6i8eiskv2kklq2na.jpg\",\n                    \"price\": 20000,\n                    \"quantity\": 2,\n                    \"subtotal\": 40000,\n                    \"weight\": 4\n                  }\n                ],\n                \"billingAddress\": {\n                  \"fullName\": \"Test User\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 1 Abuja Street\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"town\": \"Wuse\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABV\",\n                  \"redstarTownId\": 3868\n                },\n                \"shippingAddress\": {\n                  \"fullName\": \"Test User\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 1 Abuja Street\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"town\": \"Wuse\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABV\",\n                  \"redstarTownId\": 3868\n                },\n                \"paymentStatus\": \"unpaid\",\n                \"paymentMethod\": \"paystack\",\n                \"paymentReference\": null,\n                \"paidAt\": null,\n                \"orderStatus\": \"pending\",\n                \"shipmentStatus\": \"not_created\",\n                \"shipmentReference\": null,\n                \"trackingNumber\": null,\n                \"shipmentCreatedAt\": null,\n                \"abandonedEmailSent\": false,\n                \"abandonedEmailSentAt\": null,\n                \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n                \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n                \"orderNumber\": \"CHP-20260330-0001\",\n                \"__v\": 0\n              }\n            ]\n          }\n          ```\n          ### Errors:\n\n          `500` \u2192 Internal server error.\n      - info:\n          name: pending orders check\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/pending'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Get Pending Order\n\n          #### Endpoint: `GET /api/orders/pending`\n\n          ## Description:\n          Fetches the latest unpaid, pending order of the authenticated user. Useful to prevent creating duplicate orders if the user already has an active pending order.\n\n          ## Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ## Request Description:\n          No request body required. The endpoint automatically fetches the latest pending order for the logged-in user.\n\n          ## Sample Success Response (Pending Order Exists):\n          ```json\n          {\n            \"success\": true,\n            \"order\": { \"_id\": \"69ca82d41d13ed0cbf279f25\", \"orderNumber\": \"CHP-20260330-0001\", ... }\n          }\n          ```\n\n          ### Sample Response (No Pending Order):\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"No pending unpaid order found\"\n          }\n          ```\n          ### Errors:\n          ```json\n          404 \u2192 No pending order exists.\n  - info:\n      name: Payments\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    items:\n      - info:\n          name: Initialize Payment\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/payments/initialize/69ca82d41d13ed0cbf279f25'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 1\uFE0F\u20E3 Initialize Order Payment\n\n          ### \uD83D\uDD39 Endpoint\n          `POST /api/payments/initialize/:orderId`\n\n          ## \uD83D\uDD39 Description\n\n          Initializes payment for an order using Paystack.\n\n          ## This endpoint:\n          - Confirms the order exists\n          - Ensures the order is not already paid or cancelled\n          - Sends a request to Paystack\n          - Returns a payment link (authorization URL)\n\n          #### \uD83D\uDC49 The frontend should redirect the user to this URL to complete payment.\n\n          ## \uD83D\uDD39 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n          ### \uD83D\uDD39 URL Params\n          `orderId` \u2192 The ID of the order you want to pay for\n          Example: 69ca82d41d13ed0cbf279f25\n\n          ### \uD83D\uDD39 Request Description\n          - No request body is required.\n          - The orderId in the URL is used to fetch the order.\n\n          # \uD83D\uDD39 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment initialized successfully\",\n            \"payment\": {\n              \"orderId\": \"69ca82d41d13ed0cbf279f25\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"paymentStatus\": \"pending\",\n              \"reference\": \"PAY-CHP-20260330-0001-1711800000000\",\n              \"amount\": 50552,\n              \"authorizationUrl\": \"https://checkout.paystack.com/xxxxx\",\n              \"accessCode\": \"xxxxxx\"\n            }\n          }\n          ```\n          # \uD83D\uDD39 What Frontend Should Do\n          1. Call this endpoint\n          2. Get authorizationUrl\n          3. Redirect user to that URL\n          4. User completes payment on Paystack\n          \uD83D\uDD39 Error Responses\n\n          ### \u274C Order Not Found\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ### \u274C Already Paid\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"This order has already been paid for\"\n          }\n          ```\n          ### \u274C Cancelled Order\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Cancelled orders cannot be paid for\"\n          }\n      - info:\n          name: Verify Payment\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/payments/verify/PAY-CHP-20260330-0001-1774884757746'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 2\uFE0F\u20E3 Verify Order Payment\n\n          ### \uD83D\uDD39 Endpoint\n          `GET /api/payment/verify/:reference`\n\n          # \uD83D\uDD39 Description\n          Verifies a payment after the user completes it on Paystack.\n\n          ### This endpoint:\n          - Confirms payment with Paystack\n          - Validates payment amount\n          - Updates order status to paid\n          - Deducts product stock\n          - Clears the user cart\n\n          ### \uD83D\uDD39 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ### \uD83D\uDD39 URL Params\n          `reference` \u2192 Payment reference returned from initialize endpoint\n          Example: PAY-CHP-20260330-0001-1711800000000\n\n          ### \uD83D\uDD39 Request Description\n\n          No request body required.\n          The reference is used to verify payment with Paystack.\n\n          ### \uD83D\uDD39 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment verified successfully\",\n            \"order\": {\n              \"_id\": \"69ca82d41d13ed0cbf279f25\",\n              \"paymentStatus\": \"paid\",\n              \"orderStatus\": \"confirmed\"\n            },\n            \"nextStep\": \"Create shipment with RedStar\"\n          }\n          ```\n\n          ### \uD83D\uDD39 What Happens Internally\n          \u2714 Payment verified with Paystack\n          \u2714 Order marked as PAID\n          \u2714 Order status \u2192 CONFIRMED\n          \u2714 Product stock reduced\n          \u2714 User cart cleared\n\n          ### \uD83D\uDD39 Error Responses\n\n          ####\u274C Missing Reference\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Payment reference is required\"\n          }\n          \u274C Payment Failed\n          {\n            \"success\": false,\n            \"message\": \"Payment was not successful\"\n          }\n          \u274C Amount Mismatch\n          {\n            \"success\": false,\n            \"message\": \"Paid amount does not match order total\"\n          }\n          \u274C Order Not Found\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ## \uD83D\uDD25 FULL PAYMENT FLOW (Frontend Guide)\n          1. User creates order\n          2. Call POST /payment/initialize/:orderId\n          3. Redirect user to Paystack (authorizationUrl)\n          4. User completes payment\n          5. Call GET /payment/verify/:reference\n          6. Show success page\n\n          ### \u26A0\uFE0F IMPORTANT NOTES (Frontend + Backend)\n          \uD83D\uDD10 Authentication\n          All endpoints require Bearer Token\n          \uD83D\uDCB3 Amount Format\n          Paystack uses kobo\n          Backend converts automatically\n\n          ###\n          \uD83D\uDD01 Verification Method\n          Current: Manual (/verify)\n          Production: Use Paystack Webhook (recommended)\n  - info:\n      name: Pre-Order\n      type: folder\n      seq: 8\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # CheepCart Pre-Order API\n\n        ## What this feature is for\n\n        The pre-order feature is for products the admin wants to show on the website before normal checkout is available.\n\n        Example use case:\n        - Admin lists products available for China pre-order.\n        - Frontend displays those products on one pre-order page.\n        - Customer clicks a product.\n        - Customer fills an enquiry form.\n        - No payment is collected immediately.\n        - Admin sees the enquiry in the dashboard and follows up with the customer.\n\n        ## Important frontend note\n\n        Pre-order products are not the same as normal products.\n\n        Do not add them to cart.\n        Do not send them to checkout.\n        Do not initialize Paystack payment for them.\n\n        The customer should only submit an enquiry form.\n\n        ## Frontend page flow\n\n        1. Call `GET /api/pre-order-products`.\n        2. Display the returned `products` array.\n        3. When a user clicks a product, open a detail page or modal.\n        4. Use the product `_id` as `productId` when submitting the enquiry.\n        5. Call `POST /api/pre-order-enquiries`.\n        6. Show a success message after submission.\n\n        ## Admin dashboard flow\n\n        1. Admin creates pre-order products from the dashboard.\n        2. Frontend users submit enquiries for those products.\n        3. Admin views enquiries under the pre-order section.\n        4. Admin updates enquiry status as they contact the customer.\n\n        ## Product status values\n\n        A pre-order product can have one of these statuses:\n\n        - `available` - product can receive enquiries.\n        - `coming_soon` - product is visible and can still receive enquiries.\n        - `closed` - product is visible but enquiry submission is blocked.\n\n        ## Enquiry status values\n\n        An enquiry can have one of these statuses:\n\n        - `pending`\n        - `contacted`\n        - `confirmed`\n        - `cancelled`\n        - `completed`\n\n        ## Image format\n\n        A pre-order product image uses the same Cloudinary style object used in the backend:\n\n        ```json\n        {\n          \"secure_url\": \"https://res.cloudinary.com/your-cloud/image/upload/sample.jpg\",\n          \"public_id\": \"cheepcart/preorders/sample\"\n        }\n        ```\n\n        Usually, frontend should upload the image first using the existing upload API, then use the returned `secure_url` and `public_id` when creating the pre-order product.\n      type: text/markdown\n    items:\n      - info:\n          name: 01 Get Pre-Order Products\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Pre-Order Products\n\n          ## Endpoint\n          `GET /api/pre-order-products`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Returns active pre-order products for the public pre-order page.\n\n          The frontend should map over the `products` array and show each product image, name, optional price, and status.\n\n          ## Optional query parameters\n\n          `page`\n          - Type: number\n          - Default: `1`\n          - Use this when paginating products.\n\n          `limit`\n          - Type: number\n          - Default: `10`\n          - Controls how many products return per page.\n\n          `status`\n          - Type: string\n          - Optional values: `available`, `coming_soon`, `closed`\n          - Use this if frontend wants only products with one status.\n\n          `keyword`\n          - Type: string\n          - Searches product name and description.\n\n          ## Example requests\n\n          ```txt\n          GET /api/pre-order-products\n          GET /api/pre-order-products?page=1&limit=12\n          GET /api/pre-order-products?status=available\n          GET /api/pre-order-products?keyword=bag\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"description\": \"Available for China pre-order.\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/preorders/bag\"\n                },\n                \"status\": \"available\",\n                \"displayOrder\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend usage tip\n\n          If `price` is missing or null, show `Contact for price` or hide the price.\n      - info:\n          name: 02 Get Single Pre-Order Product\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/luxury-travel-bag'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Product\n\n          ## Endpoint\n          `GET /api/pre-order-products/:slug`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Returns one active pre-order product using the product `slug`.\n\n          Use this for a pre-order detail page or modal if you do not already have the full product object.\n\n          ## URL parameter\n\n          `slug`\n          - Type: string\n          - Required: yes\n          - Example: `luxury-travel-bag`\n\n          ## Example request\n\n          ```txt\n          GET /api/pre-order-products/luxury-travel-bag\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n            \"name\": \"Luxury Travel Bag\",\n            \"slug\": \"luxury-travel-bag\",\n            \"description\": \"Available for China pre-order.\",\n            \"price\": 45000,\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n              \"public_id\": \"cheepcart/preorders/bag\"\n            },\n            \"status\": \"available\",\n            \"displayOrder\": 1,\n            \"isActive\": true,\n            \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n            \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n          }\n          ```\n\n          ## Error response\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n      - info:\n          name: 03 Create Pre-Order Product Admin\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/pre-order-products'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"Luxury Travel Bag\",\n                \"description\": \"Available for China pre-order.\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/preorders/bag\"\n                },\n                \"status\": \"available\",\n                \"displayOrder\": 1\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Pre-Order Product\n\n          ## Endpoint\n          `POST /api/pre-order-products`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Creates a product that will appear on the frontend pre-order page.\n\n          This does not create a normal store product. It does not require category, stock, weight, or checkout data.\n\n          ## Headers\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ## Request body\n\n          ```json\n          {\n            \"name\": \"Luxury Travel Bag\",\n            \"description\": \"Available for China pre-order.\",\n            \"price\": 45000,\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n              \"public_id\": \"cheepcart/preorders/bag\"\n            },\n            \"status\": \"available\",\n            \"displayOrder\": 1\n          }\n          ```\n\n          ## Field descriptions\n\n          `name`\n          - Type: string\n          - Required: yes\n          - Product name shown on frontend.\n\n          `description`\n          - Type: string\n          - Required: no\n          - Extra information about the pre-order product.\n\n          `price`\n          - Type: number\n          - Required: no\n          - Use only when admin knows the price.\n          - If price is not known, do not send it.\n\n          `image`\n          - Type: object\n          - Required: yes\n          - Must contain `secure_url` and `public_id`.\n\n          `status`\n          - Type: string\n          - Required: no\n          - Default: `available`\n          - Options: `available`, `coming_soon`, `closed`\n\n          `displayOrder`\n          - Type: number\n          - Required: no\n          - Lower numbers appear first.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product created successfully\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"description\": \"Available for China pre-order.\",\n              \"price\": 45000,\n              \"image\": {\n                \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                \"public_id\": \"cheepcart/preorders/bag\"\n              },\n              \"status\": \"available\",\n              \"displayOrder\": 1,\n              \"isActive\": true\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Missing name:\n\n          ```json\n          {\n            \"message\": \"Product name is required\"\n          }\n          ```\n\n          Missing image:\n\n          ```json\n          {\n            \"message\": \"Product image with secure_url and public_id is required\"\n          }\n          ```\n      - info:\n          name: 04 Get All Pre-Order Products Admin\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/admin/all'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get All Pre-Order Products For Admin\n\n          ## Endpoint\n          `GET /api/pre-order-products/admin/all`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns all pre-order products, including inactive products.\n\n          Use this endpoint for the admin pre-order product table.\n\n          ## Headers\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\"\n          }\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"products\": [\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"description\": \"Available for China pre-order.\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/preorders/bag\"\n                },\n                \"status\": \"available\",\n                \"displayOrder\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 05 Get Single Pre-Order Product Admin\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/admin/662b7f8f4f9c2e2d7c111111'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Product For Admin\n\n          ## Endpoint\n          `GET /api/pre-order-products/admin/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns one pre-order product by MongoDB `_id`.\n\n          Use this when opening an edit screen in the admin dashboard.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`, not the slug.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n            \"name\": \"Luxury Travel Bag\",\n            \"slug\": \"luxury-travel-bag\",\n            \"description\": \"Available for China pre-order.\",\n            \"price\": 45000,\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n              \"public_id\": \"cheepcart/preorders/bag\"\n            },\n            \"status\": \"available\",\n            \"displayOrder\": 1,\n            \"isActive\": true\n          }\n          ```\n      - info:\n          name: 06 Update Pre-Order Product Admin\n          type: http\n          seq: 6\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/pre-order-products/662b7f8f4f9c2e2d7c111111'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"Luxury Travel Bag Updated\",\n                \"price\": 48000,\n                \"status\": \"available\",\n                \"displayOrder\": 2\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Pre-Order Product\n\n          ## Endpoint\n          `PUT /api/pre-order-products/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Updates an existing pre-order product.\n\n          You only need to send the fields you want to change.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`.\n\n          ## Example request body\n\n          ```json\n          {\n            \"name\": \"Luxury Travel Bag Updated\",\n            \"price\": 48000,\n            \"status\": \"available\",\n            \"displayOrder\": 2\n          }\n          ```\n\n          ## Other fields you can update\n\n          ```json\n          {\n            \"description\": \"New description\",\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/new-bag.jpg\",\n              \"public_id\": \"cheepcart/preorders/new-bag\"\n            },\n            \"isActive\": true\n          }\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product updated successfully\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag Updated\",\n              \"slug\": \"luxury-travel-bag-updated\",\n              \"price\": 48000,\n              \"status\": \"available\",\n              \"displayOrder\": 2,\n              \"isActive\": true\n            }\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n      - info:\n          name: 07 Delete Pre-Order Product Admin\n          type: http\n          seq: 7\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/pre-order-products/662b7f8f4f9c2e2d7c111111'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Delete Pre-Order Product\n\n          ## Endpoint\n          `DELETE /api/pre-order-products/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Removes a pre-order product from the public frontend list.\n\n          Important: this is a soft delete. The backend sets `isActive` to `false` instead of permanently deleting the product.\n\n          This is safer because old enquiries can still keep their product history.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product removed\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n      - info:\n          name: 08 Submit Pre-Order Enquiry\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/pre-order-enquiries'\n          body:\n            type: json\n            data: |-\n              {\n                \"productId\": \"662b7f8f4f9c2e2d7c111111\",\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"jane@example.com\",\n                \"quantity\": 2,\n                \"location\": \"Lagos, Nigeria\",\n                \"message\": \"Please contact me about delivery time.\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Submit Pre-Order Enquiry\n\n          ## Endpoint\n          `POST /api/pre-order-enquiries`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Saves the customer's interest in a pre-order product.\n\n          This endpoint does not create an order.\n          This endpoint does not collect payment.\n          This endpoint only sends the enquiry to the admin dashboard.\n\n          ## When to call this\n          Call this after the user fills the pre-order enquiry form.\n\n          ## Request body\n\n          ```json\n          {\n            \"productId\": \"662b7f8f4f9c2e2d7c111111\",\n            \"fullName\": \"Jane Doe\",\n            \"phone\": \"08012345678\",\n            \"email\": \"jane@example.com\",\n            \"quantity\": 2,\n            \"location\": \"Lagos, Nigeria\",\n            \"message\": \"Please contact me about delivery time.\"\n          }\n          ```\n\n          ## Field descriptions\n\n          `productId`\n          - Type: string\n          - Required: yes\n          - Use the `_id` of the pre-order product.\n\n          `fullName`\n          - Type: string\n          - Required: yes\n          - Customer's full name.\n\n          `phone`\n          - Type: string\n          - Required: yes\n          - Customer's phone number.\n\n          `email`\n          - Type: string\n          - Required: no\n          - Customer's email address.\n\n          `quantity`\n          - Type: number\n          - Required: no\n          - Default: `1`\n\n          `location`\n          - Type: string\n          - Required: no\n          - Customer delivery/location information.\n\n          `message`\n          - Type: string\n          - Required: no\n          - Any extra note from the customer.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry submitted successfully\",\n            \"enquiry\": {\n              \"_id\": \"662b83004f9c2e2d7c222222\",\n              \"product\": \"662b7f8f4f9c2e2d7c111111\",\n              \"productSnapshot\": {\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/preorders/bag\"\n                }\n              },\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08012345678\",\n              \"email\": \"jane@example.com\",\n              \"quantity\": 2,\n              \"location\": \"Lagos, Nigeria\",\n              \"message\": \"Please contact me about delivery time.\",\n              \"status\": \"pending\",\n              \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n              \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n            }\n          }\n          ```\n\n          ## Frontend success message idea\n\n          Show something like:\n\n          `Your pre-order enquiry has been submitted. Our team will contact you shortly.`\n\n          ## Common errors\n\n          Missing required fields:\n\n          ```json\n          {\n            \"message\": \"Product, full name and phone number are required\"\n          }\n          ```\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n\n          Product closed:\n\n          ```json\n          {\n            \"message\": \"This pre-order product is currently closed\"\n          }\n          ```\n      - info:\n          name: 09 Get Pre-Order Enquiries Admin\n          type: http\n          seq: 9\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-enquiries'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Pre-Order Enquiries\n\n          ## Endpoint\n          `GET /api/pre-order-enquiries`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns customer enquiry submissions.\n\n          Use this for the admin pre-order enquiries table.\n\n          ## Optional query parameters\n\n          `page`\n          - Type: number\n          - Default: `1`\n\n          `limit`\n          - Type: number\n          - Default: `20`\n\n          `status`\n          - Type: string\n          - Options: `pending`, `contacted`, `confirmed`, `cancelled`, `completed`\n\n          `product`\n          - Type: string\n          - Filter by product `_id`.\n\n          ## Example requests\n\n          ```txt\n          GET /api/pre-order-enquiries\n          GET /api/pre-order-enquiries?status=pending\n          GET /api/pre-order-enquiries?page=1&limit=20\n          GET /api/pre-order-enquiries?product=662b7f8f4f9c2e2d7c111111\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"enquiries\": [\n              {\n                \"_id\": \"662b83004f9c2e2d7c222222\",\n                \"product\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Luxury Travel Bag\",\n                  \"slug\": \"luxury-travel-bag\",\n                  \"price\": 45000,\n                  \"status\": \"available\",\n                  \"isActive\": true\n                },\n                \"productSnapshot\": {\n                  \"name\": \"Luxury Travel Bag\",\n                  \"slug\": \"luxury-travel-bag\",\n                  \"price\": 45000\n                },\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"jane@example.com\",\n                \"quantity\": 2,\n                \"location\": \"Lagos, Nigeria\",\n                \"message\": \"Please contact me about delivery time.\",\n                \"status\": \"pending\",\n                \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 10 Get Single Pre-Order Enquiry Admin\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-enquiries/662b83004f9c2e2d7c222222'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Enquiry\n\n          ## Endpoint\n          `GET /api/pre-order-enquiries/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns one enquiry by `_id`.\n\n          Use this for an enquiry detail page or admin modal.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b83004f9c2e2d7c222222\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"price\": 45000,\n              \"status\": \"available\",\n              \"isActive\": true\n            },\n            \"productSnapshot\": {\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"price\": 45000\n            },\n            \"fullName\": \"Jane Doe\",\n            \"phone\": \"08012345678\",\n            \"email\": \"jane@example.com\",\n            \"quantity\": 2,\n            \"location\": \"Lagos, Nigeria\",\n            \"message\": \"Please contact me about delivery time.\",\n            \"status\": \"pending\",\n            \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n            \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n      - info:\n          name: 11 Update Pre-Order Enquiry Status Admin\n          type: http\n          seq: 11\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/pre-order-enquiries/662b83004f9c2e2d7c222222/status'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"status\": \"contacted\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Pre-Order Enquiry Status\n\n          ## Endpoint\n          `PATCH /api/pre-order-enquiries/:id/status`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Updates the status of a customer's enquiry.\n\n          Use this after admin contacts the customer or completes the pre-order process.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Request body\n\n          ```json\n          {\n            \"status\": \"contacted\"\n          }\n          ```\n\n          ## Allowed status values\n\n          - `pending`\n          - `contacted`\n          - `confirmed`\n          - `cancelled`\n          - `completed`\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry status updated successfully\",\n            \"enquiry\": {\n              \"_id\": \"662b83004f9c2e2d7c222222\",\n              \"status\": \"contacted\",\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08012345678\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Invalid status:\n\n          ```json\n          {\n            \"message\": \"Invalid enquiry status\"\n          }\n          ```\n\n          Enquiry not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n      - info:\n          name: 12 Delete Pre-Order Enquiry Admin\n          type: http\n          seq: 12\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/pre-order-enquiries/662b83004f9c2e2d7c222222'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Delete Pre-Order Enquiry\n\n          ## Endpoint\n          `DELETE /api/pre-order-enquiries/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Permanently deletes a pre-order enquiry.\n\n          Use this carefully. Usually, it is better to update the status to `cancelled` or `completed` instead of deleting, so the admin still has history.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry deleted successfully\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n  - info:\n      name: shipment creation\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    docs:\n      content: |\n        # \uD83D\uDE9A CREATE / RETRY SHIPMENT\n\n        ## Endpoint\n        POST /api/shipments/create/:orderId\n\n        ---------------------------------------------\n\n        ## Description\n\n        This endpoint is used to:\n\n        1. Create shipment after payment\n        2. Retry shipment if failed\n        3. Return existing shipment if already created\n\n        ---------------------------------------------\n\n        ## \uD83D\uDD25 WHEN TO USE\n\n        \u2705 Automatically after payment (backend)\n        \u2705 Admin retry if shipment failed\n        \u2705 Fetch shipment details safely\n\n        ---------------------------------------------\n\n        ## \uD83E\uDDE0 BEHAVIOR\n\n        shipmentStatus = not_created \u2192 creates shipment  \n        shipmentStatus = failed \u2192 retries shipment  \n        shipmentStatus = created \u2192 returns existing shipment  \n\n        ---------------------------------------------\n\n        ## \u2705 RESPONSE\n\n        {\n          \"success\": true,\n          \"shipment\": {\n            \"orderId\": \"...\",\n            \"orderNumber\": \"...\",\n            \"shipmentStatus\": \"created\",\n            \"trackingNumber\": \"...\",\n            \"shipmentReference\": \"...\",\n            \"createdAt\": \"...\"\n          }\n        }\n\n        ---------------------------------------------\n\n        ## \u26A0\uFE0F IMPORTANT\n\n        This endpoint is **idempotent**\n\n        \u2192 Calling multiple times will NOT create duplicates\n      type: text/markdown\n    items:\n      - info:\n          name: Create/retry shipment creation\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipments/create/69e355eb827eaadacc96e7ca'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          docs {\n            # Create or Retry Shipment\n            \n            #### Shipment is created automatically after successful payment but in some cases where shipment creation fails use this api to retry or get shipment details if created already\n\n            This endpoint is used to:\n\n            1. Create a shipment after successful payment\n            2. Retry shipment creation if it previously failed\n            3. Retrieve existing shipment if already created\n\n            ## When to Use\n\n            \u2705 After payment verification (auto-trigger)\n            \u2705 When shipmentStatus = \"failed\" (manual retry)\n            \u2705 When you need to fetch tracking details\n\n            ## Behavior\n\n            - If shipmentStatus = \"not_created\" \u2192 creates shipment\n            - If shipmentStatus = \"failed\" \u2192 retries shipment\n            - If shipmentStatus = \"created\" \u2192 returns existing shipment\n\n            ## Important\n\n            This endpoint is **idempotent**:\n            - Safe to call multiple times\n            - Will NOT create duplicate shipments\n\n          }\n\n\n          ## Response:\n          ```json\n          {\n            \"success\": true,\n            \"alreadyExists\": true,\n            \"message\": \"Shipment already created\",\n            \"shipment\": {\n              \"orderId\": \"69e355eb827eaadacc96e7ca\",\n              \"orderNumber\": \"CHP-20260418-0001\",\n              \"shipmentStatus\": \"created\",\n              \"trackingNumber\": \"RSASB1186443\",\n              \"shipmentReference\": \"CHP-20260418-0001\",\n              \"createdAt\": \"2026-04-18T10:00:33.756Z\"\n            }\n          }\n      - info:\n          name: GET ALL SHIPMENTS (ADMIN)\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipments/get-all-shipments'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Get All Shipments\n\n          ## Method\n\n          GET\n\n          ## URL\n\n          /api/shipment/get-all-shipments\n\n          ## Auth\n\n          Bearer Token (Admin only)\n\n          ## Description\n\n          Fetch all shipments in the system for monitoring.\n\n          ## When to Call (Frontend)\n\n          * Admin dashboard page\n          * Shipment management page\n\n          ## Example Request\n\n          GET /api/shipment/get-all-shipments\n\n          ## Response\n\n          {\n          \"success\": true,\n          \"total\": 2,\n          \"shipments\": [\n          {\n          \"orderNumber\": \"CHP-20260416-0001\",\n          \"trackingNumber\": \"RSASB1148381\",\n          \"shipmentStatus\": \"created\",\n          \"deliveryStatus\": \"pending\",\n          \"shipmentRetryCount\": 1,\n          \"shipmentError\": null\n          }\n          ]\n          }\n\n          ## Notes for Frontend\n\n          * Show in table format\n          * Add color badges:\n            pending = yellow\n            in_transit = blue\n            delivered = green\n            failed = red\n          * Show retry button if shipmentRetryCount > 0\n  - info:\n      name: Shipping\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Checkout Shipping Flow (Frontend Guide)\n\n        This explains what should happen when a user clicks **Checkout**.\n\n        ## Important Rule\n        Frontend does **NOT** talk directly to RedStar.\n        Frontend only talks to our backend.\n\n        ---\n\n        ## Step 1 \u2014 User opens checkout page\n        Call:\n\n        GET /api/shipping/cities\n\n        Purpose:\n        - Load all available delivery cities\n\n        Use result to populate:\n        - City dropdown\n\n        ---\n\n        ## Step 2 \u2014 User selects a city\n        Call:\n\n        GET /api/shipping/towns/:cityAbbr\n\n        Example:\n        GET /api/shipping/towns/ABV\n\n        Purpose:\n        - Load all towns under the selected city\n\n        Use result to populate:\n        - Town dropdown\n\n        ---\n\n        ## Step 3 \u2014 User selects pickup type\n\n        pickupType values:\n        - 1 = Pickup from my address\n        - 2 = Drop-off in RedStar location\n\n        If pickupType = 2:\n        Call:\n\n        GET /api/shipping/dropoff/:cityAbbr\n\n        Purpose:\n        - Load RedStar dropoff locations for selected city\n\n        Use result to populate:\n        - Dropoff location dropdown\n\n        ---\n\n        ## Step 4 \u2014 User clicks Continue\n        Call:\n\n        POST /api/shipping/calculate-fee\n\n        Purpose:\n        - Validate cart\n        - Calculate RedStar delivery fee\n        - Return checkout summary\n\n        This response should be used to show:\n        - Cart items\n        - Subtotal\n        - Delivery fee\n        - VAT\n        - Total amount\n\n        ---\n\n        ## Final Frontend Flow\n\n        Open Checkout\n        \u2192 Load Cities\n        \u2192 Select City\n        \u2192 Load Towns\n        \u2192 Select Pickup Type\n        \u2192 If Dropoff, Load Locations\n        \u2192 Click Continue\n        \u2192 Calculate Delivery Fee\n        \u2192 Show Checkout Summary\n      type: text/markdown\n    items:\n      - info:\n          name: 01 - Get Shipping Cities\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/cities'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Shipping Cities\n\n          ## Purpose\n          Fetch all available delivery cities supported by RedStar.\n\n          ---\n\n          ## When Frontend Should Call This\n          Call this immediately when the user opens the checkout page.\n\n          ---\n\n          ## Auth\n          No authentication required.\n\n          ## Expected Frontend Use\n          Use this response to populate the **City dropdown**.\n\n          ## Important\n          Store:\n          - `abbr` \u2192 used in future API requests\n          Display:\n          - `name`\n\n          ## Example Output\n          ```json\n          [\n            {\n              \"id\": 6,\n              \"abbr\": \"ABV\",\n              \"name\": \"ABUJA\"\n            }\n          ]\n      - info:\n          name: 02 - Get Shipping Towns\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/towns/abv'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Endpoint: `GET /api/shipping/towns/:cityAbbr`\n          Purpose:\n\n          This endpoint fetches a list of towns for a specific city based on the city abbreviation (e.g., ABV for Abuja). The frontend will use this to populate a town dropdown for the user to select their town.\n\n          ---\n\n          ## Request:\n          Method: GET\n          `URL: /api/shipping/towns/:cityAbbr`\n          ---\n          Parameters:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\", \"LAG\").\n          Headers:\n          Authorization: Bearer `<user_token>`\n          ## Response:\n\n          Successful Response (List of towns):\n          ```json\n          {\n            \"success\": true,\n            \"towns\": [\n              {\n                \"id\": 3895,\n                \"name\": \"Gwarinpa\"\n              },\n              {\n                \"id\": 3896,\n                \"name\": \"Wuse\"\n              },\n              ...\n            ]\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"City abbreviation is required\"\n          }\n          ```\n          # Description:\n          Towns Dropdown: This endpoint will return a list of towns available for the selected city (using the city abbreviation).\n          Input:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\" for Abuja).\n          Output: A list of town objects including ID and name of each town.\n      - info:\n          name: 03 - Calculate Delivery Fee\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipping/calculate-fee'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"recipientCity\": \"Abuja\",\n                \"recipientTownID\": 3895\n              }\n          auth: inherit\n        runtime:\n          variables:\n            - name: baseUrl\n              value: https://cheepcart-project.onrender.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          #Endpoint: \n          `POST /api/shipping/calculate-fee`\n          ## Purpose:\n          ---\n          This endpoint calculates the shipping fee for the user's cart based on the shipping city and town. The frontend will use this to display the final delivery fee to the user before proceeding to payment.\n\n          ## Request:\n          Method: POST\n          `URL: /api/shipping/calculate-fee`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          # Request Body:\n          - recipientCity: The city abbreviation (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The town ID for the selected town.\n          - weight: The total weight of the items in the user's cart (needed to calculate the delivery fee).\n\n          ## Example Request Body:\n          ```json\n          {\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"weight\": 1\n          }\n          Response:\n\n          Successful Response (Shipping Fee Calculation):\n\n          {\n            \"success\": true,\n            \"message\": \"Delivery fee calculated successfully\",\n            \"checkout\": {\n              \"pricing\": {\n                \"subtotal\": 1900000,\n                \"deliveryFee\": 8761,\n                \"vatAmount\": 657,\n                \"shippingTotal\": 9418,\n                \"totalAmount\": 1909418\n              },\n              \"billingAddress\": { ... },\n              \"shippingAddress\": { ... }\n            }\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"Some cart items are unavailable or out of stock\",\n            \"unavailableItems\": [\n              {\n                \"productId\": \"69906a5219d21d11c33baaa5\",\n                \"name\": \"iPhone 14 Pro\"\n              }\n            ]\n          }\n\n          ```\n          ---\n          # Description:\n          - Calculate Delivery Fee: This endpoint uses the recipient city, town, and weight of the cart to calculate the shipping fee.\n          Input:\n          - recipientCity: The abbreviation of the destination city (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The ID of the destination town (e.g., 3895 for Gwarinpa).\n          - weight: The total weight of the items in the user's cart.\n          Output:\n          shipping fee and total amount including the subtotal, VAT, and delivery fee.\n      - info:\n          name: 04 Billing address\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/checkout/billing-address'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |+\n          # Endpoint: \n          `GET /api/checkout/billing-address`\n\n          ## Purpose:\n\n          -This endpoint checks if the user has a saved billing address.  If it exists, it will return the billing address to be used for the checkout process. If not, it will notify the frontend to display the billing address form.\n\n          ---\n          ## Request:\n          Method: GET\n          `URL: /api/checkout/billing-address`\n          Headers:\n          Authorization: Bearer <user_token>\n\n\n          # Response:\n          If the user has a saved billing address:\n          ```json\n          {\n            \"success\": true,\n            \"billingAddress\": {\n              \"_id\": \"69bacc0380418d00be7c5f9e\",\n              \"user\": \"698c87428cdf77f408badbb3\",\n              \"name\": \"John Doe\",\n              \"phone\": \"123456789\",\n              \"addressLine1\": \"123 Main St\",\n              \"addressLine2\": \"Apt 4B\",\n              \"city\": \"Lagos\",\n              \"state\": \"Lagos\",\n              \"postalCode\": \"234001\",\n              \"country\": \"Nigeria\",\n              \"isShippingAddress\": false,\n              \"isBillingAddress\": true,\n              \"createdAt\": \"2026-03-18T16:00:03.838Z\",\n              \"updatedAt\": \"2026-03-18T16:00:03.838Z\",\n              \"__v\": 0\n            },\n            \"shipToDifferentAddress\": true\n          }\n          ```\n          ---\n          If the user does not have a billing address:\n          ```josn\n          {\n            \"success\": false,\n            \"message\": \"No billing address found. Please fill in your billing details.\",\n            \"billingAddress\": null\n          }\n          ```\n          ---\n          **Description:**\n          - If the billing address exists, it returns the existing data.\n          - If the billing address doesn't exist, it returns a message indicating that the user needs to fill in the billing details.\n          - The shipToDifferentAddress flag is returned, allowing the frontend to show the checkbox for \"Ship to a different address\".\n\n\n      - info:\n          name: 05 Checkout initiation\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/checkout/initialize'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"shipToDifferentAddress\": true,\n                \"recipientCity\": \"ABUJA\",\n                \"recipientTownID\": 3895,\n                \"billingAddress\": {\n                  \"fullName\": \"John Doe\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"john@example.com\",\n                  \"addressLine1\": \"12 Gwarinpa Estate\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                },\n                \"shippingAddress\": {\n                  \"fullName\": \"Jane Doe\",\n                  \"phone\": \"08087654321\",\n                  \"email\": \"jane@example.com\",\n                  \"addressLine1\": \"Area 15, Ekiti\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                }\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## Endpoint: `POST /api/checkout/initialize`\n          ## Purpose:\n\n          This endpoint initializes the checkout process by accepting the user's billing address, shipping address, and other relevant details. It calculates the shipping fee, validates the cart, and returns the final checkout summary.\n\n          ---\n          ## Request:\n          Method: POST\n          `URL: /api/checkout/initialize`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          ---\n          # Request Body:\n          ```json\n          {\n            \"shipToDifferentAddress\": true,\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"billingAddress\": {\n              \"fullName\": \"John Doe\",\n              \"phone\": \"08012345678\",\n              \"email\": \"john@example.com\",\n              \"addressLine1\": \"12 Gwarinpa Estate\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\"\n            },\n            \"shippingAddress\": {\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08087654321\",\n              \"email\": \"jane@example.com\",\n              \"addressLine1\": \"Area 11, Abuja\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\",\n              \"redstarCityAbbr\": \"ABV\",\n              \"redstarTownId\": 3895\n            }\n          }\n          }\n          Response:\n\n          If the checkout is successful:\n\n          ---\n\n          {\n            \"success\": true,\n            \"message\": \"Checkout initialized successfully\",\n            \"checkout\": {\n              \"items\": [\n                {\n                  \"productId\": \"69906a5219d21d11c33baaa5\",\n                  \"name\": \"iPhone 14 Pro\",\n                  \"slug\": \"iphone-14-pro\",\n                  \"image\": \"https://res.cloudinary.com/demo.jpg\",\n                  \"price\": 950000,\n                  \"quantity\": 2,\n                  \"subtotal\": 1900000,\n                  \"weight\": 1\n                }\n              ],\n              \"pricing\": {\n                \"
