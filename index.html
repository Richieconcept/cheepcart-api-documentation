: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Pre-Order Products\n\n          ## Endpoint\n          `GET /api/pre-order-products`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Returns active pre-order products for the public pre-order page.\n\n          The frontend should map over the `products` array and show each product image, name, optional price, and status.\n\n          ## Optional query parameters\n\n          `page`\n          - Type: number\n          - Default: `1`\n          - Use this when paginating products.\n\n          `limit`\n          - Type: number\n          - Default: `10`\n          - Controls how many products return per page.\n\n          `status`\n          - Type: string\n          - Optional values: `available`, `coming_soon`, `closed`\n          - Use this if frontend wants only products with one status.\n\n          `keyword`\n          - Type: string\n          - Searches product name and description.\n\n          ## Example requests\n\n          ```txt\n          GET /api/pre-order-products\n          GET /api/pre-order-products?page=1&limit=12\n          GET /api/pre-order-products?status=available\n          GET /api/pre-order-products?keyword=bag\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"description\": \"Available for China pre-order.\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/pre-order-products/bag\"\n                },\n                \"status\": \"available\",\n                \"displayOrder\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend usage tip\n\n          If `price` is missing or null, show `Contact for price` or hide the price.\n      - info:\n          name: 02 Get Single Pre-Order Product\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/luxury-travel-bag'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Product\n\n          ## Endpoint\n          `GET /api/pre-order-products/:slug`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Returns one active pre-order product using the product `slug`.\n\n          Use this for a pre-order detail page or modal if you do not already have the full product object.\n\n          ## URL parameter\n\n          `slug`\n          - Type: string\n          - Required: yes\n          - Example: `luxury-travel-bag`\n\n          ## Example request\n\n          ```txt\n          GET /api/pre-order-products/luxury-travel-bag\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n            \"name\": \"Luxury Travel Bag\",\n            \"slug\": \"luxury-travel-bag\",\n            \"description\": \"Available for China pre-order.\",\n            \"price\": 45000,\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n              \"public_id\": \"cheepcart/pre-order-products/bag\"\n            },\n            \"status\": \"available\",\n            \"displayOrder\": 1,\n            \"isActive\": true,\n            \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n            \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n          }\n          ```\n\n          ## Error response\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n      - info:\n          name: 03 Create Pre-Order Product Admin\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/pre-order-products'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: name\n                type: text\n                value: Luxury Travel Bag\n              - name: description\n                type: text\n                value: Available for China pre-order.\n              - name: price\n                type: text\n                value: '45000'\n              - name: status\n                type: text\n                value: available\n              - name: displayOrder\n                type: text\n                value: '1'\n              - name: image\n                type: file\n                value: []\n          auth: inherit\n        runtime:\n          variables:\n            - name: baseUrl\n              value: https://cheepcart-project.onrender.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Pre-Order Product\n\n          ## Endpoint\n          `POST /api/pre-order-products`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Creates a product that will appear on the frontend pre-order page and uploads the image to Cloudinary in the same request.\n\n          This does not create a normal store product. It does not require category, stock, weight, or checkout data.\n\n          ## Headers\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"multipart/form-data\"\n          }\n          ```\n\n          ## Body type\n          `multipart/form-data`\n\n          ## Form data\n\n          ```txt\n          name: Luxury Travel Bag\n          description: Available for China pre-order.\n          price: 45000\n          status: available\n          displayOrder: 1\n          image: [file]\n          ```\n\n          Important: `image` is a file field, not a URL string. The backend uploads this file to Cloudinary, then saves the returned `secure_url` and `public_id`.\n\n          ## Field descriptions\n\n          `name`\n          - Type: string\n          - Required: yes\n          - Product name shown on frontend.\n\n          `description`\n          - Type: string\n          - Required: no\n          - Extra information about the pre-order product.\n\n          `price`\n          - Type: number\n          - Required: no\n          - Use only when admin knows the price.\n          - If price is not known, do not send it.\n\n          `image`\n          - Type: file\n          - Required: yes\n          - Send one image file using the exact key `image`.\n          - Allowed file type: image.\n          - Max file size: 5MB.\n          - Backend stores the image in Cloudinary folder `cheepcart/pre-order-products`.\n\n          `status`\n          - Type: string\n          - Required: no\n          - Default: `available`\n          - Options: `available`, `coming_soon`, `closed`\n\n          `displayOrder`\n          - Type: number\n          - Required: no\n          - Lower numbers appear first.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product created successfully\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"description\": \"Available for China pre-order.\",\n              \"price\": 45000,\n              \"image\": {\n                \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/bag.jpg\",\n                \"public_id\": \"cheepcart/pre-order-products/bag\"\n              },\n              \"status\": \"available\",\n              \"displayOrder\": 1,\n              \"isActive\": true\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Missing name:\n\n          ```json\n          {\n            \"message\": \"Product name is required\"\n          }\n          ```\n\n          Missing image:\n\n          ```json\n          {\n            \"message\": \"Product image with secure_url and public_id is required\"\n          }\n          ```\n\n          ## Frontend example\n\n          ```js\n          const formData = new FormData();\n          formData.append(\"name\", name);\n          formData.append(\"description\", description);\n          formData.append(\"price\", price);\n          formData.append(\"status\", status);\n          formData.append(\"displayOrder\", displayOrder);\n          formData.append(\"image\", imageFile);\n\n          await fetch(`${baseUrl}/api/pre-order-products`, {\n            method: \"POST\",\n            headers: {\n              Authorization: `Bearer ${adminToken}`\n            },\n            body: formData\n          });\n          ```\n\n          Do not manually set `Content-Type` in frontend when using `FormData`; the browser will add the multipart boundary automatically.\n      - info:\n          name: 04 Get All Pre-Order Products Admin\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/admin/all'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get All Pre-Order Products For Admin\n\n          ## Endpoint\n          `GET /api/pre-order-products/admin/all`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns all pre-order products, including inactive products.\n\n          Use this endpoint for the admin pre-order product table.\n\n          ## Headers\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\"\n          }\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 2,\n            \"products\": [\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"description\": \"Available for China pre-order.\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/pre-order-products/bag\"\n                },\n                \"status\": \"available\",\n                \"displayOrder\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-25T12:00:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 05 Get Single Pre-Order Product Admin\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-products/admin/69ecb429354aed94116d5bbf'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Product For Admin\n\n          ## Endpoint\n          `GET /api/pre-order-products/admin/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns one pre-order product by MongoDB `_id`.\n\n          Use this when opening an edit screen in the admin dashboard.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`, not the slug.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n            \"name\": \"Luxury Travel Bag\",\n            \"slug\": \"luxury-travel-bag\",\n            \"description\": \"Available for China pre-order.\",\n            \"price\": 45000,\n            \"image\": {\n              \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n              \"public_id\": \"cheepcart/pre-order-products/bag\"\n            },\n            \"status\": \"available\",\n            \"displayOrder\": 1,\n            \"isActive\": true\n          }\n          ```\n      - info:\n          name: 06 Update Pre-Order Product Admin\n          type: http\n          seq: 6\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/pre-order-products/69ecb429354aed94116d5bbf'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: name\n                type: text\n                value: Luxury Travel Bag Updated\n              - name: price\n                type: text\n                value: '48000'\n              - name: status\n                type: text\n                value: available\n              - name: displayOrder\n                type: text\n                value: '2'\n              - name: image\n                type: file\n                value: []\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Pre-Order Product\n\n          ## Endpoint\n          `PUT /api/pre-order-products/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Updates an existing pre-order product.\n\n          You only need to send the fields you want to change.\n          If you send a new `image` file, the backend uploads it to Cloudinary and replaces the saved product image.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`.\n\n          ## Body type\n          `multipart/form-data`\n\n          ## Example form data\n\n          ```txt\n          name: Luxury Travel Bag Updated\n          price: 48000\n          status: available\n          displayOrder: 2\n          ```\n\n          To replace the product image, also send:\n\n          ```txt\n          image: [file]\n          ```\n\n          Important: `image` is optional during update. If the admin does not choose a new image, do not send the `image` field.\n\n          ## Other fields you can update\n\n          ```txt\n          description: New description\n          isActive: true\n          ```\n\n          ## Image replacement behavior\n\n          - Send `image` as a file using the exact key `image`.\n          - Allowed file type: image.\n          - Max file size: 5MB.\n          - Backend uploads the new file to Cloudinary.\n          - Backend saves the returned `secure_url` and `public_id`.\n          - Backend deletes the old Cloudinary image using the old `public_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product updated successfully\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag Updated\",\n              \"slug\": \"luxury-travel-bag-updated\",\n              \"price\": 48000,\n              \"image\": {\n                \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/new-bag.jpg\",\n                \"public_id\": \"cheepcart/pre-order-products/new-bag\"\n              },\n              \"status\": \"available\",\n              \"displayOrder\": 2,\n              \"isActive\": true\n            }\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n\n          ## Frontend example\n\n          ```js\n          const formData = new FormData();\n          formData.append(\"name\", name);\n          formData.append(\"price\", price);\n          formData.append(\"status\", status);\n          formData.append(\"displayOrder\", displayOrder);\n\n          if (imageFile) {\n            formData.append(\"image\", imageFile);\n          }\n\n          await fetch(`${baseUrl}/api/pre-order-products/${productId}`, {\n            method: \"PUT\",\n            headers: {\n              Authorization: `Bearer ${adminToken}`\n            },\n            body: formData\n          });\n          ```\n\n          Do not manually set `Content-Type` in frontend when using `FormData`; the browser will add the multipart boundary automatically.\n      - info:\n          name: 07 Delete Pre-Order Product Admin\n          type: http\n          seq: 7\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/pre-order-products/69ecb429354aed94116d5bbf'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Delete Pre-Order Product\n\n          ## Endpoint\n          `DELETE /api/pre-order-products/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Removes a pre-order product from the public frontend list.\n\n          Important: this is a soft delete. The backend sets `isActive` to `false` instead of permanently deleting the product.\n\n          This is safer because old enquiries can still keep their product history.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the product `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order product removed\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n      - info:\n          name: 08 Submit Pre-Order Enquiry\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/pre-order-enquiries'\n          body:\n            type: json\n            data: |-\n              {\n                \"productId\": \"69ecb4e2354aed94116d5bd4\",\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"jane@example.com\",\n                \"quantity\": 2,\n                \"location\": \"Lagos, Nigeria\",\n                \"message\": \"Please contact me about delivery time.\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Submit Pre-Order Enquiry\n\n          ## Endpoint\n          `POST /api/pre-order-enquiries`\n\n          ## Who uses this?\n          Frontend website.\n\n          ## Authentication\n          Not required.\n\n          ## What it does\n          Saves the customer's interest in a pre-order product.\n\n          This endpoint does not create an order.\n          This endpoint does not collect payment.\n          This endpoint only sends the enquiry to the admin dashboard.\n\n          ## When to call this\n          Call this after the user fills the pre-order enquiry form.\n\n          ## Request body\n\n          ```json\n          {\n            \"productId\": \"662b7f8f4f9c2e2d7c111111\",\n            \"fullName\": \"Jane Doe\",\n            \"phone\": \"08012345678\",\n            \"email\": \"jane@example.com\",\n            \"quantity\": 2,\n            \"location\": \"Lagos, Nigeria\",\n            \"message\": \"Please contact me about delivery time.\"\n          }\n          ```\n\n          ## Field descriptions\n\n          `productId`\n          - Type: string\n          - Required: yes\n          - Use the `_id` of the pre-order product.\n\n          `fullName`\n          - Type: string\n          - Required: yes\n          - Customer's full name.\n\n          `phone`\n          - Type: string\n          - Required: yes\n          - Customer's phone number.\n\n          `email`\n          - Type: string\n          - Required: no\n          - Customer's email address.\n\n          `quantity`\n          - Type: number\n          - Required: no\n          - Default: `1`\n\n          `location`\n          - Type: string\n          - Required: no\n          - Customer delivery/location information.\n\n          `message`\n          - Type: string\n          - Required: no\n          - Any extra note from the customer.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry submitted successfully\",\n            \"enquiry\": {\n              \"_id\": \"662b83004f9c2e2d7c222222\",\n              \"product\": \"662b7f8f4f9c2e2d7c111111\",\n              \"productSnapshot\": {\n                \"name\": \"Luxury Travel Bag\",\n                \"slug\": \"luxury-travel-bag\",\n                \"price\": 45000,\n                \"image\": {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/bag.jpg\",\n                  \"public_id\": \"cheepcart/pre-order-products/bag\"\n                }\n              },\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08012345678\",\n              \"email\": \"jane@example.com\",\n              \"quantity\": 2,\n              \"location\": \"Lagos, Nigeria\",\n              \"message\": \"Please contact me about delivery time.\",\n              \"status\": \"pending\",\n              \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n              \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n            }\n          }\n          ```\n\n          ## Frontend success message idea\n\n          Show something like:\n\n          `Your pre-order enquiry has been submitted. Our team will contact you shortly.`\n\n          ## Common errors\n\n          Missing required fields:\n\n          ```json\n          {\n            \"message\": \"Product, full name and phone number are required\"\n          }\n          ```\n\n          Product not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order product not found\"\n          }\n          ```\n\n          Product closed:\n\n          ```json\n          {\n            \"message\": \"This pre-order product is currently closed\"\n          }\n          ```\n      - info:\n          name: 09 Get Pre-Order Enquiries Admin\n          type: http\n          seq: 9\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-enquiries'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Pre-Order Enquiries\n\n          ## Endpoint\n          `GET /api/pre-order-enquiries`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns customer enquiry submissions.\n\n          Use this for the admin pre-order enquiries table.\n\n          ## Optional query parameters\n\n          `page`\n          - Type: number\n          - Default: `1`\n\n          `limit`\n          - Type: number\n          - Default: `20`\n\n          `status`\n          - Type: string\n          - Options: `pending`, `contacted`, `confirmed`, `cancelled`, `completed`\n\n          `product`\n          - Type: string\n          - Filter by product `_id`.\n\n          ## Example requests\n\n          ```txt\n          GET /api/pre-order-enquiries\n          GET /api/pre-order-enquiries?status=pending\n          GET /api/pre-order-enquiries?page=1&limit=20\n          GET /api/pre-order-enquiries?product=662b7f8f4f9c2e2d7c111111\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"enquiries\": [\n              {\n                \"_id\": \"662b83004f9c2e2d7c222222\",\n                \"product\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Luxury Travel Bag\",\n                  \"slug\": \"luxury-travel-bag\",\n                  \"price\": 45000,\n                  \"status\": \"available\",\n                  \"isActive\": true\n                },\n                \"productSnapshot\": {\n                  \"name\": \"Luxury Travel Bag\",\n                  \"slug\": \"luxury-travel-bag\",\n                  \"price\": 45000\n                },\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"jane@example.com\",\n                \"quantity\": 2,\n                \"location\": \"Lagos, Nigeria\",\n                \"message\": \"Please contact me about delivery time.\",\n                \"status\": \"pending\",\n                \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n                \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n              }\n            ]\n          }\n          ```\n      - info:\n          name: 10 Get Single Pre-Order Enquiry Admin\n          type: http\n          seq: 10\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/pre-order-enquiries/69ecb560354aed94116d5bd8'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Pre-Order Enquiry\n\n          ## Endpoint\n          `GET /api/pre-order-enquiries/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Returns one enquiry by `_id`.\n\n          Use this for an enquiry detail page or admin modal.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"_id\": \"662b83004f9c2e2d7c222222\",\n            \"product\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"price\": 45000,\n              \"status\": \"available\",\n              \"isActive\": true\n            },\n            \"productSnapshot\": {\n              \"name\": \"Luxury Travel Bag\",\n              \"slug\": \"luxury-travel-bag\",\n              \"price\": 45000\n            },\n            \"fullName\": \"Jane Doe\",\n            \"phone\": \"08012345678\",\n            \"email\": \"jane@example.com\",\n            \"quantity\": 2,\n            \"location\": \"Lagos, Nigeria\",\n            \"message\": \"Please contact me about delivery time.\",\n            \"status\": \"pending\",\n            \"createdAt\": \"2026-04-25T12:20:00.000Z\",\n            \"updatedAt\": \"2026-04-25T12:20:00.000Z\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n      - info:\n          name: 11 Update Pre-Order Enquiry Status Admin\n          type: http\n          seq: 11\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/pre-order-enquiries/69ecb560354aed94116d5bd8/status'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"status\": \"contacted\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Pre-Order Enquiry Status\n\n          ## Endpoint\n          `PATCH /api/pre-order-enquiries/:id/status`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Updates the status of a customer's enquiry.\n\n          Use this after admin contacts the customer or completes the pre-order process.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Request body\n\n          ```json\n          {\n            \"status\": \"contacted\"\n          }\n          ```\n\n          ## Allowed status values\n\n          - `pending`\n          - `contacted`\n          - `confirmed`\n          - `cancelled`\n          - `completed`\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry status updated successfully\",\n            \"enquiry\": {\n              \"_id\": \"662b83004f9c2e2d7c222222\",\n              \"status\": \"contacted\",\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08012345678\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Invalid status:\n\n          ```json\n          {\n            \"message\": \"Invalid enquiry status\"\n          }\n          ```\n\n          Enquiry not found:\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n      - info:\n          name: 12 Delete Pre-Order Enquiry Admin\n          type: http\n          seq: 12\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/pre-order-enquiries/662b83004f9c2e2d7c222222'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Delete Pre-Order Enquiry\n\n          ## Endpoint\n          `DELETE /api/pre-order-enquiries/:id`\n\n          ## Who uses this?\n          Admin dashboard.\n\n          ## Authentication\n          Required. Admin only.\n\n          ## What it does\n          Permanently deletes a pre-order enquiry.\n\n          Use this carefully. Usually, it is better to update the status to `cancelled` or `completed` instead of deleting, so the admin still has history.\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - This is the enquiry `_id`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry deleted successfully\"\n          }\n          ```\n\n          ## Error response\n\n          ```json\n          {\n            \"message\": \"Pre-order enquiry not found\"\n          }\n          ```\n";
