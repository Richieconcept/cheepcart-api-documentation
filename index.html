ple.com\",\n              \"addressLine1\": \"Street address\",\n              \"addressLine2\": \"\",\n              \"state\": \"State/Region\",\n              \"city\": \"City\",\n              \"town\": \"Town\",\n              \"postalCode\": \"Postal Code\",\n              \"country\": \"Country\",\n              \"redstarCityAbbr\": \"City abbreviation for Redstar\",\n              \"redstarTownId\": 3868\n            },\n            \"recipientCity\": \"Recipient City for shipping\",\n            \"recipientTownID\": 3868\n          }\n\n          ```\n          ## Field Descriptions:\n\n          - `shipToDifferentAddress` \u2192 true if shipping to a different address than billing.\n          - `billingAddress` \u2192 snapshot of the user\u2019s billing address.\n          - `shippingAddress` \u2192 optional if shipToDifferentAddress is true.\n          - `recipientCity` \u2192 city code for Redstar delivery calculation.\n          - `recipientTownID` \u2192 town ID for Redstar delivery calculation.\n\n          ## Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Order created successfully\",\n            \"order\": { \"_id\": \"...\", \"orderNumber\": \"CHP-20260330-0001\", ... },\n            \"paymentReady\": true,\n            \"hasPendingOrder\": false\n          }\n          ```\n          ## Errors:\n          `400` \u2192 Billing or shipping address missing.\n          `400` \u2192 recipientCity or recipientTownID missing.\n          `400` \u2192 Cart is empty or items unavailable.\n          `500` \u2192 Internal server error.\n      - info:\n          name: Delete Order\n          type: http\n          seq: 6\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/orders/:orderId'\n          params:\n            - name: orderId\n              value: ''\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          tim           \"paidAt\": null,\n              \"orderStatus\": \"pending\",\n              \"shipmentStatus\": \"not_created\",\n              \"shipmentReference\": null,\n              \"trackingNumber\": null,\n              \"shipmentCreatedAt\": null,\n              \"abandonedEmailSent\": false,\n              \"abandonedEmailSentAt\": null,\n              \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n              \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"__v\": 0\n            }\n          }\n          ```\n          ### Error Responses:\n\n          `404` \u2192 Order not found.\n          `400` \u2192 Invalid ID format.\n      - info:\n          name: Get all orders for the user\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/my-orders'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 3\uFE0F\u20E3 Get All Orders\n\n          #### Endpoint: `GET /api/orders/my-orders`\n\n          ## Description:\n          Returns all orders placed by the authenticated user, sorted by creation date (most recent first).\n\n          ### Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n            ```\n            \n          ### Request Description:\n          No request body required.\n\n          ### Sample Success Response:\n          ```json\n          {\n            \"success\": true,\n            \"total\": 1,\n            \"orders\": [\n              {\n                \"pricing\": {\n                  \"subtotal\": 40000,\n                  \"deliveryFee\": 9816,\n                  \"vatAmount\": 736,\n                  \"shippingTotal\": 10552,\n "08012345678\",\n                  \"email\": \"test@gmail.com\",\n                  \"addressLine1\": \"No 1 Abuja Street\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"town\": \"Wuse\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABV\",\n                  \"redstarTownId\": 3868\n                },\n                \"paymentStatus\": \"unpaid\",\n                \"paymentMethod\": \"paystack\",\n                \"paymentReference\": null,\n                \"paidAt\": null,\n                \"orderStatus\": \"pending\",\n                \"shipmentStatus\": \"not_created\",\n                \"shipmentReference\": null,\n                \"trackingNumber\": null,\n                \"shipmentCreatedAt\": null,\n                \"abandonedEmailSent\": false,\n                \"abandonedEmailSentAt\": null,\n                \"createdAt\": \"2026-03-30T14:04:04.566Z\",\n                \"updatedAt\": \"2026-03-30T14:04:04.566Z\",\n                \"orderNumber\": \"CHP-20260330-0001\",\n                \"__v\": 0\n              }\n            ]\n          }\n          ```\n          ### Errors:\n\n          `500` \u2192 Internal server error.\n      - info:\n          name: pending orders check\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/orders/pending'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Get Pending Order\n\n          #### Endpoint: `GET /api/orders/pending`\n\n          ## Description:\n          Fetches the latest unpaid, pending order of the authenticated user. Useful to prevent creating duplicate orders if the user already has an active pending order.\n\n          ## Headers:\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ## Request Description:\n          No request body required. The endpoint automatically fetches the latest pending order for the logged-in user.\n\n          ## Sample Success Response (Pending Order Exists):\n          ```json\n          {\n            \"success\": true,\n            \"order\": { \"_id\": \"69ca82d41d13ed0cbf279f25\", \"orderNumber\": \"CHP-20260330-0001\", ... }\n          }\n          ```\n\n          ### Sample Response (No Pending Order):\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"No pending unpaid order found\"\n          }\n          ```\n          ### Errors:\n          ```json\n          404 \u2192 No pending order exists.\n  - info:\n      name: Payments\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    items:\n      - info:\n          name: Initialize Payment\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/payments/initialize/69ca82d41d13ed0cbf279f25'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 1\uFE0F\u20E3 Initialize Order Payment\n\n          ### \uD83D\uDD39 Endpoint\n          `POST /api/payments/initialize/:orderId`\n\n          ## \uD83D\uDD39 Description\n\n          Initializes payment for an order using Paystack.\n\n          ## This endpoint:\n          - Confirms the order exists\n          - Ensures the order is not already paid or cancelled\n          - Sends a request to Paystack\n          - Returns a payment link (authorization URL)\n\n          #### \uD83D\uDC49 The frontend should redirect the user to this URL to complete payment.\n\n          ## \uD83D\uDD39 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n          ### \uD83D\uDD39 URL Params\n          `orderId` \u2192 The ID of the order you want to pay for\n          Example: 69ca82d41d13ed0cbf279f25\n\n          ### \uD83D\uDD39 Request Description\n          - No request body is required.\n          - The orderId in the URL is used to fetch the order.\n\n          # \uD83D\uDD39 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment initialized successfully\",\n            \"payment\": {\n              \"orderId\": \"69ca82d41d13ed0cbf279f25\",\n              \"orderNumber\": \"CHP-20260330-0001\",\n              \"paymentStatus\": \"pending\",\n              \"reference\": \"PAY-CHP-20260330-0001-1711800000000\",\n              \"amount\": 50552,\n              \"authorizationUrl\": \"https://checkout.paystack.com/xxxxx\",\n              \"accessCode\": \"xxxxxx\"\n            }\n          }\n          ```\n          # \uD83D\uDD39 What Frontend Should Do\n          1. Call this endpoint\n          2. Get authorizationUrl\n          3. Redirect user to that URL\n          4. User completes payment on Paystack\n          \uD83D\uDD39 Error Responses\n\n          ### \u274C Order Not Found\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ### \u274C Already Paid\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"This order has already been paid for\"\n          }\n          ```\n          ### \u274C Cancelled Order\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Cancelled orders cannot be paid for\"\n          }\n      - info:\n          name: Verify Payment\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/payments/verify/PAY-CHP-20260330-0001-1774884757746'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # 2\uFE0F\u20E3 Verify Order Payment\n\n          ### \uD83D\uDD39 Endpoint\n          `GET /api/payment/verify/:reference`\n\n          # \uD83D\uDD39 Description\n          Verifies a payment after the user completes it on Paystack.\n\n          ### This endpoint:\n          - Confirms payment with Paystack\n          - Validates payment amount\n          - Updates order status to paid\n          - Deducts product stock\n          - Clears the user cart\n\n          ### \uD83D\uDD39 Request Headers\n          ```json\n          {\n            \"Authorization\": \"Bearer <USER_TOKEN>\"\n          }\n          ```\n\n          ### \uD83D\uDD39 URL Params\n          `reference` \u2192 Payment reference returned from initialize endpoint\n          Example: PAY-CHP-20260330-0001-1711800000000\n\n          ### \uD83D\uDD39 Request Description\n\n          No request body required.\n          The reference is used to verify payment with Paystack.\n\n          ### \uD83D\uDD39 Sample Success Response\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Payment verified successfully\",\n            \"order\": {\n              \"_id\": \"69ca82d41d13ed0cbf279f25\",\n              \"paymentStatus\": \"paid\",\n              \"orderStatus\": \"confirmed\"\n            },\n            \"nextStep\": \"Create shipment with RedStar\"\n          }\n          ```\n\n          ### \uD83D\uDD39 What Happens Internally\n          \u2714 Payment verified with Paystack\n          \u2714 Order marked as PAID\n          \u2714 Order status \u2192 CONFIRMED\n          \u2714 Product stock reduced\n          \u2714 User cart cleared\n\n          ### \uD83D\uDD39 Error Responses\n\n          ####\u274C Missing Reference\n          ```json\n          {\n            \"success\": false,\n            \"message\": \"Payment reference is required\"\n          }\n          \u274C Payment Failed\n          {\n            \"success\": false,\n            \"message\": \"Payment was not successful\"\n          }\n          \u274C Amount Mismatch\n          {\n            \"success\": false,\n            \"message\": \"Paid amount does not match order total\"\n          }\n          \u274C Order Not Found\n          {\n            \"success\": false,\n            \"message\": \"Order not found\"\n          }\n          ```\n          ## \uD83D\uDD25 FULL PAYMENT FLOW (Frontend Guide)\n          1. User creates order\n          2. Call POST /payment/initialize/:orderId\n          3. Redirect user to Paystack (authorizationUrl)\n          4. User completes payment\n          5. Call GET /payment/verify/:reference\n          6. Show success page\n\n          ### \u26A0\uFE0F IMPORTANT NOTES (Frontend + Backend)\n          \uD83D\uDD10 Authentication\n          All endpoints require Bearer Token\n          \uD83D\uDCB3 Amount Format\n          Paystack uses kobo\n          Backend converts automatically\n\n          ###\n          \uD83D\uDD01 Verification Method\n          Current: Manual (/verify)\n          Production: Use Paystack Webhook (recommended)\n  - info:\n      name: shipment creation\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    items:\n      - info:\n          name: Create/retry shipment creation\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipments/create/69e355eb827eaadacc96e7ca'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          docs {\n            # Create or Retry Shipment\n            \n            #### Shipment is created automatically after successful payment but in some cases where shipment creation fails use this api to retry or get shipment details if created already\n\n            This endpoint is used to:\n\n            1. Create a shipment after successful payment\n            2. Retry shipment creation if it previously failed\n            3. Retrieve existing shipment if already created\n\n            ## When to Use\n\n            \u2705 After payment verification (auto-trigger)\n            \u2705 When shipmentStatus = \"failed\" (manual retry)\n            \u2705 When you need to fetch tracking details\n\n            ## Behavior\n\n            - If shipmentStatus = \"not_created\" \u2192 creates shipment\n            - If shipmentStatus = \"failed\" \u2192 retries shipment\n            - If shipmentStatus = \"created\" \u2192 returns existing shipment\n\n            ## Important\n\n            This endpoint is **idempotent**:\n            - Safe to call multiple times\n            - Will NOT create duplicate shipments\n\n          }\n\n\n          ## Response:\n          ```json\n          {\n            \"success\": true,\n            \"alreadyExists\": true,\n            \"message\": \"Shipment already created\",\n            \"shipment\": {\n              \"orderId\": \"69e355eb827eaadacc96e7ca\",\n              \"orderNumber\": \"CHP-20260418-0001\",\n              \"shipmentStatus\": \"created\",\n              \"trackingNumber\": \"RSASB1186443\",\n              \"shipmentReference\": \"CHP-20260418-0001\",\n              \"createdAt\": \"2026-04-18T10:00:33.756Z\"\n            }\n          }\n      - info:\n          name: GET ALL SHIPMENTS (ADMIN)\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipments/get-all-shipments'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Get All Shipments\n\n          ## Method\n\n          GET\n\n          ## URL\n\n          /api/shipment/get-all-shipments\n\n          ## Auth\n\n          Bearer Token (Admin only)\n\n          ## Description\n\n          Fetch all shipments in the system for monitoring.\n\n          ## When to Call (Frontend)\n\n          * Admin dashboard page\n          * Shipment management page\n\n          ## Example Request\n\n          GET /api/shipment/get-all-shipments\n\n          ## Response\n\n          {\n          \"success\": true,\n          \"total\": 2,\n          \"shipments\": [\n          {\n          \"orderNumber\": \"CHP-20260416-0001\",\n          \"trackingNumber\": \"RSASB1148381\",\n          \"shipmentStatus\": \"created\",\n          \"deliveryStatus\": \"pending\",\n          \"shipmentRetryCount\": 1,\n          \"shipmentError\": null\n          }\n          ]\n          }\n\n          ## Notes for Frontend\n\n          * Show in table format\n          * Add color badges:\n            pending = yellow\n            in_transit = blue\n            delivered = green\n            failed = red\n          * Show retry button if shipmentRetryCount > 0\n      - info:\n          name: RETRY SHIPMENT\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipments/retry/69e0cd3fb5080e7ae3a594e6'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Retry Shipment Tracking\n\n          ## Method\n\n          POST\n\n          ## URL\n\n          /api/shipment/retry/:orderId\n\n          ## Auth\n\n          Bearer Token (Admin only)\n\n          ## Description\n\n          Retries fetching shipment status from Redstar when tracking fails.\n\n          ## When to Call (Frontend)\n\n          * Admin clicks \"Retry\"\n          * When shipment has error or retry count > 0\n\n          ## Params\n\n          orderId (URL param)\n\n          ## Example Request\n\n          POST /api/shipment/retry/69e0b39e4be2b573dcc7274a\n\n          ## Response (Success)\n\n          {\n          \"success\": true,\n          \"message\": \"Shipment retried successfully\",\n          \"shipment\": {\n          \"trackingNumber\": \"RSASB1148381\",\n          \"deliveryStatus\": \"pending\"\n          }\n          }\n\n          ## Response (Fallback - Redstar delay)\n\n          {\n          \"success\": true,\n          \"message\": \"Tracking not available yet. Try again later.\",\n          \"shipment\": {\n          \"status\": \"pending\"\n          }\n          }\n\n          ## Notes for Frontend\n\n          * Disable retry button while loading\n          * Show retry count\n          * Show error message if exists\n      - info:\n          name: Track shipment\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipments/track/RSASB1186443'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |\n          # Track Shipment\n\n          ## Method\n\n          GET\n\n          ## URL\n\n          /api/shipment/track/:trackingNumber\n\n          ## Auth\n\n          Bearer Token (User)\n\n          ## Description\n\n          Fetches real-time shipment tracking details from Redstar.\n\n          ## When to Call (Frontend)\n\n          * Order details page\n          * Tracking page\n          * Refresh every few seconds/minutes (optional)\n\n          ## Params\n\n          trackingNumber (URL param)\n\n          ## Example Request\n\n          GET /api/shipment/track/RSASB1148381\n\n          ## Response (Success)\n\n          {\n          \"success\": true,\n          \"shipment\": {\n          \"trackingNumber\": \"RSASB1148381\",\n          \"status\": \"pending\",\n          \"statusCode\": 0,\n          \"timeline\": [\n          {\n          \"name\": \"Registered\",\n          \"completed\": true\n          }\n          ]\n          }\n          }\n\n          ## Response (Fallback)\n\n          {\n          \"success\": true,\n          \"shipment\": {\n          \"status\": \"pending\",\n          \"message\": \"Tracking not available yet\"\n          }\n          }\n\n          ## Notes for Frontend\n\n          * Use \"status\" for UI (not statusCode)\n          * Display timeline as progress bar\n          * Do not crash if timeline is empty\n  - info:\n      name: Shipping\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Checkout Shipping Flow (Frontend Guide)\n\n        This explains what should happen when a user clicks **Checkout**.\n\n        ## Important Rule\n        Frontend does **NOT** talk directly to RedStar.\n        Frontend only talks to our backend.\n\n        ---\n\n        ## Step 1 \u2014 User opens checkout page\n        Call:\n\n        GET /api/shipping/cities\n\n        Purpose:\n        - Load all available delivery cities\n\n        Use result to populate:\n        - City dropdown\n\n        ---\n\n        ## Step 2 \u2014 User selects a city\n        Call:\n\n        GET /api/shipping/towns/:cityAbbr\n\n        Example:\n        GET /api/shipping/towns/ABV\n\n        Purpose:\n        - Load all towns under the selected city\n\n        Use result to populate:\n        - Town dropdown\n\n        ---\n\n        ## Step 3 \u2014 User selects pickup type\n\n        pickupType values:\n        - 1 = Pickup from my address\n        - 2 = Drop-off in RedStar location\n\n        If pickupType = 2:\n        Call:\n\n        GET /api/shipping/dropoff/:cityAbbr\n\n        Purpose:\n        - Load RedStar dropoff locations for selected city\n\n        Use result to populate:\n        - Dropoff location dropdown\n\n        ---\n\n        ## Step 4 \u2014 User clicks Continue\n        Call:\n\n        POST /api/shipping/calculate-fee\n\n        Purpose:\n        - Validate cart\n        - Calculate RedStar delivery fee\n        - Return checkout summary\n\n        This response should be used to show:\n        - Cart items\n        - Subtotal\n        - Delivery fee\n        - VAT\n        - Total amount\n\n        ---\n\n        ## Final Frontend Flow\n\n        Open Checkout\n        \u2192 Load Cities\n        \u2192 Select City\n        \u2192 Load Towns\n        \u2192 Select Pickup Type\n        \u2192 If Dropoff, Load Locations\n        \u2192 Click Continue\n        \u2192 Calculate Delivery Fee\n        \u2192 Show Checkout Summary\n      type: text/markdown\n    items:\n      - info:\n          name: 01 - Get Shipping Cities\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/cities'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Shipping Cities\n\n          ## Purpose\n          Fetch all available delivery cities supported by RedStar.\n\n          ---\n\n          ## When Frontend Should Call This\n          Call this immediately when the user opens the checkout page.\n\n          ---\n\n          ## Auth\n          No authentication required.\n\n          ## Expected Frontend Use\n          Use this response to populate the **City dropdown**.\n\n          ## Important\n          Store:\n          - `abbr` \u2192 used in future API requests\n          Display:\n          - `name`\n\n          ## Example Output\n          ```json\n          [\n            {\n              \"id\": 6,\n              \"abbr\": \"ABV\",\n              \"name\": \"ABUJA\"\n            }\n          ]\n      - info:\n          name: 02 - Get Shipping Towns\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/towns/abv'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Endpoint: `GET /api/shipping/towns/:cityAbbr`\n          Purpose:\n\n          This endpoint fetches a list of towns for a specific city based on the city abbreviation (e.g., ABV for Abuja). The frontend will use this to populate a town dropdown for the user to select their town.\n\n          ---\n\n          ## Request:\n          Method: GET\n          `URL: /api/shipping/towns/:cityAbbr`\n          ---\n          Parameters:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\", \"LAG\").\n          Headers:\n          Authorization: Bearer `<user_token>`\n          ## Response:\n\n          Successful Response (List of towns):\n          ```json\n          {\n            \"success\": true,\n            \"towns\": [\n              {\n                \"id\": 3895,\n                \"name\": \"Gwarinpa\"\n              },\n              {\n                \"id\": 3896,\n                \"name\": \"Wuse\"\n              },\n              ...\n            ]\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"City abbreviation is required\"\n          }\n          ```\n          # Description:\n          Towns Dropdown: This endpoint will return a list of towns available for the selected city (using the city abbreviation).\n          Input:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\" for Abuja).\n          Output: A list of town objects including ID and name of each town.\n      - info:\n          name: 03 - Calculate Delivery Fee\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipping/calculate-fee'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"recipientCity\": \"Abuja\",\n                \"recipientTownID\": 3895\n              }\n          auth: inherit\n        runtime:\n          variables:\n            - name: baseUrl\n              value: https://cheepcart-project.onrender.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          #Endpoint: \n          `POST /api/shipping/calculate-fee`\n          ## Purpose:\n          ---\n          This endpoint calculates the shipping fee for the user's cart based on the shipping city and town. The frontend will use this to display the final delivery fee to the user before proceeding to payment.\n\n          ## Request:\n          Method: POST\n          `URL: /api/shipping/calculate-fee`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          # Request Body:\n          - recipientCity: The city abbreviation (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The town ID for the selected town.\n          - weight: The total weight of the items in the user's cart (needed to calculate the delivery fee).\n\n          ## Example Request Body:\n          ```json\n          {\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"weight\": 1\n          }\n          Response:\n\n          Successful Response (Shipping Fee Calculation):\n\n          {\n            \"success\": true,\n            \"message\": \"Delivery fee calculated successfully\",\n            \"checkout\": {\n              \"pricing\": {\n                \"subtotal\": 1900000,\n                \"deliveryFee\": 8761,\n                \"vatAmount\": 657,\n                \"shippingTotal\": 9418,\n                \"totalAmount\": 1909418\n              },\n              \"billingAddress\": { ... },\n              \"shippingAddress\": { ... }\n            }\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"Some cart items are unavailable or out of stock\",\n            \"unavailableItems\": [\n              {\n                \"productId\": \"69906a5219d21d11c33baaa5\",\n                \"name\": \"iPhone 14 Pro\"\n              }\n            ]\n          }\n\n          ```\n          ---\n          # Description:\n          - Calculate Delivery Fee: This endpoint uses the recipient city, town, and weight of the cart to calculate the shipping fee.\n          Input:\n          - recipientCity: The abbreviation of the destination city (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The ID of the destination town (e.g., 3895 for Gwarinpa).\n          - weight: The total weight of the items in the user's cart.\n          Output:\n          shipping fee and total amount including the subtotal, VAT, and delivery fee.\n      - info:\n          name: 04 Billing address\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/checkout/billing-address'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |+\n          # Endpoint: \n          `GET /api/checkout/billing-address`\n\n          ## Purpose:\n\n          -This endpoint checks if the user has a saved billing address.  If it exists, it will return the billing address to be used for the checkout process. If not, it will notify the frontend to display the billing address form.\n\n          ---\n          ## Request:\n          Method: GET\n          `URL: /api/checkout/billing-address`\n          Headers:\n          Authorization: Bearer <user_token>\n\n\n          # Response:\n          If the user has a saved billing address:\n          ```json\n          {\n            \"success\": true,\n            \"billingAddress\": {\n              \"_id\": \"69bacc0380418d00be7c5f9e\",\n              \"user\": \"698c87428cdf77f408badbb3\",\n              \"name\": \"John Doe\",\n              \"phone\": \"123456789\",\n              \"addressLine1\": \"123 Main St\",\n              \"addressLine2\": \"Apt 4B\",\n              \"city\": \"Lagos\",\n              \"state\": \"Lagos\",\n              \"postalCode\": \"234001\",\n              \"country\": \"Nigeria\",\n              \"isShippingAddress\": false,\n              \"isBillingAddress\": true,\n              \"createdAt\": \"2026-03-18T16:00:03.838Z\",\n              \"updatedAt\": \"2026-03-18T16:00:03.838Z\",\n              \"__v\": 0\n            },\n            \"shipToDifferentAddress\": true\n          }\n          ```\n          ---\n          If the user does not have a billing address:\n          ```josn\n          {\n            \"success\": false,\n            \"message\": \"No billing address found. Please fill in your billing details.\",\n            \"billingAddress\": null\n          }\n          ```\n          ---\n          **Description:**\n          - If the billing address exists, it returns the existing data.\n          - If the billing address doesn't exist, it returns a message indicating that the user needs to fill in the billing details.\n          - The shipToDifferentAddress flag is returned, allowing the frontend to show the checkbox for \"Ship to a different address\".\n\n\n      - info:\n          name: 05 Checkout initiation\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/checkout/initialize'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"shipToDifferentAddress\": true,\n                \"recipientCity\": \"ABUJA\",\n                \"recipientTownID\": 3895,\n                \"billingAddress\": {\n                  \"fullName\": \"John Doe\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"john@example.com\",\n                  \"addressLine1\": \"12 Gwarinpa Estate\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                },\n                \"shippingAddress\": {\n                  \"fullName\": \"Jane Doe\",\n                  \"phone\": \"08087654321\",\n                  \"email\": \"jane@example.com\",\n                  \"addressLine1\": \"Area 15, Ekiti\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                }\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## Endpoint: `POST /api/checkout/initialize`\n          ## Purpose:\n\n          This endpoint initializes the checkout process by accepting the user's billing address, shipping address, and other relevant details. It calculates the shipping fee, validates the cart, and returns the final checkout summary.\n\n          ---\n          ## Request:\n          Method: POST\n          `URL: /api/checkout/initialize`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          ---\n          # Request Body:\n          ```json\n          {\n            \"shipToDifferentAddress\": true,\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"billingAddress\": {\n              \"fullName\": \"John Doe\",\n              \"phone\": \"08012345678\",\n              \"email\": \"john@example.com\",\n              \"addressLine1\": \"12 Gwarinpa Estate\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\"\n            },\n            \"shippingAddress\": {\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08087654321\",\n              \"email\": \"jane@example.com\",\n              \"addressLine1\": \"Area 11, Abuja\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\",\n              \"redstarCityAbbr\": \"ABV\",\n              \"redstarTownId\": 3895\n            }\n          }\n          }\n          Response:\n\n          If the checkout is successful:\n\n          ---\n\n          {\n            \"success\": true,\n            \"message\": \"Checkout initialized successfully\",\n            \"checkout\": {\n              \"items\": [\n                {\n                  \"productId\": \"69906a5219d21d11c33baaa5\",\n                  \"name\": \"iPhone 14 Pro\",\n                  \"slug\": \"iphone-14-pro\",\n                  \"image\": \"https://res.cloudinary.com/demo.jpg\",\n                  \"price\": 950000,\n                  \"quantity\": 2,\n                  \"subtotal\": 1900000,\n                  \"weight\": 1\n                }\n              ],\n              \"pricing\": {\n                \"subtotal\": 1900000,\n                \"deliveryFee\": 8761,\n                \"vatAmount\": 657,\n                \"shippingTotal\": 9418,\n                \"totalAmount\": 1909418\n              },\n              \"billingAddress\": {\n                \"fullName\": \"John Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"john@example.com\",\n                \"addressLine1\": \"12 Gwarinpa Estate\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\"\n              },\n              \"shippingAddress\": {\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08087654321\",\n                \"email\": \"jane@example.com\",\n                \"addressLine1\": \"Area 11, Abuja\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\"\n              },\n              \"meta\": {\n                \"totalItems\": 2,\n                \"totalWeight\": 2,\n                \"pickupType\": 1,\n                \"senderCity\": \"ASB\",\n                \"recipientCity\": \"ABV\",\n                \"recipientTownID\": 3895\n              },\n              \"redstarRaw\": {\n                \"DeliveryFee\": 8761,\n                \"VatAmount\": 657,\n                \"TotalAmount\": 9418\n              }\n            }\n          }\n\n          If there\u2019s an error (e.g., missing fields or cart issues):\n\n          {\n            \"success\": false,\n            \"message\": \"Some cart items are unavailable or out of stock\",\n            \"unavailableItems\": [\n              {\n                \"productId\": \"69906a5219d21d11c33baaa5\",\n                \"name\": \"iPhone 14 Pro\"\n              }\n            ]\n          }\n\n          ```\n\n          ---\n          # Description:\n          Validation: This endpoint validates the user's billing address and shipping address.\n          Shipping Fee Calculation: It uses RedStar API to calculate the shipping fee based on the provided recipient city and town.\n          Final Summary: The endpoint returns the final checkout summary with subtotal, shipping fee, VAT, and total amount.\n          If there\u2019s any issue with the cart (e.g., items being out of stock), it returns an error with the unavailable items.\n  - info:\n      name: Upload-Media\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # API Documentation: CHEEP CART IMAGE UPLOAD API\n\n        ## Overview\n\n        .\n\n        \uD83D\uDCCC CHEEP CART IMAGE UPLOAD API \u2013 BEGINNER FRIENDLY\n\n        This API allows the frontend to upload, update, and delete images for products, categories, or other parts of the app. Each endpoint is explained clearly so you know when to use it, what to send, and what to expect in return.\n\n        ---\n\n        ## Endpoints\n\n        ### 1\uFE0F\u20E3 **Upload Images**\n        #### Endpoint:\n      type: text/markdown\n    items:\n      - info:\n          name: DELETE IMAGES TO CLOUDINARY\n          type: http\n          seq: 3\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/upload/delete'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"public_ids\": [\n                  \"cheepcart/general/kbfy4oaberwh3yjwhl9s\"\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          DELETE /api/upload/delete\n\n\n          ## Description:\n          Remove images from Cloudinary and keep the database in sync by deleting the public_ids.\n\n          ## Authentication:\n          - **Bearer Token** required.\n\n          ### Body Type:\n          - **Raw JSON**\n\n          ## Request Body:\n          ```json\n          {\n            \"public_ids\": [\"cheepcart/products/new_abc123\", \"cheepcart/products/new_xyz456\"]\n          }\n          ```\n          ## Example response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Images deleted successfully\"\n          }\n          {\n            \"public_ids\": [\"cheepcart/products/new_abc123\", \"cheepcart/products/new_xyz456\"]\n          }\n      - info:\n          name: UPDATE IMAGES TO CLOUDINARY\n          type: http\n          seq: 2\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/upload/update'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\becky's flyer design.png\n              - name: oldImages\n                type: text\n                value: ''\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          PUT /api/upload/update\n\n\n          ## Description:\n          Replace existing images with new ones and update the database with the new public_ids.\n\n          ## Authentication:\n          - **Bearer Token** required.\n\n          ## Body Type:\n          - **Multipart Form**\n\n          ## Request Fields:\n\n          | Key      | Type  | Value / Example                                | Notes                               |\n          |----------|-------|----------------------------------------------|-------------------------------------|\n          | oldImages| Text  | [\"cheepcart/products/abc123\",\"cheepcart/products/xyz456\"] | JSON array of public_ids to replace |\n          | images   | File  | newImage1.jpg                                | Repeat key for multiple files (max 4). |\n          | images   | File  | newImage2.png                                | Repeat key for multiple files (max 4). |\n          | type     | Text  | products                                     | Optional folder type.              |\n\n          #### Example Request:\n          ```bash id=\"9m9v5t\"\n          PUT /api/upload/update\n          Content-Type: multipart/form-data\n          Authorization: Bearer YOUR_API_TOKEN\n\n          {\n            \"oldImages\": [\"cheepcart/products/abc123\", \"cheepcart/products/xyz456\"],\n            \"images\": [newImage1.jpg, newImage2.png],\n            \"type\": \"products\"\n          }\n          ```\n\n          ##Example response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Images updated successfully\",\n            \"images\": [\n              { \"url\": \"https://res.cloudinary.com/.../newImage1.webp\", \"public_id\": \"cheepcart/products/new_abc123\" },\n              { \"url\": \"https://res.cloudinary.com/.../newImage2.webp\", \"public_id\": \"cheep
