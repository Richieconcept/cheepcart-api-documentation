        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: CHEEPCART-BACKEND\nconfig:\n  proxy:\n    inherit: true\n    config:\n      protocol: http\n      hostname: ''\n      port: ''\n      auth:\n        username: ''\n        password: ''\n      bypassProxy: ''\n  environments:\n    - name: local\n      variables:\n        - name: baseUrl\n          value: https://cheepcart-project.onrender.com\n        - name: token\n          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5OGM4NzQyOGNkZjc3ZjQwOGJhZGJiMyIsImlhdCI6MTc3NzkwMjAzOCwiZXhwIjoxNzc4NTA2ODM4fQ.RjoFAS_G0u_gIZrO-zBhF3uttETr_oCtkm5btZHGjno\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    presets:\n      requestType: http\n      requestUrl: https://cheepcart-project.onrender.com\n    exportedUsing: Codex docs refresh\nitems:\n  - info:\n      name: Shipping\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Checkout Shipping Flow (Frontend Guide)\n\n        This explains what should happen when a user clicks **Checkout**.\n\n        ## Important Rule\n        Frontend does **NOT** talk directly to RedStar.\n        Frontend only talks to our backend.\n\n        ---\n\n        ## Step 1 — User opens checkout page\n        Call:\n\n        GET /api/shipping/cities\n\n        Purpose:\n        - Load all available delivery cities\n\n        Use result to populate:\n        - City dropdown\n\n        ---\n\n        ## Step 2 — User selects a city\n        Call:\n\n        GET /api/shipping/towns/:cityAbbr\n\n        Example:\n        GET /api/shipping/towns/ABV\n\n        Purpose:\n        - Load all towns under the selected city\n\n        Use result to populate:\n        - Town dropdown\n\n        ---\n\n        ## Step 3 — User selects pickup type\n\n        pickupType values:\n        - 1 = Pickup from my address\n        - 2 = Drop-off in RedStar location\n\n        If pickupType = 2:\n        Call:\n\n        GET /api/shipping/dropoff/:cityAbbr\n\n        Purpose:\n        - Load RedStar dropoff locations for selected city\n\n        Use result to populate:\n        - Dropoff location dropdown\n\n        ---\n\n        ## Step 4 — User clicks Continue\n        Call:\n\n        POST /api/shipping/calculate-fee\n\n        Purpose:\n        - Validate cart\n        - Calculate RedStar delivery fee\n        - Return checkout summary\n\n        This response should be used to show:\n        - Cart items\n        - Subtotal\n        - Delivery fee\n        - VAT\n        - Total amount\n\n        ---\n\n        ## Final Frontend Flow\n\n        Open Checkout\n        → Load Cities\n        → Select City\n        → Load Towns\n        → Select Pickup Type\n        → If Dropoff, Load Locations\n        → Click Continue\n        → Calculate Delivery Fee\n        → Show Checkout Summary\n      type: text/markdown\n    items:\n      - info:\n          name: 01 - Get Shipping Cities\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/cities'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Shipping Cities\n\n          ## Purpose\n          Fetch all available delivery cities supported by RedStar.\n\n          ---\n\n          ## When Frontend Should Call This\n          Call this immediately when the user opens the checkout page.\n\n          ---\n\n          ## Auth\n          No authentication required.\n\n          ## Expected Frontend Use\n          Use this response to populate the **City dropdown**.\n\n          ## Important\n          Store:\n          - `abbr` → used in future API requests\n          Display:\n          - `name`\n\n          ## Example Output\n          ```json\n          [\n            {\n              \"id\": 6,\n              \"abbr\": \"ABV\",\n              \"name\": \"ABUJA\"\n            }\n          ]\n      - info:\n          name: 02 - Get Shipping Towns\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/shipping/towns/abv'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Endpoint: `GET /api/shipping/towns/:cityAbbr`\n          Purpose:\n\n          This endpoint fetches a list of towns for a specific city based on the city abbreviation (e.g., ABV for Abuja). The frontend will use this to populate a town dropdown for the user to select their town.\n\n          ---\n\n          ## Request:\n          Method: GET\n          `URL: /api/shipping/towns/:cityAbbr`\n          ---\n          Parameters:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\", \"LAG\").\n          Headers:\n          Authorization: Bearer `<user_token>`\n          ## Response:\n\n          Successful Response (List of towns):\n          ```json\n          {\n            \"success\": true,\n            \"towns\": [\n              {\n                \"id\": 3895,\n                \"name\": \"Gwarinpa\"\n              },\n              {\n                \"id\": 3896,\n                \"name\": \"Wuse\"\n              },\n              ...\n            ]\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"City abbreviation is required\"\n          }\n          ```\n          # Description:\n          Towns Dropdown: This endpoint will return a list of towns available for the selected city (using the city abbreviation).\n          Input:\n          cityAbbr: The abbreviation of the city (e.g., \"ABV\" for Abuja).\n          Output: A list of town objects including ID and name of each town.\n      - info:\n          name: 03 - Calculate Delivery Fee\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/shipping/calculate-fee'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"recipientCity\": \"Abuja\",\n                \"recipientTownID\": 3895\n              }\n          auth: inherit\n        runtime:\n          variables:\n            - name: baseUrl\n              value: https://cheepcart-project.onrender.com\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          #Endpoint: \n          `POST /api/shipping/calculate-fee`\n          ## Purpose:\n          ---\n          This endpoint calculates the shipping fee for the user's cart based on the shipping city and town. The frontend will use this to display the final delivery fee to the user before proceeding to payment.\n\n          ## Request:\n          Method: POST\n          `URL: /api/shipping/calculate-fee`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          # Request Body:\n          - recipientCity: The city abbreviation (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The town ID for the selected town.\n          - weight: The total weight of the items in the user's cart (needed to calculate the delivery fee).\n\n          ## Example Request Body:\n          ```json\n          {\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"weight\": 1\n          }\n          Response:\n\n          Successful Response (Shipping Fee Calculation):\n\n          {\n            \"success\": true,\n            \"message\": \"Delivery fee calculated successfully\",\n            \"checkout\": {\n              \"pricing\": {\n                \"subtotal\": 1900000,\n                \"deliveryFee\": 8761,\n                \"vatAmount\": 657,\n                \"shippingTotal\": 9418,\n                \"totalAmount\": 1909418\n              },\n              \"billingAddress\": { ... },\n              \"shippingAddress\": { ... }\n            }\n          }\n\n          Error Response:\n\n          {\n            \"success\": false,\n            \"message\": \"Some cart items are unavailable or out of stock\",\n            \"unavailableItems\": [\n              {\n                \"productId\": \"69906a5219d21d11c33baaa5\",\n                \"name\": \"iPhone 14 Pro\"\n              }\n            ]\n          }\n\n          ```\n          ---\n          # Description:\n          - Calculate Delivery Fee: This endpoint uses the recipient city, town, and weight of the cart to calculate the shipping fee.\n          Input:\n          - recipientCity: The abbreviation of the destination city (e.g., \"ABV\", \"LAG\").\n          - recipientTownID: The ID of the destination town (e.g., 3895 for Gwarinpa).\n          - weight: The total weight of the items in the user's cart.\n          Output:\n          shipping fee and total amount including the subtotal, VAT, and delivery fee.\n      - info:\n          name: 04 Billing address\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/checkout/billing-address'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |+\n          # Endpoint: \n          `GET /api/checkout/billing-address`\n\n          ## Purpose:\n\n          -This endpoint checks if the user has a saved billing address.  If it exists, it will return the billing address to be used for the checkout process. If not, it will notify the frontend to display the billing address form.\n\n          ---\n          ## Request:\n          Method: GET\n          `URL: /api/checkout/billing-address`\n          Headers:\n          Authorization: Bearer <user_token>\n\n\n          # Response:\n          If the user has a saved billing address:\n          ```json\n          {\n            \"success\": true,\n            \"billingAddress\": {\n              \"_id\": \"69bacc0380418d00be7c5f9e\",\n              \"user\": \"698c87428cdf77f408badbb3\",\n              \"name\": \"John Doe\",\n              \"phone\": \"123456789\",\n              \"addressLine1\": \"123 Main St\",\n              \"addressLine2\": \"Apt 4B\",\n              \"city\": \"Lagos\",\n              \"state\": \"Lagos\",\n              \"postalCode\": \"234001\",\n              \"country\": \"Nigeria\",\n              \"isShippingAddress\": false,\n              \"isBillingAddress\": true,\n              \"createdAt\": \"2026-03-18T16:00:03.838Z\",\n              \"updatedAt\": \"2026-03-18T16:00:03.838Z\",\n              \"__v\": 0\n            },\n            \"shipToDifferentAddress\": true\n          }\n          ```\n          ---\n          If the user does not have a billing address:\n          ```josn\n          {\n            \"success\": false,\n            \"message\": \"No billing address found. Please fill in your billing details.\",\n            \"billingAddress\": null\n          }\n          ```\n          ---\n          **Description:**\n          - If the billing address exists, it returns the existing data.\n          - If the billing address doesn't exist, it returns a message indicating that the user needs to fill in the billing details.\n          - The shipToDifferentAddress flag is returned, allowing the frontend to show the checkbox for \"Ship to a different address\".\n\n\n      - info:\n          name: 05 Checkout initiation\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/checkout/initialize'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"shipToDifferentAddress\": true,\n                \"recipientCity\": \"ABUJA\",\n                \"recipientTownID\": 3895,\n                \"billingAddress\": {\n                  \"fullName\": \"John Doe\",\n                  \"phone\": \"08012345678\",\n                  \"email\": \"john@example.com\",\n                  \"addressLine1\": \"12 Gwarinpa Estate\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                },\n                \"shippingAddress\": {\n                  \"fullName\": \"Jane Doe\",\n                  \"phone\": \"08087654321\",\n                  \"email\": \"jane@example.com\",\n                  \"addressLine1\": \"Area 15, Ekiti\",\n                  \"addressLine2\": \"\",\n                  \"state\": \"FCT\",\n                  \"city\": \"Abuja\",\n                  \"postalCode\": \"900001\",\n                  \"country\": \"Nigeria\",\n                  \"redstarCityAbbr\": \"ABUJA\",\n                  \"redstarTownId\": 3895\n                }\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## Endpoint: `POST /api/checkout/initialize`\n          ## Purpose:\n\n          This endpoint initializes the checkout process by accepting the user's billing address, shipping address, and other relevant details. It calculates the shipping fee, validates the cart, and returns the final checkout summary.\n\n          ---\n          ## Request:\n          Method: POST\n          `URL: /api/checkout/initialize`\n          Headers:\n          Authorization: Bearer <user_token>\n          Content-Type: application/json\n\n          ---\n          # Request Body:\n          ```json\n          {\n            \"shipToDifferentAddress\": true,\n            \"recipientCity\": \"ABV\",\n            \"recipientTownID\": 3895,\n            \"billingAddress\": {\n              \"fullName\": \"John Doe\",\n              \"phone\": \"08012345678\",\n              \"email\": \"john@example.com\",\n              \"addressLine1\": \"12 Gwarinpa Estate\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\"\n            },\n            \"shippingAddress\": {\n              \"fullName\": \"Jane Doe\",\n              \"phone\": \"08087654321\",\n              \"email\": \"jane@example.com\",\n              \"addressLine1\": \"Area 11, Abuja\",\n              \"addressLine2\": \"\",\n              \"state\": \"FCT\",\n              \"city\": \"Abuja\",\n              \"postalCode\": \"900001\",\n              \"country\": \"Nigeria\",\n              \"redstarCityAbbr\": \"ABV\",\n              \"redstarTownId\": 3895\n            }\n          }\n          }\n          Response:\n\n          If the checkout is successful:\n\n          ---\n\n          {\n            \"success\": true,\n            \"message\": \"Checkout initialized successfully\",\n            \"checkout\": {\n              \"items\": [\n                {\n                  \"productId\": \"69906a5219d21d11c33baaa5\",\n                  \"name\": \"iPhone 14 Pro\",\n                  \"slug\": \"iphone-14-pro\",\n                  \"image\": \"https://res.cloudinary.com/demo.jpg\",\n                  \"price\": 950000,\n                  \"quantity\": 2,\n                  \"subtotal\": 1900000,\n                  \"weight\": 1\n                }\n              ],\n              \"pricing\": {\n                \"subtotal\": 1900000,\n                \"deliveryFee\": 8761,\n                \"vatAmount\": 657,\n                \"shippingTotal\": 9418,\n                \"totalAmount\": 1909418\n              },\n              \"billingAddress\": {\n                \"fullName\": \"John Doe\",\n                \"phone\": \"08012345678\",\n                \"email\": \"john@example.com\",\n                \"addressLine1\": \"12 Gwarinpa Estate\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\"\n              },\n              \"shippingAddress\": {\n                \"fullName\": \"Jane Doe\",\n                \"phone\": \"08087654321\",\n                \"email\": \"jane@example.com\",\n                \"addressLine1\": \"Area 11, Abuja\",\n                \"addressLine2\": \"\",\n                \"state\": \"FCT\",\n                \"city\": \"Abuja\",\n                \"postalCode\": \"900001\",\n                \"country\": \"Nigeria\"\n              },\n              \"meta\": {\n                \"totalItems\": 2,\n                \"totalWeight\": 2,\n                \"pickupType\": 1,\n                \"senderCity\": \"ASB\",\n                \"recipientCity\": \"ABV\",\n                \"recipientTownID\": 3895\n              },\n              \"redstarRaw\": {\n                \"DeliveryFee\": 8761,\n                \"VatAmount\": 657,\n                \"TotalAmount\": 9418\n              }\n            }\n          }\n\n          If there’s an error (e.g., missing fields or cart issues):\n\n          {\n            \"success\": false,\n            \"message\": \"Some cart items are unavailable or out of stock\",\n            \"unavailableItems\": [\n              {\n                \"productId\": \"69906a5219d21d11c33baaa5\",\n                \"name\": \"iPhone 14 Pro\"\n              }\n            ]\n          }\n\n          ```\n\n          ---\n          # Description:\n          Validation: This endpoint validates the user's billing address and shipping address.\n          Shipping Fee Calculation: It uses RedStar API to calculate the shipping fee based on the provided recipient city and town.\n          Final Summary: The endpoint returns the final checkout summary with subtotal, shipping fee, VAT, and total amount.\n          If there’s any issue with the cart (e.g., items being out of stock), it returns an error with the unavailable items.\n  - info:\n      name: Upload-Media\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # API Documentation: CHEEP CART IMAGE UPLOAD API\n\n        ## Overview\n\n        .\n\n        📌 CHEEP CART IMAGE UPLOAD API – BEGINNER FRIENDLY\n\n        This API allows the frontend to upload, update, and delete images for products, categories, or other parts of the app. Each endpoint is explained clearly so you know when to use it, what to send, and what to expect in return.\n\n        ---\n\n        ## Endpoints\n\n        ### 1️⃣ **Upload Images**\n        #### Endpoint:\n      type: text/markdown\n    items:\n      - info:\n          name: upload-to-cloudinary\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/upload/upload'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\WhatsApp Image 2026-03-27 at 1.49.19 PM.jpeg\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\WhatsApp Image 2026-03-27 at 2.43.27 PM.jpeg\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\655932819_122122122573103905_2579480286096579906_n.jpg\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\WhatsApp Image 2026-03-23 at 10.12.34 AM (1).jpeg\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          `POST /api/upload/upload`\n\n          # Upload Images\n          #### Description:\n          Use this endpoint to add new images for a product, category, or any section in your app. You can upload 1 to 4 images at a time. After uploading, the API will give you URLs to display and public IDs to manage the images later.\n\n          #### Authentication:\n          - **Bearer Token** required.\n\n          #### Body Type:\n          - **Multipart Form**\n\n          #### Request Fields:\n\n          | Key      | Type  | Value / Example        | Notes                                  |\n          |----------|-------|------------------------|----------------------------------------|\n          | images   | File  | image1.jpg             | Repeat key for multiple files (max 4). |\n          | images   | File  | image2.png             | Repeat key for multiple files (max 4). |\n          | type     | Text  | products               | Optional folder (products, categories, general). |\n\n          #### Example Request:\n          ```bash\n          POST /api/upload/upload\n          Content-Type: multipart/form-data\n          Authorization: Bearer YOUR_API_TOKEN\n\n          {\n            images: [image1.jpg, image2.png],\n            type: \"products\"\n          }\n\n          ##Example Response:\n          ```json\n          {\n            \"success\": true,\n            \"count\": 2,\n            \"images\": [\n              { \"url\": \"https://res.cloudinary.com/.../image1.webp\", \"public_id\": \"cheepcart/products/abc123\" },\n              { \"url\": \"https://res.cloudinary.com/.../image2.webp\", \"public_id\": \"cheepcart/products/xyz456\" }\n            ]\n          }\n      - info:\n          name: UPDATE IMAGES TO CLOUDINARY\n          type: http\n          seq: 2\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/upload/update'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: images\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\becky's flyer design.png\n              - name: oldImages\n                type: text\n                value: ''\n                contentType: '[\"cheepcart/general/kbfy4oaberwh3yjwhl9s\"]'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          PUT /api/upload/update\n\n\n          ## Description:\n          Replace existing images with new ones and update the database with the new public_ids.\n\n          ## Authentication:\n          - **Bearer Token** required.\n\n          ## Body Type:\n          - **Multipart Form**\n\n          ## Request Fields:\n\n          | Key      | Type  | Value / Example                                | Notes                               |\n          |----------|-------|----------------------------------------------|-------------------------------------|\n          | oldImages| Text  | [\"cheepcart/products/abc123\",\"cheepcart/products/xyz456\"] | JSON array of public_ids to replace |\n          | images   | File  | newImage1.jpg                                | Repeat key for multiple files (max 4). |\n          | images   | File  | newImage2.png                                | Repeat key for multiple files (max 4). |\n          | type     | Text  | products                                     | Optional folder type.              |\n\n          #### Example Request:\n          ```bash id=\"9m9v5t\"\n          PUT /api/upload/update\n          Content-Type: multipart/form-data\n          Authorization: Bearer YOUR_API_TOKEN\n\n          {\n            \"oldImages\": [\"cheepcart/products/abc123\", \"cheepcart/products/xyz456\"],\n            \"images\": [newImage1.jpg, newImage2.png],\n            \"type\": \"products\"\n          }\n          ```\n\n          ##Example response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Images updated successfully\",\n            \"images\": [\n              { \"url\": \"https://res.cloudinary.com/.../newImage1.webp\", \"public_id\": \"cheepcart/products/new_abc123\" },\n              { \"url\": \"https://res.cloudinary.com/.../newImage2.webp\", \"public_id\": \"cheepcart/products/new_xyz456\" }\n            ]\n          }\n      - info:\n          name: DELETE IMAGES TO CLOUDINARY\n          type: http\n          seq: 3\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/upload/delete'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: json\n            data: |-\n              {\n                \"public_ids\": [\n                  \"cheepcart/general/kbfy4oaberwh3yjwhl9s\"\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          DELETE /api/upload/delete\n\n\n          ## Description:\n          Remove images from Cloudinary and keep the database in sync by deleting the public_ids.\n\n          ## Authentication:\n          - **Bearer Token** required.\n\n          ### Body Type:\n          - **Raw JSON**\n\n          ## Request Body:\n          ```json\n          {\n            \"public_ids\": [\"cheepcart/products/new_abc123\", \"cheepcart/products/new_xyz456\"]\n          }\n          ```\n          ## Example response:\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Images deleted successfully\"\n          }\n          {\n            \"public_ids\": [\"cheepcart/products/new_abc123\", \"cheepcart/products/new_xyz456\"]\n          }\n      - info:\n          name: Create Banner\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseurl}}/api/banners'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 23, 2026, 03_11_36 PM.png\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 23, 2026, 03_03_02 PM.png\n              - name: type\n                type: text\n                value: hero\n              - name: 'subtitle '\n                type: text\n                value: Big sale\n              - name: link\n                type: text\n                value: /shop\n              - name: 'order '\n                type: text\n                value: '1'\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 23, 2026, 04_40_45 PM.png\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 23, 2026, 03_12_07 PM.png\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 23, 2026, 10_17_58 AM.png\n          auth: inherit\n        runtime:\n          variables:\n            - name: baseurl\n              value: http://localhost:5000\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          POST /api/banners\n\n          ## Description:\n          Create a new banner and upload media files to Cloudinary.  \n          Supports images, videos, and SVG files. A banner can contain up to 5 media items.\n\n          ## Authentication:\n          - **Bearer Token** required (Admin only)\n\n          ### Body Type:\n          - **Multipart Form**\n\n          ## Form Data:\n          type       = hero\n          title      = Promo Banner\n          subtitle   = Big sale\n          link       = /shop\n          order      = 1\n          media      = [file]\n          media      = [file]\n\n          ## Field Details:\n\n          ### type\n          - Type: string\n          - Required: Yes\n          - Description:\n            Defines the banner category. Common values:\n            - hero\n            - secondary\n\n          ### media\n          - Type: file\n          - Required: Yes\n          - Description:\n            Media files to upload.\n            - Max: 5 files\n            - Allowed: image, video, svg\n            - Use the same key `media` for all files\n\n          ### title\n          - Type: string\n          - Required: No\n          - Description: Main banner title\n\n          ### subtitle\n          - Type: string\n          - Required: No\n          - Description: Supporting text\n\n          ### link\n          - Type: string\n          - Required: No\n          - Description: Redirect URL when banner is clicked\n\n          ### order\n          - Type: number\n          - Required: No\n          - Description: Controls display order (lower appears first)\n\n          ## Example Response:\n          ```json\n          {\n            \"success\": true,\n            \"banner\": {\n              \"_id\": \"69eb87c849ff28ea647c4509\",\n              \"type\": \"hero\",\n              \"mediaItems\": [\n                {\n                  \"secure_url\": \"https://res.cloudinary.com/xxx/image/upload/file.png\",\n                  \"public_id\": \"cheepcart/banners/file\",\n                  \"mediaType\": \"image\",\n                  \"resource_type\": \"image\"\n                }\n              ],\n              \"title\": \"Promo Banner\",\n              \"subtitle\": \"Big sale\",\n              \"link\": \"/shop\",\n              \"order\": 1,\n              \"isActive\": true\n            }\n          }\n      - info:\n          name: Get All Banner\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/banners'\n          body:\n            type: json\n            data: |\n              {\n                \"type\": \"hero\",\n                \"title\": \"Main Home Slider\",\n                \"subtitle\": \"Big promo banner\",\n                \"link\": \"/shop\",\n                \"order\": 1,\n                \"mediaItems\": [\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/your-cloud/...jpg\",\n                    \"public_id\": \"cheepcart/banners/sample1\",\n                    \"mediaType\": \"image\",\n                    \"resource_type\": \"image\"\n                  },\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/your-cloud/...mp4\",\n                    \"public_id\": \"cheepcart/banners/sample2\",\n                    \"mediaType\": \"video\",\n                    \"resource_type\": \"video\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          GET /api/banners\n\n          ## Description:\n          Retrieve all active banners for frontend display.  \n          This endpoint is used by the client to render banner sliders (hero, secondary, etc).\n\n          ## Authentication:\n          - Not required\n\n          ### Body Type:\n          - None\n\n          ## Query Params (Optional):\n\n          ### type\n          - Type: string\n          - Required: No\n          - Description:\n            Filter banners by type\n\n          - Example:\n            - hero\n            - secondary\n\n          ## Example Requests:\n\n          GET /api/banners  \n          GET /api/banners?type=hero  \n          GET /api/banners?type=secondary  \n\n          ## Example Response:\n          ```json\n          {\n            \"success\": true,\n            \"banners\": [\n              {\n                \"_id\": \"69eb87c849ff28ea647c4509\",\n                \"type\": \"hero\",\n                \"mediaItems\": [\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/.../file.png\",\n                    \"public_id\": \"cheepcart/banners/file\",\n                    \"mediaType\": \"image\",\n                    \"resource_type\": \"image\"\n                  }\n                ],\n                \"title\": \"Promo Banner\",\n                \"subtitle\": \"Big sale\",\n                \"link\": \"/shop\",\n                \"order\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-24T15:10:00.099Z\",\n                \"updatedAt\": \"2026-04-24T15:10:00.099Z\"\n              }\n            ]\n          }\n      - info:\n          name: Update banners\n          type: http\n          seq: 6\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/banners/{{bannerId}}'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Delete Media\n          type: http\n          seq: 7\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/banners/69eb7df8d1a99161ce5b6ca3'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          DELETE /api/upload/delete\n\n          ## Description:\n          Delete one or more media files from Cloudinary using their public_ids.  \n          This ensures removed files do not remain in storage and helps keep your database in sync.\n\n          ## Authentication:\n          - **Bearer Token** required (Admin only)\n\n          ### Body Type:\n          - **Raw JSON**\n\n          ## Request Body:\n          ```json\n          {\n            \"public_ids\": [\n              \"cheepcart/products/new_abc123\",\n              \"cheepcart/products/new_xyz456\"\n            ]\n          }\n      - info:\n          name: 'Create Side-Bar  '\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/side-banners'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          body:\n            type: multipart-form\n            data:\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\616765871_122157963806840934_3423340267822403840_n.jpg\n              - name: media\n                type: file\n                value:\n                  - C:\\Users\\Hi\\Downloads\\ChatGPT Image Apr 24, 2026, 02_09_27 PM.png\n              - name: title\n                type: text\n                value: Side Promo\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          ## Call this endpoint to create a side banner  for preorder \n\n          #### auth\n          `Authorization: Bearer {{adminToken}}`\n\n          ### request body\n          ```json\n          Multipart Form\n          media      = [file 1]\n          media      = [file 2]\n          media      = [file 3]\n          media      = [file 4]\n          media      = [file 5]\n          title      = Promo Banner\n          subtitle   = Big sale\n          link       = /shop\n          order      = 1\n          ```\n\n\n          ### Example response\n          ```json\n          {\n            \"success\": true,\n            \"banner\": {\n              \"_id\": \"69ebd2ac3efb90f3bd2a1794\",\n              \"type\": \"secondary\",\n              \"order\": 1,\n              \"isActive\": true,\n              \"mediaItems\": [\n                {\n                  \"secure_url\": \"https://res.cloudinary.com/dpqb1hpmc/image/upload/v1777062740/cheepcart/banners/qcndbfokklneppzzhca6.jpg\",\n                  \"public_id\": \"cheepcart/banners/qcndbfokklneppzzhca6\",\n                  \"mediaType\": \"image\",\n                  \"resource_type\": \"image\"\n                },\n                {\n                  \"secure_url\": \"https://res.cloudinary.com/dpqb1hpmc/image/upload/v1777062743/cheepcart/banners/swdqttues484un7v5wf8.png\",\n                  \"public_id\": \"cheepcart/banners/swdqttues484un7v5wf8\",\n                  \"mediaType\": \"image\",\n                  \"resource_type\": \"image\"\n                }\n              ],\n              \"title\": \"Side Promo\",\n              \"createdAt\": \"2026-04-24T20:29:32.629Z\",\n              \"updatedAt\": \"2026-04-24T20:32:25.294Z\",\n              \"__v\": 1\n            }\n          }\n      - info:\n          name: Get side banner\n          type: http\n          seq: 9\n        http:\n          method: GET\n          url: |\n            GET {{baseUrl}}/api/side-banners\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n  - info:\n      name: Categories and Product Sorting\n      type: folder\n      seq: 2\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Categories and Product Sorting API\n\n        ## What this folder is for\n\n        This folder documents the category endpoints and the way categories connect to product browsing, filtering, and sorting on the frontend.\n\n        Categories are used for:\n        - Storefront category menus.\n        - Product filter pages.\n        - Admin dashboard category management.\n        - Product creation, because each normal product requires a category `_id`.\n\n        ## Category data model\n\n        A category has these main fields:\n\n        `name`\n        - Type: string\n        - Required: yes\n        - Must be unique.\n        - Used as the admin and storefront display name.\n\n        `slug`\n        - Type: string\n        - Generated automatically from `name`.\n        - Example: `Mobile Phones` becomes `mobile-phones`.\n        - The current product category filter uses category `_id`, not slug.\n\n        `image`\n        - Type: string\n        - Optional.\n        - Usually a Cloudinary URL returned by the upload endpoint.\n\n        `order`\n        - Type: number\n        - Optional.\n        - Default: `0`.\n        - Controls category display order. Lower numbers appear first.\n\n        `isActive`\n        - Type: boolean\n        - Default: `true`.\n        - Public category listing only returns active categories.\n\n        ## Public category sorting behavior\n\n        `GET /api/categories` returns only active categories and sorts them by:\n\n        1. `order` ascending.\n        2. `createdAt` ascending when two categories have the same `order`.\n\n        Frontend should display categories in the exact order returned by the API.\n\n        ## Product browsing by category\n\n        Products are filtered by category through:\n\n        `GET /api/products?category=<categoryId>`\n\n        Important:\n        - `category` must be the MongoDB category `_id`.\n        - Do not send the category slug to the current backend for product filtering.\n        - Product responses populate category as `{ name, slug }`.\n\n        ## Product sort values\n\n        Product listing supports these `sort` query values:\n\n        - `price_asc` - cheapest first.\n        - `price_desc` - most expensive first.\n        - `best_selling` - highest `sold` count first.\n\n        If `sort` is not sent, products are returned featured first, then newest first.\n\n        ## Admin notes\n\n        Creating, updating, and deleting categories require:\n\n        `Authorization: Bearer <ADMIN_TOKEN>`\n\n        Deleting a category does not remove it from the database. It sets `isActive` to `false`, which hides it from the public category list.\n      type: text/markdown\n    items:\n      - info:\n          name: 01 Get Active Categories\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/categories'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Active Categories\n\n          ## Endpoint\n          `GET /api/categories`\n\n          ## Description\n\n          Returns all active categories for the storefront. Use this endpoint to build category menus, category filter chips, homepage category sections, and product browsing filters.\n\n          ## Authentication\n\n          Not required.\n\n          ## Sorting\n\n          The backend sorts categories by:\n\n          1. `order` ascending.\n          2. `createdAt` ascending when categories have the same `order`.\n\n          Frontend should use the returned array order directly.\n\n          ## Response fields\n\n          `success`\n          - Type: boolean\n          - Shows whether the request completed successfully.\n\n          `categories`\n          - Type: array\n          - Contains active category objects.\n\n          Category object fields:\n          - `_id` - category ID. Use this value when filtering products.\n          - `name` - display name.\n          - `slug` - URL-friendly name generated from `name`.\n          - `image` - optional image URL.\n          - `order` - display sorting number.\n          - `isActive` - active status.\n          - `createdAt` - creation timestamp.\n          - `updatedAt` - last update timestamp.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"success\": true,\n            \"categories\": [\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                \"name\": \"Phones\",\n                \"slug\": \"phones\",\n                \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/phones.jpg\",\n                \"order\": 1,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n                \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n              },\n              {\n                \"_id\": \"662b7f8f4f9c2e2d7c222222\",\n                \"name\": \"Laptops\",\n                \"slug\": \"laptops\",\n                \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/laptops.jpg\",\n                \"order\": 2,\n                \"isActive\": true,\n                \"createdAt\": \"2026-04-20T11:00:00.000Z\",\n                \"updatedAt\": \"2026-04-20T11:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend use\n\n          Use `_id` from this response as the `category` query value when calling the product list endpoint:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111\n          ```\n      - info:\n          name: 02 Create Category Admin\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/categories'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"Phones\",\n                \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/phones.jpg\",\n                \"order\": 1\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Category\n\n          ## Endpoint\n          `POST /api/categories`\n\n          ## Description\n\n          Creates a new product category from the admin dashboard. The backend automatically generates the category `slug` from the `name`.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Header:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ## Request body\n\n          ```json\n          {\n            \"name\": \"Phones\",\n            \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/phones.jpg\",\n            \"order\": 1\n          }\n          ```\n\n          ## Field descriptions\n\n          `name`\n          - Type: string\n          - Required: yes\n          - Must be unique.\n          - Used to generate the category slug.\n\n          `image`\n          - Type: string\n          - Required: no\n          - Use a Cloudinary URL or another hosted image URL.\n\n          `order`\n          - Type: number\n          - Required: no\n          - Default: `0`.\n          - Lower numbers appear first in `GET /api/categories`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Category created successfully\",\n            \"category\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Phones\",\n              \"slug\": \"phones\",\n              \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/phones.jpg\",\n              \"order\": 1,\n              \"isActive\": true,\n              \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n              \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Missing category name:\n\n          ```json\n          {\n            \"message\": \"Category name is required\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n\n          Duplicate category name:\n\n          ```json\n          {\n            \"message\": \"Category validation failed or duplicate key error\"\n          }\n          ```\n      - info:\n          name: 03 Update Category Admin\n          type: http\n          seq: 3\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/categories/662b7f8f4f9c2e2d7c111111'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"Mobile Phones\",\n                \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/mobile-phones.jpg\",\n                \"order\": 1,\n                \"isActive\": true\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Update Category\n\n          ## Endpoint\n          `PUT /api/categories/:id`\n\n          ## Description\n\n          Updates an existing category from the admin dashboard. Send only the fields you want to change. If `name` is changed, the backend regenerates the `slug`.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Header:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - The category `_id`.\n\n          ## Request body\n\n          All fields are optional, but at least one field should be sent.\n\n          ```json\n          {\n            \"name\": \"Mobile Phones\",\n            \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/mobile-phones.jpg\",\n            \"order\": 1,\n            \"isActive\": true\n          }\n          ```\n\n          ## Field descriptions\n\n          `name`\n          - Type: string\n          - Optional.\n          - Changes the display name and regenerates the slug.\n\n          `image`\n          - Type: string\n          - Optional.\n          - Replaces the category image URL.\n\n          `order`\n          - Type: number\n          - Optional.\n          - Controls the position in `GET /api/categories`.\n\n          `isActive`\n          - Type: boolean\n          - Optional.\n          - `false` hides the category from public category listing.\n          - `true` restores the category to public listing.\n\n          ## Sorting effect\n\n          After changing `order`, the updated category position changes in the public category list. The backend sorts by `order` ascending, then `createdAt` ascending.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Category updated successfully\",\n            \"category\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Mobile Phones\",\n              \"slug\": \"mobile-phones\",\n              \"image\": \"https://res.cloudinary.com/demo/image/upload/categories/mobile-phones.jpg\",\n              \"order\": 1,\n              \"isActive\": true,\n              \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n              \"updatedAt\": \"2026-04-21T08:30:00.000Z\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Category not found:\n\n          ```json\n          {\n            \"message\": \"Category not found\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n      - info:\n          name: 04 Disable Category Admin\n          type: http\n          seq: 4\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/api/categories/662b7f8f4f9c2e2d7c111111'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Disable Category\n\n          ## Endpoint\n          `DELETE /api/categories/:id`\n\n          ## Description\n\n          Disables a category from the admin dashboard. This is a soft delete. The category remains in the database, but its `isActive` value is changed to `false`.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Header:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\"\n          }\n          ```\n\n          ## URL parameter\n\n          `id`\n          - Type: string\n          - Required: yes\n          - The category `_id`.\n\n          ## Behavior\n\n          - Sets `isActive` to `false`.\n          - Hides the category from `GET /api/categories`.\n          - Does not delete products in that category.\n          - Does not remove category references from existing products.\n\n          ## Restoring a disabled category\n\n          To restore a category, call the update endpoint and send:\n\n          ```json\n          {\n            \"isActive\": true\n          }\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"success\": true,\n            \"message\": \"Category disabled successfully\"\n          }\n          ```\n\n          ## Common errors\n\n          Category not found:\n\n          ```json\n          {\n            \"message\": \"Category not found\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n      - info:\n          name: 05 Products By Category And Sorting\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_asc&page=1'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Products By Category And Sorting\n\n          ## Endpoint\n          `GET /api/products`\n\n          ## Description\n\n          Returns active products, with optional category filtering and product sorting. Use this for category pages, product grids, search results, price filters, and shop sorting controls.\n\n          ## Authentication\n\n          Not required.\n\n          ## Important category rule\n\n          The `category` query parameter expects the category `_id`, not the category slug.\n\n          Correct:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111\n          ```\n\n          Not supported by the current backend:\n\n          ```txt\n          GET /api/products?category=phones\n          ```\n\n          ## Query parameters\n\n          `category`\n          - Type: string\n          - Required: no\n          - Filter products by category `_id`.\n\n          `sort`\n          - Type: string\n          - Required: no\n          - Allowed values: `price_asc`, `price_desc`, `best_selling`.\n\n          `page`\n          - Type: number\n          - Required: no\n          - Default: `1`.\n          - The backend uses a fixed limit of `10` products per page.\n\n          `featured`\n          - Type: string\n          - Required: no\n          - Use `featured=true` to return only featured products.\n\n          `keyword`\n          - Type: string\n          - Required: no\n          - Searches product `name` and `description`.\n\n          `min`\n          - Type: number\n          - Required: no\n          - Minimum product price.\n\n          `max`\n          - Type: number\n          - Required: no\n          - Maximum product price.\n\n          ## Sort behavior\n\n          No `sort` query:\n          - Featured products first.\n          - Newest products next.\n          - Backend sort: `{ isFeatured: -1, createdAt: -1 }`.\n\n          `sort=price_asc`:\n          - Cheapest products first.\n          - Backend sort: `{ price: 1 }`.\n\n          `sort=price_desc`:\n          - Most expensive products first.\n          - Backend sort: `{ price: -1 }`.\n\n          `sort=best_selling`:\n          - Highest `sold` count first.\n          - Backend sort: `{ sold: -1 }`.\n\n          ## Example requests\n\n          Get all active products:\n\n          ```txt\n          GET /api/products\n          ```\n\n          Get products under one category:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111\n          ```\n\n          Get category products, cheapest first:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_asc\n          ```\n\n          Get category products, most expensive first:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_desc\n          ```\n\n          Get best sellers in one category:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=best_selling\n          ```\n\n          Get category products with price range:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&min=50000&max=250000\n          ```\n\n          Search within a category:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone\n          ```\n\n          Combine category, search, price, sorting, and pagination:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone&min=50000&max=900000&sort=price_asc&page=2\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"iPhone 14 Pro\",\n                \"slug\": \"iphone-14-pro\",\n                \"description\": \"Apple smartphone with premium camera features.\",\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                },\n                \"brand\": \"Apple\",\n                \"price\": 950000,\n                \"comparePrice\": 1000000,\n                \"discountPercentage\": 5,\n                \"weight\": 1,\n                \"stock\": 10,\n                \"sold\": 25,\n                \"images\": [\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                    \"public_id\": \"cheepcart/products/iphone\"\n                  }\n                ],\n                \"averageRating\": 4.8,\n                \"totalReviews\": 12,\n                \"isActive\": true,\n                \"isFeatured\": true,\n                \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n                \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend flow for category pages\n\n          1. Call `GET /api/categories`.\n          2. Display category `name` and `image`.\n          3. Store category `_id` when a user selects a category.\n          4. Call `GET /api/products?category=<categoryId>`.\n          5. Add `sort`, `min`, `max`, `keyword`, or `page` as the user changes filters.\n\n          ## Notes\n\n          - Product category filtering only returns products where `isActive` is `true`.\n          - The backend currently does not accept a custom `limit` query. It always uses `10`.\n          - Price and best-selling sorts do not currently add a secondary tie-break sort.\n  - info:\n      name: Products\n      type: folder\n      seq: 3\n    request:\n      auth: inherit\n    docs:\n      content: |-\n        # Products API\n\n        ## What this folder is for\n\n        This folder documents all normal product endpoints implemented in the backend.\n\n        Products are used for:\n        - Storefront product grids.\n        - Product detail pages.\n        - Category pages.\n        - Search results.\n        - Price filtering.\n        - Sorting controls.\n        - Admin product management.\n\n        ## Base path\n\n        All product endpoints are mounted under:\n\n        ```txt\n        /api/products\n        ```\n\n        ## Public endpoints\n\n        These do not require authentication:\n\n        - `GET /api/products`\n        - `GET /api/products/:slug`\n\n        Public endpoints only return products where:\n\n        ```txt\n        isActive = true\n        ```\n\n        ## Admin endpoints\n\n        These require an admin token:\n\n        - `POST /api/products`\n        - `PUT /api/products/:id`\n        - `DELETE /api/products/:id`\n\n        Header:\n\n        ```json\n        {\n          \"Authorization\": \"Bearer <ADMIN_TOKEN>\"\n        }\n        ```\n\n        ## Product data model\n\n        Main product fields:\n\n        `name`\n        - Type: string\n        - Required: yes\n        - Used to generate the product `slug`.\n\n        `slug`\n        - Type: string\n        - Generated automatically from `name`.\n        - Used by the public single product endpoint.\n\n        `description`\n        - Type: string\n        - Required: yes.\n\n        `category`\n        - Type: string\n        - Required: yes.\n        - Must be a valid category `_id` when creating a product.\n\n        `brand`\n        - Type: string\n        - Optional.\n\n        `price`\n        - Type: number\n        - Required: yes.\n\n        `comparePrice`\n        - Type: number\n        - Optional.\n        - If greater than `price`, the backend calculates `discountPercentage`.\n\n        `discountPercentage`\n        - Type: number\n        - Default: `0`.\n        - Calculated during save when `comparePrice` is greater than `price`.\n\n        `weight`\n        - Type: number\n        - Required: yes.\n        - Used during shipping calculations.\n\n        `stock`\n        - Type: number\n        - Required: yes.\n\n        `sold`\n        - Type: number\n        - Default: `0`.\n        - Used for `sort=best_selling`.\n\n        `images`\n        - Type: array.\n        - Each image should contain `secure_url` and `public_id`.\n\n        `averageRating`\n        - Type: number\n        - Default: `0`.\n\n        `totalReviews`\n        - Type: number\n        - Default: `0`.\n\n        `isActive`\n        - Type: boolean\n        - Default: `true`.\n        - Public product APIs only return active products.\n\n        `isFeatured`\n        - Type: boolean\n        - Default: `false`.\n        - Used by default product sorting and `featured=true` filtering.\n\n        ## Product list sorting\n\n        `GET /api/products` supports:\n\n        - No `sort`: featured products first, then newest products.\n        - `sort=price_asc`: cheapest first.\n        - `sort=price_desc`: most expensive first.\n        - `sort=best_selling`: highest `sold` count first.\n\n        ## Product list filters\n\n        `GET /api/products` supports:\n\n        - `category=<categoryId>`\n        - `featured=true`\n        - `keyword=<search text>`\n        - `min=<minimum price>`\n        - `max=<maximum price>`\n        - `page=<page number>`\n\n        The backend currently uses a fixed limit of `10` products per page.\n\n        ## Category rule\n\n        Product filtering uses category `_id`, not category slug.\n\n        Correct:\n\n        ```txt\n        GET /api/products?category=662b7f8f4f9c2e2d7c111111\n        ```\n\n        Not supported by the current backend:\n\n        ```txt\n        GET /api/products?category=phones\n        ```\n\n        ## Delete behavior\n\n        `DELETE /api/products/:id` permanently deletes the product from the database.\n        It is not a soft delete in the current implementation.\n      type: text/markdown\n    items:\n      - info:\n          name: 01 Get Products\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products?page=1&sort=price_asc&category=662b7f8f4f9c2e2d7c111111'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Products\n\n          ## Endpoint\n          `GET /api/products`\n\n          ## Description\n\n          Returns active products for the storefront. Use this endpoint for the main shop page, category pages, product search, featured sections, price filters, sorting controls, and paginated product grids.\n\n          ## Authentication\n\n          Not required.\n\n          ## Response shape\n\n          This endpoint returns:\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": []\n          }\n          ```\n\n          There is no `success` field in the current implementation.\n\n          ## Default behavior\n\n          If no query parameters are sent:\n\n          ```txt\n          GET /api/products\n          ```\n\n          The backend:\n          - Returns only products where `isActive` is `true`.\n          - Uses page `1`.\n          - Uses fixed limit `10`.\n          - Sorts by featured first, then newest first.\n\n          Default backend sort:\n\n          ```js\n          { isFeatured: -1, createdAt: -1 }\n          ```\n\n          ## Query parameters\n\n          `page`\n          - Type: number\n          - Required: no\n          - Default: `1`.\n          - The backend uses a fixed limit of `10` products per page.\n\n          `category`\n          - Type: string\n          - Required: no\n          - Must be a category `_id`.\n          - Filters products that belong to that category.\n\n          `featured`\n          - Type: string\n          - Required: no\n          - Send `featured=true` to return only featured products.\n          - Other values are ignored by the current backend.\n\n          `keyword`\n          - Type: string\n          - Required: no\n          - Searches product `name` and `description`.\n          - Search is case-insensitive.\n\n          `min`\n          - Type: number\n          - Required: no\n          - Minimum price filter.\n\n          `max`\n          - Type: number\n          - Required: no\n          - Maximum price filter.\n\n          `sort`\n          - Type: string\n          - Required: no\n          - Allowed values: `price_asc`, `price_desc`, `best_selling`.\n\n          ## Sorting options\n\n          No `sort` query:\n          - Featured products first.\n          - Newest products after featured products.\n\n          ```txt\n          GET /api/products\n          ```\n\n          `sort=price_asc`:\n          - Cheapest products first.\n\n          ```txt\n          GET /api/products?sort=price_asc\n          ```\n\n          `sort=price_desc`:\n          - Most expensive products first.\n\n          ```txt\n          GET /api/products?sort=price_desc\n          ```\n\n          `sort=best_selling`:\n          - Highest `sold` count first.\n\n          ```txt\n          GET /api/products?sort=best_selling\n          ```\n\n          ## Filtering examples\n\n          Products in one category:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111\n          ```\n\n          Featured products only:\n\n          ```txt\n          GET /api/products?featured=true\n          ```\n\n          Search by keyword:\n\n          ```txt\n          GET /api/products?keyword=iphone\n          ```\n\n          Price range:\n\n          ```txt\n          GET /api/products?min=50000&max=250000\n          ```\n\n          Page 2:\n\n          ```txt\n          GET /api/products?page=2\n          ```\n\n          Category plus sorting:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&sort=price_asc\n          ```\n\n          Category plus search:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone\n          ```\n\n          Full combined example:\n\n          ```txt\n          GET /api/products?category=662b7f8f4f9c2e2d7c111111&keyword=iphone&min=50000&max=900000&sort=price_asc&page=2\n          ```\n\n          ## Sample success response\n\n          ```json\n          {\n            \"total\": 1,\n            \"page\": 1,\n            \"pages\": 1,\n            \"products\": [\n              {\n                \"_id\": \"662b80d44f9c2e2d7c333333\",\n                \"name\": \"iPhone 14 Pro\",\n                \"slug\": \"iphone-14-pro\",\n                \"description\": \"Apple smartphone with premium camera features.\",\n                \"category\": {\n                  \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n                  \"name\": \"Phones\",\n                  \"slug\": \"phones\"\n                },\n                \"brand\": \"Apple\",\n                \"price\": 950000,\n                \"comparePrice\": 1000000,\n                \"discountPercentage\": 5,\n                \"weight\": 1,\n                \"stock\": 10,\n                \"sold\": 25,\n                \"images\": [\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                    \"public_id\": \"cheepcart/products/iphone\"\n                  }\n                ],\n                \"averageRating\": 4.8,\n                \"totalReviews\": 12,\n                \"isActive\": true,\n                \"isFeatured\": true,\n                \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n                \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n              }\n            ]\n          }\n          ```\n\n          ## Frontend notes\n\n          - Use `total`, `page`, and `pages` for pagination UI.\n          - Product `category` is populated with `name` and `slug`.\n          - Use `product.slug` when opening the product detail page.\n          - Use `product._id` when adding to cart, reviews, order items, or admin updates.\n          - Public list results exclude inactive products.\n      - info:\n          name: 02 Get Single Product By Slug\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/products/iphone-14-pro'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Get Single Product By Slug\n\n          ## Endpoint\n          `GET /api/products/:slug`\n\n          ## Description\n\n          Returns one active product by its slug. Use this endpoint for the product detail page.\n\n          ## Authentication\n\n          Not required.\n\n          ## URL parameter\n\n          `slug`\n          - Type: string\n          - Required: yes\n          - The product slug generated from the product name.\n          - Example: `iphone-14-pro`.\n\n          ## Important behavior\n\n          The backend searches by:\n\n          ```js\n          {\n            slug: req.params.slug,\n            isActive: true\n          }\n          ```\n\n          This means inactive products will return `Product not found` even if the slug exists in the database.\n\n          ## Example request\n\n          ```txt\n          GET /api/products/iphone-14-pro\n          ```\n\n          ## Sample success response\n\n          The current implementation returns the product object directly:\n\n          ```json\n          {\n            \"_id\": \"662b80d44f9c2e2d7c333333\",\n            \"name\": \"iPhone 14 Pro\",\n            \"slug\": \"iphone-14-pro\",\n            \"description\": \"Apple smartphone with premium camera features.\",\n            \"category\": {\n              \"_id\": \"662b7f8f4f9c2e2d7c111111\",\n              \"name\": \"Phones\",\n              \"slug\": \"phones\"\n            },\n            \"brand\": \"Apple\",\n            \"price\": 950000,\n            \"comparePrice\": 1000000,\n            \"discountPercentage\": 5,\n            \"weight\": 1,\n            \"stock\": 10,\n            \"sold\": 25,\n            \"images\": [\n              {\n                \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                \"public_id\": \"cheepcart/products/iphone\"\n              }\n            ],\n            \"averageRating\": 4.8,\n            \"totalReviews\": 12,\n            \"isActive\": true,\n            \"isFeatured\": true,\n            \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n            \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n          }\n          ```\n\n          ## Error response\n\n          Product not found or inactive:\n\n          ```json\n          {\n            \"message\": \"Product not found\"\n          }\n          ```\n\n          ## Frontend notes\n\n          - Use this endpoint after a user clicks a product card.\n          - Route the frontend page with the product `slug`.\n          - The product `category` is populated with `name` and `slug`.\n          - Use `_id` from the response for cart actions, review submission, and admin edits.\n      - info:\n          name: 03 Create Product Admin\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/products'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Content-Type\n              value: application/json\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"iPhone 14 Pro\",\n                \"description\": \"Apple smartphone with premium camera features.\",\n                \"category\": \"662b7f8f4f9c2e2d7c111111\",\n                \"brand\": \"Apple\",\n                \"price\": 950000,\n                \"comparePrice\": 1000000,\n                \"weight\": 1,\n                \"stock\": 10,\n                \"images\": [\n                  {\n                    \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                    \"public_id\": \"cheepcart/products/iphone\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          # Create Product\n\n          ## Endpoint\n          `POST /api/products`\n\n          ## Description\n\n          Creates a new normal store product from the admin dashboard. The product must belong to an existing category. The backend automatically generates a unique `slug` from the product `name`.\n\n          ## Authentication\n\n          Required. Admin only.\n\n          Headers:\n\n          ```json\n          {\n            \"Authorization\": \"Bearer <ADMIN_TOKEN>\",\n            \"Content-Type\": \"application/json\"\n          }\n          ```\n\n          ## Request body\n\n          ```json\n          {\n            \"name\": \"iPhone 14 Pro\",\n            \"description\": \"Apple smartphone with premium camera features.\",\n            \"category\": \"662b7f8f4f9c2e2d7c111111\",\n            \"brand\": \"Apple\",\n            \"price\": 950000,\n            \"comparePrice\": 1000000,\n            \"weight\": 1,\n            \"stock\": 10,\n            \"images\": [\n              {\n                \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                \"public_id\": \"cheepcart/products/iphone\"\n              }\n            ]\n          }\n          ```\n\n          ## Field descriptions\n\n          `name`\n          - Type: string\n          - Required: yes\n          - Used to generate the product slug.\n\n          `description`\n          - Type: string\n          - Required: yes.\n\n          `category`\n          - Type: string\n          - Required: yes.\n          - Must be an existing category `_id`.\n          - If the category does not exist, the backend returns `Category not found`.\n\n          `brand`\n          - Type: string\n          - Required: no.\n\n          `price`\n          - Type: number\n          - Required: yes.\n\n          `comparePrice`\n          - Type: number\n          - Required: no.\n          - If greater than `price`, the backend calculates `discountPercentage`.\n\n          `weight`\n          - Type: number\n          - Required: yes.\n          - Used for shipping calculations.\n\n          `stock`\n          - Type: number\n          - Required: yes.\n\n          `images`\n          - Type: array\n          - Required: no by controller, but product cards need images.\n          - Use image objects from the upload API.\n\n          Each image object:\n\n          ```json\n          {\n            \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n            \"public_id\": \"cheepcart/products/iphone\"\n          }\n          ```\n\n          ## Automatically generated fields\n\n          `slug`\n          - Generated from `name`.\n          - If another product already uses the same slug, the backend adds a number.\n          - Example: `iphone-14-pro`, then `iphone-14-pro-1`.\n\n          `discountPercentage`\n          - Calculated when `comparePrice` is greater than `price`.\n\n          `sold`\n          - Defaults to `0`.\n\n          `averageRating`\n          - Defaults to `0`.\n\n          `totalReviews`\n          - Defaults to `0`.\n\n          `isActive`\n          - Defaults to `true`.\n\n          `isFeatured`\n          - Defaults to `false`.\n\n          ## Sample success response\n\n          ```json\n          {\n            \"message\": \"Product created successfully\",\n            \"product\": {\n              \"_id\": \"662b80d44f9c2e2d7c333333\",\n              \"name\": \"iPhone 14 Pro\",\n              \"slug\": \"iphone-14-pro\",\n              \"description\": \"Apple smartphone with premium camera features.\",\n              \"category\": \"662b7f8f4f9c2e2d7c111111\",\n              \"brand\": \"Apple\",\n              \"price\": 950000,\n              \"comparePrice\": 1000000,\n              \"discountPercentage\": 5,\n              \"weight\": 1,\n              \"stock\": 10,\n              \"sold\": 0,\n              \"images\": [\n                {\n                  \"secure_url\": \"https://res.cloudinary.com/demo/image/upload/products/iphone.jpg\",\n                  \"public_id\": \"cheepcart/products/iphone\"\n                }\n              ],\n              \"averageRating\": 0,\n              \"totalReviews\": 0,\n              \"isActive\": true,\n              \"isFeatured\": false,\n              \"createdAt\": \"2026-04-20T10:00:00.000Z\",\n              \"updatedAt\": \"2026-04-20T10:00:00.000Z\"\n            }\n          }\n          ```\n\n          ## Common errors\n\n          Category does not exist:\n\n          ```json\n          {\n            \"message\": \"Category not found\"\n          }\n          ```\n\n          Missing required fields:\n\n          ```json\n          {\n            \"message\": \"Product validation failed\"\n          }\n          ```\n\n          Not logged in or not admin:\n\n          ```json\n          {\n            \"message\": \"Not authorized\"\n          }\n          ```\n\n          ## Admin flow\n\n          1. Upload product images with the upload API.\n          2. Save returned `secure_url` and `public_id`.\n          3. Get categories with `GET /api/categories`.\n          4. Use the selected category `_id`.\n          5. Call `POST /api/products`.\n      - info:\n          name: 04 Update Product Admin\n          type: http\n          seq: 4\n        http:\n          method: PUT\n          url: '{{baseUrl}}/api/products/662b80d44f9c2e2d7c333333'\n          headers:\n            - name: Authorization\n              value: Bearer {{token}}\n            - name: Conten
