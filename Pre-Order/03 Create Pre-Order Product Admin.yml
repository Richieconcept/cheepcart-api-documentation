      value: Bearer {{token}}
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: Luxury Travel Bag
      - name: description
        type: text
        value: Available for China pre-order.
      - name: price
        type: text
        value: "45000"
      - name: status
        type: text
        value: available
      - name: displayOrder
        type: text
        value: "1"
      - name: image
        type: file
