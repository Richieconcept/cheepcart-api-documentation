  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # Create Pre-Order Product

  ## Endpoint
  `POST /api/pre-order-products`

  ## Who uses this?
  Admin dashboard.

  ## Authentication
  Required. Admin only.

  ## What it does
  Creates a product that will appear on the frontend pre-order page and uploads the image to Cloudinary in the same request.

  This does not create a normal store product. It does not require category, stock, weight, or checkout data.

  ## Headers

  ```json
  {
    "Authorization": "Bearer <ADMIN_TOKEN>",
    "Content-Type": "multipart/form-data"
  }
  ```

  ## Body type
  `multipart/form-data`

  ## Form data

  ```txt
  name: Luxury Travel Bag
  description: Available for China pre-order.
  price: 45000
  status: available
  displayOrder: 1
  image: [file]
  ```

  Important: `image` is a file field, not a URL string. The backend uploads this file to Cloudinary, then saves the returned `secure_url` and `public_id`.

  ## Field descriptions

  `name`
  - Type: string
  - Required: yes
  - Product name shown on frontend.

  `description`
  - Type: string
  - Required: no
  - Extra information about the pre-order product.

  `price`
  - Type: number
  - Required: no
  - Use only when admin knows the price.
  - If price is not known, do not send it.

  `image`
  - Type: file
  - Required: yes
  - Send one image file using the exact key `image`.
  - Allowed file type: image.
  - Max file size: 5MB.
  - Backend stores the image in Cloudinary folder `cheepcart/pre-order-products`.

  `status`
  - Type: string
  - Required: no
  - Default: `available`
  - Options: `available`, `coming_soon`, `closed`

  `displayOrder`
  - Type: number
  - Required: no
  - Lower numbers appear first.

  ## Sample success response

  ```json
  {
    "message": "Pre-order product created successfully",
    "product": {
      "_id": "662b7f8f4f9c2e2d7c111111",
      "name": "Luxury Travel Bag",
      "slug": "luxury-travel-bag",
      "description": "Available for China pre-order.",
      "price": 45000,
      "image": {
        "secure_url": "https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/bag.jpg",
        "public_id": "cheepcart/pre-order-products/bag"
      },
      "status": "available",
      "displayOrder": 1,
      "isActive": true
    }
  }
  ```

  ## Common errors

  Missing name:

  ```json
  {
    "message": "Product name is required"
  }
  ```

  Missing image:

  ```json
  {
    "message": "Product image with secure_url and public_id is required"
  }
  ```

  ## Frontend example

  ```js
  const formData = new FormData();
  formData.append("name", name);
  formData.append("description", description);
  formData.append("price", price);
  formData.append("status", status);
  formData.append("displayOrder", displayOrder);
  formData.append("image", imageFile);

  await fetch(`${baseUrl}/api/pre-order-products`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${adminToken}`
    },
    body: formData
  });
  ```

  Do not manually set `Content-Type` in frontend when using `FormData`; the browser will add the multipart boundary automatically.
