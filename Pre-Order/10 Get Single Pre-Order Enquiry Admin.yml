docs: |-
  # Get Single Pre-Order Enquiry

  ## Endpoint
  `GET /api/pre-order-enquiries/:id`

  ## Who uses this?
  Admin dashboard.

  ## Authentication
  Required. Admin only.

  ## What it does
  Returns one enquiry by `_id`.

  Use this for an enquiry detail page or admin modal.

  ## URL parameter

  `id`
  - Type: string
  - Required: yes
  - This is the enquiry `_id`.

  ## Sample success response

  ```json
  {
    "_id": "662b83004f9c2e2d7c222222",
    "product": {
      "_id": "662b7f8f4f9c2e2d7c111111",
      "name": "Luxury Travel Bag",
      "slug": "luxury-travel-bag",
      "price": 45000,
      "status": "available",
      "isActive": true
    },
    "productSnapshot": {
      "name": "Luxury Travel Bag",
      "slug": "luxury-travel-bag",
      "price": 45000
    },
    "fullName": "Jane Doe",
    "phone": "08012345678",
    "email": "jane@example.com",
    "quantity": 2,
    "location": "Lagos, Nigeria",
    "message": "Please contact me about delivery time.",
    "status": "pending",
    "createdAt": "2026-04-25T12:20:00.000Z",
    "updatedAt": "2026-04-25T12:20:00.000Z"
  }
  ```

  ## Error response

  ```json
  {
    "message": "Pre-order enquiry not found"
  }
  ```
