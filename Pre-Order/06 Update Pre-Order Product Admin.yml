docs: |-
  # Update Pre-Order Product

  ## Endpoint
  `PUT /api/pre-order-products/:id`

  ## Who uses this?
  Admin dashboard.

  ## Authentication
  Required. Admin only.

  ## What it does
  Updates an existing pre-order product.

  You only need to send the fields you want to change.
  If you send new `images` files, the backend uploads them to Cloudinary and replaces the saved product images.

  ## URL parameter

  `id`
  - Type: string
  - Required: yes
  - This is the product `_id`.

  ## Body type
  `multipart/form-data`

  ## Example form data

  ```txt
  name: Luxury Travel Bag Updated
  price: 48000
  status: available
  displayOrder: 2
  ```

  To replace the product images, also send 1 to 4 files:

  ```txt
  images: [file]
  images: [file]
  images: [file]
  images: [file]
  ```

  Important: `images` is optional during update. If the admin does not choose new images, do not send the `images` field.

  The old single-file key `image` still works, but `images` is preferred for new frontend work.

  ## Other fields you can update

  ```txt
  description: New description
  isActive: true
  ```

  ## Image replacement behavior

  - Send 1 to 4 files using the exact key `images`.
  - Allowed file type: image.
  - Max file size: 5MB per image.
  - Backend uploads the new files to Cloudinary.
  - Backend saves the returned `secure_url` and `public_id` values in `images`.
  - Backend keeps `image` as the first image for thumbnail compatibility.
  - Backend deletes the old Cloudinary images using the old `public_id` values.

  ## Sample success response

  ```json
  {
    "message": "Pre-order product updated successfully",
    "product": {
      "_id": "662b7f8f4f9c2e2d7c111111",
      "name": "Luxury Travel Bag Updated",
      "slug": "luxury-travel-bag-updated",
      "price": 48000,
      "image": {
        "secure_url": "https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/new-bag-front.jpg",
        "public_id": "cheepcart/pre-order-products/new-bag-front"
      },
      "images": [
        {
          "secure_url": "https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/new-bag-front.jpg",
          "public_id": "cheepcart/pre-order-products/new-bag-front"
        },
        {
          "secure_url": "https://res.cloudinary.com/demo/image/upload/v1234567890/cheepcart/pre-order-products/new-bag-side.jpg",
          "public_id": "cheepcart/pre-order-products/new-bag-side"
        }
      ],
      "status": "available",
      "displayOrder": 2,
      "isActive": true
    }
  }
  ```

  ## Error response

  ```json
  {
    "message": "Pre-order product not found"
  }
  ```

  ## Frontend example

  ```js
  const formData = new FormData();
  formData.append("name", name);
  formData.append("price", price);
  formData.append("status", status);
  formData.append("displayOrder", displayOrder);

  if (imageFiles.length > 0) {
    imageFiles.slice(0, 4).forEach((imageFile) => {
      formData.append("images", imageFile);
    });
  }

  await fetch(`${baseUrl}/api/pre-order-products/${productId}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${adminToken}`
    },
    body: formData
  });
  ```

  Do not manually set `Content-Type` in frontend when using `FormData`; the browser will add the multipart boundary automatically.
