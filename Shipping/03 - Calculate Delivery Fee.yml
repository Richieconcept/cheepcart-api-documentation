info:
  name: 03 - Calculate Delivery Fee
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/shipping/calculate-fee"
  headers:
    - name: Authorization
      value: Bearer {{token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "recipientCity": "Abuja",
        "recipientTownID": 3895
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
