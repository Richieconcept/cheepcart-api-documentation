info:
  name: GET ALL SHIPMENTS (ADMIN)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/shipments/get-all-shipments"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Get All Shipments

  ## Method

  GET

  ## URL

  /api/shipment/get-all-shipments

  ## Auth

  Bearer Token (Admin only)

  ## Description

  Fetch all shipments in the system for monitoring.

  ## When to Call (Frontend)

  * Admin dashboard page
  * Shipment management page

  ## Example Request

  GET /api/shipment/get-all-shipments

  ## Response

  {
  "success": true,
  "total": 2,
  "shipments": [
  {
  "orderNumber": "CHP-20260416-0001",
  "trackingNumber": "RSASB1148381",
  "shipmentStatus": "created",
  "deliveryStatus": "pending",
  "shipmentRetryCount": 1,
  "shipmentError": null
  }
  ]
  }

  ## Notes for Frontend

  * Show in table format
  * Add color badges:
    pending = yellow
    in_transit = blue
    delivered = green
    failed = red
  * Show retry button if shipmentRetryCount > 0
