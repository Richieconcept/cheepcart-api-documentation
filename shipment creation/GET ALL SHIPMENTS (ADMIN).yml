docs: |-
  # Get All Shipments Admin

  `GET /api/shipments/get-all-shipments`

  ## Description

  Returns all orders that already have a shipment tracking number.

  Use this endpoint for the admin shipment monitor, shipment table, or dashboard widgets.

  ## Authentication

  Bearer token required.

  Admin only.

  ## Query Parameters

  No query parameters are currently supported.

  ## What The API Returns

  Each shipment item is an order summary with:

  - `_id`
  - `orderNumber`
  - `trackingNumber`
  - `shipmentStatus`
  - `deliveryStatus`
  - `shipmentRetryCount`
  - `shipmentError`
  - `createdAt`

  Results are sorted newest first.

  Important frontend mapping:

  - Use `_id` as `orderId` for `POST /api/shipments/retry/:orderId`.
  - Use `trackingNumber` for `GET /api/shipments/track/:trackingNumber`.

  ## Example Request

  ```http
  GET /api/shipments/get-all-shipments
  Authorization: Bearer <admin-token>
  ```

  ## Success Response

  ```json
  {
    "success": true,
    "total": 2,
    "shipments": [
      {
        "_id": "69e355eb827eaadacc96e7ca",
        "orderNumber": "CHP-20260418-0001",
        "trackingNumber": "RSASB1186443",
        "shipmentStatus": "created",
        "deliveryStatus": "in_transit",
        "shipmentRetryCount": 0,
        "shipmentError": null,
        "createdAt": "2026-04-18T10:00:33.756Z"
      },
      {
        "_id": "69e355eb827eaadacc96e7cb",
        "orderNumber": "CHP-20260416-0001",
        "trackingNumber": "RSASB1148381",
        "shipmentStatus": "created",
        "deliveryStatus": "pending",
        "shipmentRetryCount": 1,
        "shipmentError": "Tracking not available yet",
        "createdAt": "2026-04-16T09:30:00.000Z"
      }
    ]
  }
  ```

  ## Error Response

  ```json
  {
    "success": false,
    "message": "Failed to fetch shipments"
  }
  ```

  ## Frontend Notes

  - Render this as an admin table.
  - Use `_id` when retrying shipment tracking.
  - Use `trackingNumber` when opening the track shipment endpoint.
  - Use `shipmentStatus` for provider/shipment lifecycle.
  - Use `deliveryStatus` for customer-facing delivery progress.
  - Show a retry action when `shipmentRetryCount > 0` or `shipmentError` is not empty.
  - Suggested badge colors: pending yellow, picked teal, in_transit blue, delivered green, issue red, delayed orange, unknown gray.
