  # 🔁 RETRY SHIPMENT TRACKING

  ## Endpoint
  POST /api/shipments/retry/:orderId

  ---------------------------------------------

  ## Description

  Forces immediate tracking update for a shipment.

  ---------------------------------------------

  ## WHEN TO USE

  ✅ Admin clicks retry  
  ✅ shipmentRetryCount > 0  
  ✅ shipmentError exists  

  ---------------------------------------------

  ## WHAT IT DOES

  → Calls Redstar API  
  → Updates deliveryStatus  
  → Updates orderStatus  
  → Clears error  
  → Resets retry count  

  ---------------------------------------------

  ## RESPONSE

  {
    "success": true,
    "message": "Shipment retried successfully",
    "order": { ... }
  }

  ---------------------------------------------

  ## ⚠️ REDSTAR DELAY CASE

  {
    "success": true,
    "message": "Tracking not available yet",
    "shipment": {
      "status": "pending"
    }
  }