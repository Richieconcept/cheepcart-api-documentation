docs: |-
  # Retry Shipment Tracking

  `POST /api/shipments/retry/:orderId`

  ## Description

  Forces an immediate Redstar tracking refresh for one order.

  Use this from the admin shipment monitor when a shipment has a tracking number but the automatic sync failed, retry count increased, or `shipmentError` is present.

  ## Authentication

  Bearer token required.

  Admin only.

  ## Path Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `orderId` | string | Yes | MongoDB `_id` of the order whose shipment tracking should be retried. |

  ## What It Does Internally

  - Finds the order by `orderId`.
  - Requires the order to already have a `trackingNumber`.
  - Calls Redstar tracking API.
  - Updates `deliveryStatus`, `orderStatus`, and `lastTrackedAt`.
  - Resets `shipmentRetryCount` to `0`.
  - Clears `shipmentError`.
  - If delivered, sets `orderStatus` and `shipmentStatus` to `delivered`.

  ## Example Request

  ```http
  POST /api/shipments/retry/69e355eb827eaadacc96e7ca
  Authorization: Bearer <admin-token>
  ```

  ## Success Response

  ```json
  {
    "success": true,
    "message": "Shipment retried successfully",
    "order": {
      "_id": "69e355eb827eaadacc96e7ca",
      "orderNumber": "CHP-20260418-0001",
      "shipmentStatus": "created",
      "deliveryStatus": "in_transit",
      "orderStatus": "shipped",
      "trackingNumber": "RSASB1186443",
      "shipmentRetryCount": 0,
      "shipmentError": null,
      "lastTrackedAt": "2026-05-05T12:00:00.000Z"
    }
  }
  ```

  ## Tracking Not Available Yet

  ```json
  {
    "success": true,
    "message": "Tracking not available yet. Try again later.",
    "shipment": {
      "status": "pending"
    }
  }
  ```

  ## Shipment Not Found

  ```json
  {
    "success": false,
    "message": "Shipment not found"
  }
  ```

  ## Frontend Notes

  - Show this action only to admins.
  - Useful button label: `Retry tracking`.
  - Disable while request is running to avoid duplicate clicks.
  - After success, refresh the shipment table row with the returned `order`.
