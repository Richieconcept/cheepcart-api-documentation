docs: |-
  # Shipment APIs

  This folder contains the shipment creation, tracking, admin monitoring, and retry endpoints.

  ## Base URL

  `/api/shipments`

  ## Endpoints

  | Method | Endpoint | Access | Purpose |
  |--------|----------|--------|---------|
  | POST | `/api/shipments/create/:orderId` | Admin | Create a Redstar shipment for a paid and confirmed order. |
  | GET | `/api/shipments/track/:trackingNumber` | Authenticated user | Track a shipment using the Redstar waybill/tracking number. |
  | GET | `/api/shipments/get-all-shipments` | Admin | List all orders that have tracking numbers. |
  | POST | `/api/shipments/retry/:orderId` | Admin | Force a fresh tracking update for one shipment. |

  ## Shipment Lifecycle

  - Order is created with `shipmentStatus: "not_created"`.
  - After payment succeeds, backend attempts to create Redstar shipment automatically.
  - If shipment creation succeeds, the order receives a `trackingNumber`.
  - Tracking can then be refreshed manually through the track endpoint or automatically by the shipment sync job.
  - When Redstar reports delivery, the order becomes `delivered`.

  ## Important Fields

  | Field | Description |
  |-------|-------------|
  | `shipmentStatus` | Backend shipment lifecycle such as `not_created`, `created`, `in_transit`, `delivered`, or `failed`. |
  | `deliveryStatus` | Customer-facing delivery progress mapped from Redstar status. |
  | `trackingNumber` | Redstar waybill number used for tracking. |
  | `shipmentReference` | Provider/order reference returned by Redstar. |
  | `shipmentRetryCount` | Number of failed automatic tracking attempts. |
  | `shipmentError` | Last tracking or shipment error message, if any. |
  | `lastTrackedAt` | Last time tracking was refreshed. |

  ## Frontend Guidance

  - Customer order pages should use `GET /api/shipments/track/:trackingNumber` when a tracking number exists.
  - Admin shipment monitor should use `GET /api/shipments/get-all-shipments`.
  - Admin retry buttons should call `POST /api/shipments/retry/:orderId`.
  - Admin manual shipment creation should call `POST /api/shipments/create/:orderId`.
