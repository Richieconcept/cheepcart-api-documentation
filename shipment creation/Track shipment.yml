docs: |-
  # Track Shipment By Tracking Number

  `GET /api/shipments/track/:trackingNumber`

  ## Description

  Fetches live Redstar tracking information with the shipment tracking number/waybill number.

  Use this endpoint on the customer order details page after the order already has a `trackingNumber`.

  Do not call this endpoint with the order `_id`. It only accepts the Redstar waybill/tracking number.

  ## Authentication

  Required.

  ```http
  Authorization: Bearer <user-or-admin-token>
  ```

  Any authenticated user can call this endpoint. It is not admin-only, but the user must be logged in because the backend route uses `protect`.

  ## Path Parameters

  | Name | Type | Required | Description |
  |------|------|----------|-------------|
  | `trackingNumber` | string | Yes | Redstar waybill/tracking number saved on the order. Example: `RSASB1186443`. |

  Frontend should use:

  ```js
  GET /api/shipments/track/${encodeURIComponent(order.trackingNumber)}
  ```

  ## What It Does Internally

  - Calls Redstar tracking API through `trackRedstarShipment`.
  - Converts Redstar status code into app status with `mapToAppStatus`.
  - Looks for an order with the same `trackingNumber`.
  - If an order is found, updates `deliveryStatus`, `orderStatus`, and `lastTrackedAt`.
  - If Redstar reports delivery, sets `orderStatus` and `shipmentStatus` to `delivered`.
  - If no matching order is found, it can still return provider tracking data, but no order is updated.

  ## Mapped Status Values

  Frontend should display the `shipment.status` field, not the raw `statusCode`.

  Current backend mapped values are:

  - `pending`
  - `picked`
  - `in_transit`
  - `delivered`
  - `issue`
  - `delayed`
  - `unknown`

  `shipment.orderStatus` is the order status derived from the delivery status. Common values are `processing`, `shipped`, and `delivered`.

  ## Example Request

  ```http
  GET /api/shipments/track/RSASB1186443
  Authorization: Bearer <token>
  ```

  ## Success Response

  HTTP `200`

  ```json
  {
    "success": true,
    "shipment": {
      "trackingNumber": "RSASB1186443",
      "statusCode": 4,
      "status": "in_transit",
      "orderStatus": "shipped",
      "sender": "CheepCart",
      "recipient": "Test User",
      "deliveryType": "Express Delivery",
      "weight": 2,
      "pricing": {
        "deliveryFee": 8500,
        "vat": 637.5,
        "total": 9137.5
      },
      "timeline": [
        {
          "name": "Shipment Created",
          "completed": true,
          "date": "2026-04-18T10:00:33.756Z",
          "location": "Asaba"
        },
        {
          "name": "In Transit",
          "completed": true,
          "date": "2026-04-19T09:15:00.000Z",
          "location": "Lagos"
        }
      ]
    }
  }
  ```

  ## Tracking Not Available Yet

  Redstar may return a provider error when a newly created waybill is not ready for tracking. In that case the API still returns HTTP `200` with a safe pending response:

  ```json
  {
    "success": true,
    "shipment": {
      "trackingNumber": "RSASB1186443",
      "status": "pending",
      "message": "Tracking not available yet. Please try again later."
    }
  }
  ```

  ## Validation Error

  HTTP `400`

  ```json
  {
    "success": false,
    "message": "Tracking number is required"
  }
  ```

  ## Other Error Response

  HTTP `500`

  ```json
  {
    "success": false,
    "message": "Provider error message"
  }
  ```

  ## Frontend Notes

  - Get the `trackingNumber` from the order object or from `GET /api/shipments/get-all-shipments`.
  - Do not use the order `_id` for this endpoint.
  - Use `shipment.status` for badges and progress state.
  - Use `shipment.timeline` to render the tracking steps.
  - If response is pending with a message, show a soft message and let the user retry later.
  - Do not depend on `statusCode`; it is provider-specific.
