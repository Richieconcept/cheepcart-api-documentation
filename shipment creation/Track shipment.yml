  # 📍 TRACK SHIPMENT

  ## Endpoint
  GET /api/shipments/track/:trackingNumber

  ---------------------------------------------

  ## Description

  Fetches real-time shipment tracking from Redstar.

  Also updates order internally.

  ---------------------------------------------

  ## 🔥 WHAT IT DOES INTERNALLY

  → Updates deliveryStatus  
  → Updates orderStatus  
  → Updates lastTrackedAt  

  ---------------------------------------------

  ## RESPONSE

  {
    "success": true,
    "shipment": {
      "trackingNumber": "...",
      "status": "pending | in_transit | delivered",
      "orderStatus": "processing | shipped | delivered",
      "timeline": [...]
    }
  }

  ---------------------------------------------

  ## FRONTEND USAGE

  ✅ Order details page  
  ✅ Tracking page  

  ---------------------------------------------

  ## ⚠️ NOTE

  Do NOT rely on statusCode  
  Always use "status"