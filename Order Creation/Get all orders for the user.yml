info:
  name: Get all orders for the user
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/orders/my-orders"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  # 3️⃣ Get All Orders

  #### Endpoint: `GET /api/orders/my-orders`

  ## Description:
  Returns all orders placed by the authenticated user, sorted by creation date (most recent first).

  ### Headers:
  ```json
  {
    "Authorization": "Bearer <USER_TOKEN>"
    ```
    
  ### Request Description:
  No request body required.

