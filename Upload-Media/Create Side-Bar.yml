info:
  name: "Create Side-Bar  "
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/api/side-banners"
  headers:
    - name: Authorization
      value: Bearer {{token}}
  body:
    type: multipart-form
    data:
      - name: media
        type: file
        value:
          - C:\Users\Hi\Downloads\616765871_122157963806840934_3423340267822403840_n.jpg
      - name: media
        type: file
        value:
          - C:\Users\Hi\Downloads\ChatGPT Image Apr 24, 2026, 02_09_27 PM.png
      - name: title
        type: text
        value: Side Promo
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ## Call this endpoint to create a side banner  for preorder 

  #### auth
  `Authorization: Bearer {{adminToken}}`

  ### request body
  ```json
  Multipart Form
  media      = [file 1]
  media      = [file 2]
  media      = [file 3]
  media      = [file 4]
  media      = [file 5]
  title      = Promo Banner
  subtitle   = Big sale
  link       = /shop
  order      = 1
  ```


  ### Example response
  ```json
  {
    "success": true,
    "banner": {
