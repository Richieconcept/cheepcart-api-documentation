docs: |-
  # Get All Products Without Pagination

  ## Endpoint
  `GET /api/products/all`

  ## Description

  Returns every active product in one response. Use this when the frontend needs the full product list at once instead of loading products page by page.

  ## Authentication

  Not required.

  ## Response shape

  This endpoint returns:

  ```json
  {
    "total": 1,
    "products": []
  }
  ```

  It does not return `page` or `pages` because there is no pagination.

  ## Default behavior

  If no query parameters are sent:

  ```txt
  GET /api/products/all
  ```

  The backend:
  - Returns only products where `isActive` is `true`.
  - Returns all matching products.
  - Sorts by featured first, then newest first.

  Default backend sort:

  ```js
  { isFeatured: -1, createdAt: -1 }
  ```

  ## Query parameters

  This endpoint supports the same filters and sorting options as `GET /api/products`, except `page` is not used.

  `category`
  - Type: string
  - Required: no
  - Must be a category `_id`.
  - Filters products that belong to that category.

  `featured`
  - Type: string
  - Required: no
  - Send `featured=true` to return only featured products.

  `keyword`
  - Type: string
  - Required: no
  - Searches product `name` and `description`.
  - Search is case-insensitive.

  `min`
  - Type: number
  - Required: no
  - Minimum price filter.

  `max`
  - Type: number
  - Required: no
  - Maximum price filter.

  `sort`
  - Type: string
  - Required: no
  - Allowed values: `price_asc`, `price_desc`, `best_selling`.

  ## Examples

  Get all active products:

  ```txt
  GET /api/products/all
  ```

  Get all products in one category:

  ```txt
  GET /api/products/all?category=662b7f8f4f9c2e2d7c111111
  ```

  Get all featured products:

  ```txt
  GET /api/products/all?featured=true
  ```

  Get all matching search results:

  ```txt
  GET /api/products/all?keyword=iphone
  ```

  Get all products in a price range, cheapest first:

  ```txt
  GET /api/products/all?min=50000&max=250000&sort=price_asc
  ```

  ## Sample success response

  ```json
  {
    "total": 1,
    "products": [
      {
        "_id": "662b80d44f9c2e2d7c333333",
        "name": "iPhone 14 Pro",
        "slug": "iphone-14-pro",
        "description": "Apple smartphone with premium camera features.",
        "category": {
          "_id": "662b7f8f4f9c2e2d7c111111",
          "name": "Phones",
          "slug": "phones"
        },
        "brand": "Apple",
        "price": 950000,
        "comparePrice": 1000000,
        "discountPercentage": 5,
        "weight": 1,
        "stock": 10,
        "sold": 25,
        "images": [
          {
            "secure_url": "https://res.cloudinary.com/demo/image/upload/products/iphone.jpg",
            "public_id": "cheepcart/products/iphone"
          }
        ],
        "averageRating": 4.8,
        "totalReviews": 12,
        "isActive": true,
        "isFeatured": true,
        "createdAt": "2026-04-20T10:00:00.000Z",
        "updatedAt": "2026-04-20T10:00:00.000Z"
      }
    ]
  }
  ```

  ## Frontend notes

  - Use this endpoint only when you really need all matching products at once.
  - For normal shop grids with pagination, use `GET /api/products`.
  - Product `category` is populated with `name` and `slug`.
  - Use `product.slug` when opening the product detail page.
  - Use `product._id` when adding to cart, reviews, order items, or admin updates.
